function updateCutscene() {
  const cs = cutscene;
  cs.timer++;
  if (cs.fadeTimer < 60) cs.fadeTimer++;
  cs.bobAngle += 0.28;
  if (cs.phase === 'walk') {
    cs.bgOffset += 2;
    if (cs.timer >= 120) { cs.phase = 'stand'; cs.timer = 0; }
  } else if (cs.phase === 'stand') {
    if (cs.timer >= 90) { cs.phase = 'jump'; cs.timer = 0; cs.vy = -13; }
  } else if (cs.phase === 'jump') {
    cs.vy += 0.5;
    cs.y += cs.vy;
    if (cs.timer >= 14) { cs.phase = 'freeze'; cs.timer = 0; }
  }
  // 'freeze': nothing updates — score stays on screen
}

function drawCutscene() {
  const cs = cutscene;
  const CSGY = cs.groundY;

  // Sky gradient
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0D47A1'); g.addColorStop(0.6, '#1976D2'); g.addColorStop(1, '#64B5F6');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // Scrolling clouds
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (const [cx2, cy2, sc] of [[80,50,1.2],[320,68,0.9],[580,44,1.1],[820,60,1.0],[1060,52,1.15]]) {
    const cw = 72*sc, ch = 28*sc;
    const x = ((cx2 - cs.bgOffset * 0.35) % (W*2.5) + W*2.5) % (W*2.5) - 100;
    ctx.fillRect(x,cy2,cw,ch);
    ctx.fillRect(x+cw*0.12,cy2-ch*0.4,cw*0.6,ch*0.6);
    ctx.fillRect(x+cw*0.35,cy2-ch*0.65,cw*0.32,ch*0.5);
  }

  // Scrolling hills
  ctx.fillStyle = '#2E7D32';
  for (const [hx2, hw] of [[0,220],[200,270],[460,210],[700,300],[960,230],[1200,260]]) {
    const x = ((hx2 - cs.bgOffset * 0.6) % (W*2.5) + W*2.5) % (W*2.5) - 100;
    ctx.beginPath(); ctx.ellipse(x+hw/2, CSGY+60, hw/2, 90, 0, 0, Math.PI); ctx.fill();
  }

  // Ground
  ctx.fillStyle = '#1B5E20'; ctx.fillRect(0, CSGY, W, H - CSGY);
  ctx.fillStyle = '#4CAF50'; ctx.fillRect(0, CSGY, W, 8);
  ctx.fillStyle = '#388E3C'; ctx.fillRect(0, CSGY+8, W, 6);

  // Cube positions (centered, side by side for 2P)
  const sz = 52;
  const bobY = cs.phase === 'walk' ? Math.sin(cs.bobAngle) * 3 : 0;
  const cx1 = numPlayers === 2 ? W/2 - sz - 8 : W/2 - sz/2;
  const cx2 = cx1 + sz + 16;
  const cubeY = cs.y + bobY;

  drawMiniCube(cx1, cubeY, sz, P1.mid, P1.dark, P1.light);
  if (numPlayers === 2) drawMiniCube(cx2, cubeY, sz, P2.mid, P2.dark, P2.light);

  // Score overlay when frozen
  if (cs.phase === 'freeze') {
    ctx.fillStyle = 'rgba(0,0,0,0.58)';
    ctx.fillRect(0, 0, W, H);
    // Redraw cubes on top of overlay
    drawMiniCube(cx1, cs.y, sz, P1.mid, P1.dark, P1.light);
    if (numPlayers === 2) drawMiniCube(cx2, cs.y, sz, P2.mid, P2.dark, P2.light);

    ctx.textAlign = 'center';
    // YOU WIN
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 38px monospace';
    ctx.fillText('YOU WIN!', W/2, 110);
    // Stars
    ctx.font = '22px monospace';
    ctx.fillText('★  ★  ★', W/2, 142);

    if (numPlayers === 2) {
      const total = player1.score + player2.score;
      ctx.fillStyle = P1.dark; ctx.font = 'bold 16px monospace';
      ctx.fillText(`P1 Score:  ${String(player1.score).padStart(6,'0')}`, W/2, 190);
      ctx.fillStyle = P2.dark;
      ctx.fillText(`P2 Score:  ${String(player2.score).padStart(6,'0')}`, W/2, 215);
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 18px monospace';
      ctx.fillText(`TOTAL:  ${String(total).padStart(6,'0')}`, W/2, 248);
    } else {
      ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 20px monospace';
      ctx.fillText(`Score:  ${String(player1.score).padStart(6,'0')}`, W/2, 210);
    }

    ctx.fillStyle = '#AAAAAA'; ctx.font = '13px monospace';
    ctx.fillText('Thanks for playing The Cube Bros!', W/2, 300);
    ctx.fillStyle = '#888'; ctx.font = '11px monospace';
    ctx.fillText('Press R to return to menu', W/2, 322);
    ctx.textAlign = 'left';
  }

  // Fade-in: pitch black for 0.5s, then fade to clear over 0.5s
  if (cs.fadeTimer < 60) {
    const alpha = cs.fadeTimer < 30 ? 1.0 : 1.0 - (cs.fadeTimer - 30) / 30;
    ctx.fillStyle = `rgba(0,0,0,${alpha.toFixed(3)})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ─── Main Update ─────────────────────────────────────────────────────────────
function update() {
  // Mobile MENU button — same rules as KeyR
  if (touch.menu) {
    if (gameState === 'mfcutscene' && mfVictoryCutscene && mfVictoryCutscene.phase !== 'freeze') { /* block */ }
    else if (gameState !== 'select' && gameState !== 'adventure' && gameState !== 'difficulty') {
      gameState = 'select'; menuSel = 0; touch.menu = false;
    }
  }
  if (gameState === 'cutscene')   { updateCutscene(); return; }
  if (gameState === 'mfcutscene') { updateMFVictoryCutscene(); return; }
  if (gameState === 'transition') {
    tick++;
    transitionTimer--;
    if (transitionTimer <= 0) startLevel(currentLevel + 2);
    return;
  }
  if (badgeNotif) { badgeNotif.timer--; if (badgeNotif.timer <= 0) badgeNotif = null; }
  if (hammerHintTimer > 0) hammerHintTimer--;
  if (jasonFlash > 0) jasonFlash--;
  // Animate generator doors + minigame state (runs even when minigame open)
  for (const gen of generators) {
    if (gen.solved && gen.doorAnim < 1) gen.doorAnim = Math.min(1, gen.doorAnim + 0.012);
  }
  if (wireErrorTimer > 0) wireErrorTimer--;
  if (generatorOpen) {
    if (genTransition) { genTransTimer--; if (genTransTimer<=0) { genTransition=false; initGenStage(genNextStage); } }
    if (genStage===1 && seqPhase==='showing') {
      seqTick++;
      if (seqTick >= seqPattern.length*60+20) seqPhase='input';
    }
    if (seqPressedTimer > 0) seqPressedTimer--;
    if (genStage===3 && patternPhase==='show') { patternTimer--; if (patternTimer<=0) patternPhase='input'; }
  }
  if (badgesPanelOpen || skinsPanelOpen || trailsPanelOpen || colorPickerOpen || generatorOpen) return;
  if (gameState !== 'playing' || gameOver || won) return;
  tick++;
  updatePlayer(player1);
  updatePlayer(player2);

  const active = [player1, player2].filter(p => p && p.lives > 0);

  // UW: Oxygen depletion
  if (currentAdventure === 2) {
    oxygenLevel -= 0.055; // ~100 / (60fps * ~30s) — empties in ~30s
    if (oxygenLevel <= 0) {
      oxygenLevel = MAX_OXYGEN;
      for (const p of active) { p.lives--; p.invincible = 120; tookDamage = true; }
      spawnParticles(player1 ? player1.x + player1.w/2 : W/2, player1 ? player1.y : H/2, '#00BCD4', 12);
    }
    // Animate + collect oxygen bubbles
    for (const b of oxygenBubbles) {
      if (b.collected) continue;
      b.bob = (b.bob + 0.07) % (Math.PI*2);
      for (const p of active) {
        if (overlap(p.x, p.y, p.w, p.h, b.x-8, b.y-8+Math.sin(b.bob)*4, 16, 16)) {
          b.collected = true;
          oxygenLevel = Math.min(MAX_OXYGEN, oxygenLevel + 35);
          spawnParticles(b.x, b.y, '#80DEEA', 6);
        }
      }
    }
    // UW Level 2: Fish Swarm
    if (currentLevel === 1 && uwFishActive) {
      uwFishTimer++;
      // Spawn a wave of 3-5 fish every 2.5 seconds (150 frames), staggered
      if (uwFishTimer % 150 === 0) {
        uwFishWave++;
        const count = 3 + Math.floor(Math.random() * 3);
        for (let f = 0; f < count; f++) {
          const spawnY = GROUND_Y - 40 - Math.random() * 240;
          const speed  = 5 + Math.random() * 3 + uwFishWave * 0.3;
          const angle  = (Math.random() - 0.3) * 0.6; // mostly right, some down-angle
          uwFishSwarm.push({
            x: camX - 30,
            y: spawnY + f * 45,
            vx: speed * Math.cos(angle),
            vy: speed * Math.sin(angle),
            w: 28, h: 22,
            delay: f * 18, // stagger each fish in the wave
          });
        }
      }
      // Update fish
      for (let i = uwFishSwarm.length - 1; i >= 0; i--) {
        const f = uwFishSwarm[i];
        if (f.delay > 0) { f.delay--; continue; }
        f.x += f.vx; f.y += f.vy;
        // Bounce off ceiling/floor
        if (f.y < 50) { f.y = 50; f.vy = Math.abs(f.vy); }
        if (f.y + f.h > GROUND_Y) { f.y = GROUND_Y - f.h; f.vy = -Math.abs(f.vy) * 0.6; }
        // Remove when off right edge
        if (f.x > camX + W + 60) { uwFishSwarm.splice(i, 1); continue; }
        // Hit player
        for (const p of active) {
          if (p.invincible > 0) continue;
          if (overlap(p.x, p.y, p.w, p.h, f.x, f.y, f.w, f.h)) {
            p.lives -= difficulty === 'hard' ? 2 : 1;
            tookDamage = true; p.invincible = 100; p.vy = -7;
            p.vx = f.vx > 0 ? 4 : -4;
            spawnParticles(f.x + f.w/2, f.y + f.h/2, '#1A6B45', 10);
            uwFishSwarm.splice(i, 1); break;
          }
        }
      }
    }

    // UW Level 4: shark boss + victory door
    if (currentLevel === 3) updateUWShark();
    if (currentLevel === 3 && uwVictoryDoor) {
      for (const p of active) {
        if (overlap(p.x-4, p.y, p.w+8, p.h, uwVictoryDoor.x, uwVictoryDoor.y, uwVictoryDoor.w, uwVictoryDoor.h)) {
          if (!badges.has('greatswim')) {
            badges.add('greatswim');
            localStorage.setItem('cb_badges', JSON.stringify([...badges]));
            badgeNotif = { name: 'Great Swim', timer: 240 };
          }
          if (player2 && !badges.has('teamwork')) {
            badges.add('teamwork'); localStorage.setItem('cb_badges', JSON.stringify([...badges]));
            badgeNotif = { name: 'Teamwork', timer: 240 };
          }
          if (player2 && difficulty === 'hard' && !badges.has('teamworkdream')) {
            badges.add('teamworkdream'); localStorage.setItem('cb_badges', JSON.stringify([...badges]));
            badgeNotif = { name: 'Teamwork Makes The Dream Work', timer: 300 };
          }
          won = true; break;
        }
      }
    }
  }

  // MF Level 2: Laser Run
  if (currentAdventure === 1 && currentLevel === 1) {
    // Permanent speed boost — keep it always active
    for (const p of [player1, player2]) {
      if (p && p.lives > 0) p.powerups.speed = Math.max(p.powerups.speed, 10);
    }
    mfRunTimer++;
    // After 25 seconds, materialise the stop button just ahead of the camera
    if (mfRunTimer >= 3600 && !mfStopButton && mfLasersActive) {
      mfStopButton = { x: camX + W - 80, y: GROUND_Y - 60, w: 50, h: 50 };
    }
    // Spawn laser balls every 1.5 s (90 frames) while active
    if (mfLasersActive) {
      laserBallTimer++;
      if (laserBallTimer >= 90) {
        laserBallTimer = 0;
        laserBalls.push({ x: camX + W + 20, y: GROUND_Y - 40 - Math.random() * 220, r: 12, vx: -7 - Math.random() * 3 });
      }
    }
    // Update laser balls
    for (let i = laserBalls.length - 1; i >= 0; i--) {
      const b = laserBalls[i];
      b.x += b.vx;
      if (b.x < camX - 60) { laserBalls.splice(i, 1); continue; }
      for (const p of active) {
        if (p.invincible > 0) continue;
        const dx = (p.x + p.w / 2) - b.x, dy = (p.y + p.h / 2) - b.y;
        if (Math.sqrt(dx * dx + dy * dy) < b.r + Math.min(p.w, p.h) * 0.55) {
          p.lives -= difficulty === 'hard' ? 2 : 1;
          tookDamage = true; checkMistakesBadge(p); checkNyctophobiaBadge(p);
          p.invincible = 100; p.vy = -7;
          spawnParticles(b.x, b.y, '#FF1744', 10);
          laserBalls.splice(i, 1); break;
        }
      }
    }
    // Stop button: player walks into it → clears all laser balls (flag still used to advance)
    if (mfStopButton) {
      for (const p of active) {
        if (overlap(p.x, p.y, p.w, p.h, mfStopButton.x, mfStopButton.y, mfStopButton.w, mfStopButton.h)) {
          laserBalls = []; mfLasersActive = false; mfStopButton = null;
          spawnParticles(p.x + p.w/2, p.y, '#FF1744', 16);
          break;
        }
      }
    }
  }

  // Coins
  for (const c of coins) {
    if (c.collected) continue;
    c.bob = (c.bob + 0.08) % (Math.PI*2);
    for (const p of active) {
      if (overlap(p.x,p.y,p.w,p.h, c.x,c.y,16,16)) {
        c.collected = true; p.coins++; p.score += 100;
        spawnParticles(c.x+8, c.y+8, '#FDD835', 6);
        playCoinSound();
        // Trillionaire badge: 1000 coins across all sessions
        totalCoinsEver++;
        localStorage.setItem('cb_tcoins', totalCoinsEver);
        if (totalCoinsEver >= 500 && !badges.has('trillionaire')) {
          badges.add('trillionaire');
          localStorage.setItem('cb_badges', JSON.stringify([...badges]));
          badgeNotif = { name: 'Trillionaire', timer: 240 };
        }
        // Billionaire badge: all coins collected across all players
        if (!badges.has('billionaire')) {
          const totalCollected = (player1 ? player1.coins : 0) + (player2 ? player2.coins : 0);
          if (totalCollected >= TOTAL_COINS_IN_GAME) {
            badges.add('billionaire');
            localStorage.setItem('cb_badges', JSON.stringify([...badges]));
            badgeNotif = { name: 'Billionaire', timer: 240 };
          }
        }
        break;
      }
    }
  }

  // Chests
  for (const c of chests) {
    if (c.opened) continue;
    for (const p of active) {
      if (overlap(p.x,p.y,p.w,p.h, c.x,c.y,c.w,c.h)) {
        c.opened = true;
        for (const ap of active) applyPowerup(ap, c.type);
        break;
      }
    }
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) { if (e.squish > 0) e.squish -= 0.06; continue; }
    if (e.type === 'jellyfish') {
      // Jellyfish bob up and down — no horizontal patrol
      e.y = e.anchorY + Math.sin(tick * e.bobSpeed + e.bobPhase) * e.bobAmp;
    } else {
      e.x += e.vx;
      if (e.x <= e.patrolStart || e.x + e.w >= e.patrolEnd) {
        e.vx *= -1;
        e.x = Math.max(e.patrolStart, Math.min(e.x, e.patrolEnd - e.w));
      }
      // Generator door blocks enemies
      for (const gen of generators) {
        if (gen.solved) continue;
        const doorH = GROUND_Y * (1 - gen.doorAnim);
        if (doorH <= 2) continue;
        const dX = gen.doorX, dW = 24;
        if (e.y < doorH && e.x + e.w > dX && e.x < dX + dW) {
          if (e.vx > 0) { e.x = dX - e.w; } else { e.x = dX + dW; }
          e.vx *= -1;
        }
      }
    }
    for (const p of active) {
      if (p.invincible > 0 || !overlap(p.x,p.y,p.w,p.h,e.x,e.y,e.w,e.h)) continue;
      const needHammer = currentAdventure === 1 && currentLevel === 2 && !p.hasHammer;
      if (p.powerups.size > 0 && !needHammer) {
        // Big powerup — instant kill on any touch
        e.alive = false; e.squish = 1;
        p.score += 200;
        spawnParticles(e.x+e.w/2, e.y+e.h/2, '#E040FB', 12);
        enemyKillCount++; checkMurdererBadge();
        if (currentAdventure === 1) { robotKillCount++; checkRobotDestroyerBadge(); }
        if (equippedSkin === 'murderer') p.knifeSwing = 24;
        break;
      } else if (e.type !== 'jellyfish' && p.vy > 0 && (p.y + p.h) < (e.y + e.h*0.55 + p.vy + 2)) {
        if (needHammer) {
          // Bounce off without killing — robots are armored
          p.vy = -6; hammerHintTimer = 120;
          break;
        }
        e.alive = false; e.squish = 1;
        p.vy = -9; p.score += 200;
        spawnParticles(e.x+e.w/2, e.y+e.h/2, '#EF5350', 10);
        enemyKillCount++; checkMurdererBadge();
        if (currentAdventure === 1) { robotKillCount++; checkRobotDestroyerBadge(); }
        break;
      } else {
        p.lives -= difficulty === 'hard' ? 2 : 1; tookDamage = true; checkMistakesBadge(p); checkNyctophobiaBadge(p); p.invincible = 100; p.vy = -7;
        p.vx = p.x < e.x+e.w/2 ? -5 : 5;
        spawnParticles(p.x+p.w/2, p.y+p.h/2, '#FF7043', 8);
      }
    }
  }

  // Win / Game Over
  const p1a = player1.lives > 0;
  const p2a = player2 && player2.lives > 0;
  if (currentLevel < 3) {
    const hitGoal = (p1a && player1.x + player1.w >= levelW - 60) ||
                    (p2a && player2.x + player2.w >= levelW - 60);
    if (hitGoal) {
      if (currentAdventure === 0 && currentLevel === 0 && !badges.has('firststeps')) {
        badges.add('firststeps'); localStorage.setItem('cb_badges', JSON.stringify([...badges]));
        badgeNotif = { name: 'First Steps', timer: 240 };
      }
      if (currentLevel < LEVEL_DATA.length - 1) {
        if (player1) { if (player1.lives > 0) player1.lives++; else player1.lives = 1; }
        if (player2) { if (player2.lives > 0) player2.lives++; else player2.lives = 1; }
        gameState = 'transition'; transitionTimer = 210;
      } else won = true;
    }
  }
  // MF Level 4: boss arena
  if (currentAdventure === 1 && currentLevel === 3) {
    updateMFBoss();
    // Spawn victory door the moment boss is defeated
    if (mfBoss && mfBoss.phase === 'dead' && !mfVictoryDoor) {
      mfVictoryDoor = { x: 860 / 2 - 14, y: GROUND_Y - 50, w: 28, h: 50 };
    }
    // Player walks through the door → play cutscene
    if (mfVictoryDoor && gameState === 'playing') {
      for (const p of [player1, player2].filter(Boolean)) {
        if (p.lives > 0 && overlap(p.x-4, p.y, p.w+8, p.h, mfVictoryDoor.x, mfVictoryDoor.y, mfVictoryDoor.w, mfVictoryDoor.h)) {
          startMFVictoryCutscene(); break;
        }
      }
    }
  }

  // Level 4: door interaction, key collection, boss (CK only)
  if (currentAdventure === 0 && currentLevel === 3) {
    // Castle door — press F near any door
    let doorTaken = false;
    for (const p of active) {
      if (doorTaken || !p.justAttacked) continue;
      for (const door of castleDoors) {
        if (door.locked) continue;
        if (!overlap(p.x-8, p.y, p.w+16, p.h, door.x, door.y, door.w, door.h)) continue;
        const destY = GROUND_Y - p.baseH;
        for (const ap of active) { ap.x = door.destX; ap.y = destY; ap.vx = 0; ap.vy = 0; }
        camX = Math.max(0, Math.min(door.destX - W * 0.33, levelW - W));
        if (door.bossEntry) {
          // Start king walk-in cutscene — boss walks from off-screen right
          boss.x = 4750 + 320;
          boss.facingRight = false;
          ckBossCutsceneActive = true; ckBossCutsceneDone = false;
          ckBossCutscenePhase = 'walkin'; ckBossCutsceneTimer = 0;
        }
        if (!door.isExit && !door.bossEntry && bossKey && !bossKey.collected) doorsWithoutKey++;
        doorTaken = true;
        break;
      }
    }
    // Key pickup
    if (bossKey && !bossKey.collected) {
      for (const p of active) {
        if (overlap(p.x,p.y,p.w,p.h, bossKey.x,bossKey.y,bossKey.w,bossKey.h)) {
          bossKey.collected = true;
          const bossDoor = castleDoors.find(d => d.bossEntry);
          if (bossDoor) bossDoor.locked = false;
          spawnParticles(bossKey.x+10, bossKey.y+10, '#FFD700', 14);
          playPowerupSound();
          if (doorsWithoutKey >= 4 && !badges.has('unlucky')) {
            badges.add('unlucky');
            localStorage.setItem('cb_badges', JSON.stringify([...badges]));
            badgeNotif = { name: 'Unlucky', timer: 240 };
          }
          break;
        }
      }
    }
    updateCKBossCutscene();
    updateBoss(active);
    // Victory door check
    if (victoryDoor) {
      for (const p of active) {
        if (overlap(p.x-4, p.y, p.w+8, p.h, victoryDoor.x, victoryDoor.y, victoryDoor.w, victoryDoor.h)) {
          startCutscene(); break;
        }
      }
    }
  }
  if (!p1a && (numPlayers === 1 || !p2a)) gameOver = true;

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.22; p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  updateMoneyTrail();

  // Camera
  let targetCam;
  if (numPlayers === 1 || !p2a)      targetCam = (p1a ? player1.x : camX) - W*0.33;
  else if (!p1a)                     targetCam = player2.x - W*0.33;
  else {
    const mid = (player1.x + player2.x) / 2;
    targetCam = mid - W*0.5;
    const lm = Math.min(player1.x, player2.x);
    if (lm - targetCam < 20) targetCam = lm - 20;
  }
  camX += (targetCam - camX) * 0.1;
  camX  = Math.max(0, Math.min(camX, levelW - W));
}

// ─── Draw Helpers ────────────────────────────────────────────────────────────
function sx(worldX) { return worldX - camX; }

function drawCube(wx, wy, w, h, mid, dark, light) {
  const x = sx(wx);
  ctx.fillStyle = mid;   ctx.fillRect(x, wy, w, h);
  ctx.fillStyle = dark;  ctx.fillRect(x+w-4, wy+4, 4, h-4); ctx.fillRect(x+4, wy+h-4, w-4, 4);
  ctx.fillStyle = light; ctx.fillRect(x+1, wy+1, w-5, 3);    ctx.fillRect(x+1, wy+1, 3, h-5);
}

function drawMiniCube(x, y, sz, mid, dark, light) {
  ctx.fillStyle = mid;   ctx.fillRect(x, y, sz, sz);
  ctx.fillStyle = dark;  ctx.fillRect(x+sz-3, y+3, 3, sz-3); ctx.fillRect(x+3, y+sz-3, sz-3, 3);
  ctx.fillStyle = light; ctx.fillRect(x+1, y+1, sz-4, 2);     ctx.fillRect(x+1, y+1, 2, sz-4);
  ctx.fillStyle = '#000';
  ctx.fillRect(x+Math.round(sz*0.52), y+Math.round(sz*0.28), Math.round(sz*0.16), Math.round(sz*0.16));
  ctx.fillRect(x+Math.round(sz*0.73), y+Math.round(sz*0.28), Math.round(sz*0.16), Math.round(sz*0.16));
}

// ─── Castle Interior Background (Level 4) ────────────────────────────────────
function drawCastleBackground() {
  // Dark stone ceiling and walls
  ctx.fillStyle = '#1C1C1C'; ctx.fillRect(0, 0, W, H);
  // Brick tiling
  const bW = 64, bH = 32, offX = Math.floor(camX) % bW;
  for (let row = 0; row * bH < H - 40; row++) {
    const shift = (row % 2) * (bW / 2);
    for (let col = -1; col * bW < W + bW; col++) {
      const bx = col * bW - offX + shift, by = row * bH;
      ctx.fillStyle = (row + col) % 3 === 0 ? '#2E2E2E' : '#262626';
      ctx.fillRect(bx, by, bW - 2, bH - 2);
      ctx.fillStyle = '#191919';
      ctx.fillRect(bx + bW - 2, by, 2, bH);
      ctx.fillRect(bx, by + bH - 2, bW, 2);
    }
  }
  // Floor border highlight
  ctx.fillStyle = '#444'; ctx.fillRect(0, GROUND_Y - 4, W, 4);
  // Room arch pillars at boundaries between room islands
  for (const rx of [490, 1200, 2000, 2800, 3600, 4400]) {
    const ax = sx(rx);
    if (ax < -40 || ax > W + 40) continue;
    ctx.fillStyle = '#383838';
    ctx.fillRect(ax - 16, 0, 16, GROUND_Y - 4); // left pillar
    ctx.fillRect(ax, 0, 16, GROUND_Y - 4);       // right pillar
    ctx.fillStyle = '#444';
    ctx.fillRect(ax - 15, 0, 3, GROUND_Y - 4);   // highlight
    ctx.fillRect(ax + 1, 0, 3, GROUND_Y - 4);
    ctx.fillStyle = '#4A4A4A';
    ctx.fillRect(ax - 16, GROUND_Y - 200, 32, 20); // arch lintel
    // Torch flicker
    const fl = 0.6 + Math.sin(tick * 0.13 + rx) * 0.4;
    ctx.globalAlpha = fl;
    ctx.fillStyle = '#FF8C00';
    ctx.beginPath(); ctx.arc(ax, GROUND_Y - 190, 8, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = fl * 0.25;
    ctx.beginPath(); ctx.arc(ax, GROUND_Y - 190, 20, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // Boss area entrance arch at x=4560
  const bx4 = sx(4560);
  if (bx4 > -60 && bx4 < W + 60) {
    ctx.fillStyle = '#1A1A1A';
    ctx.fillRect(bx4 - 16, 0, 16, GROUND_Y - 4);
    ctx.fillRect(bx4, 0, 16, GROUND_Y - 4);
    ctx.fillStyle = '#333'; ctx.fillRect(bx4 - 16, GROUND_Y - 220, 32, 24);
    ctx.fillStyle = '#8B0000'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText('BOSS', bx4, GROUND_Y - 226); ctx.textAlign = 'left';
  }
}

// ─── Castle Doors (Level 4) ───────────────────────────────────────────────────
function drawCastleDoors() {
  if (!castleDoors) return;
  for (const door of castleDoors) {
    const dx = sx(door.x);
    if (dx + door.w < -10 || dx > W + 10) continue;
    const dy = door.y;
    // Door fill
    ctx.fillStyle = door.locked ? '#3B1414' : door.bossEntry ? '#6B1111' : door.isExit ? '#0D2B4A' : '#0D3318';
    ctx.fillRect(dx, dy, door.w, door.h);
    // Door panels
    ctx.fillStyle = door.locked ? '#5A1F1F' : door.bossEntry ? '#9C2020' : door.isExit ? '#1565C0' : '#1B5E20';
    ctx.fillRect(dx+3, dy+4,       door.w-6, Math.floor(door.h/2)-6);
    ctx.fillRect(dx+3, dy+Math.floor(door.h/2)+2, door.w-6, Math.floor(door.h/2)-6);
    // Frame
    ctx.fillStyle = '#888';
    ctx.fillRect(dx-2, dy-2, door.w+4, 3);
    ctx.fillRect(dx-2, dy-2, 3, door.h+5);
    ctx.fillRect(dx+door.w-1, dy-2, 3, door.h+5);
    ctx.fillRect(dx-2, dy+door.h, door.w+4, 4);
    // Knob
    ctx.fillStyle = door.locked ? '#555' : '#FFD700';
    ctx.fillRect(dx + door.w - 8, dy + Math.floor(door.h/2) - 3, 5, 5);
    // Label above door
    ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillStyle = door.locked ? '#AA4444' : '#FFD700';
    ctx.fillText(door.label === '<' ? 'EXIT' : door.label, dx + door.w/2, dy - 5);
    // LOCKED text
    if (door.locked) {
      ctx.fillStyle = '#AA4444'; ctx.font = '7px monospace';
      ctx.fillText('LOCKED', dx + door.w/2, dy + Math.floor(door.h/2) + 4);
    }
    // [F] prompt when a player is nearby
    const near = [player1, player2].some(p =>
      p && p.lives > 0 &&
      Math.abs((p.x + p.w/2) - (door.x + door.w/2)) < 55 &&
      Math.abs((p.y + p.h/2) - (door.y + door.h/2)) < 65
    );
    if (near && !door.locked) {
      ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 8px monospace';
      ctx.fillText('[F]', dx + door.w/2, dy - 16);
    }
    ctx.textAlign = 'left';
  }
}

// ─── MF Level 2: Laser Balls & Stop Button ────────────────────────────────────
function drawLaserBalls() {
  for (const b of laserBalls) {
    const bx = sx(b.x); if (bx < -30 || bx > W + 30) continue;
    // Glow trail (to the right — behind the ball)
    ctx.globalAlpha = 0.28;
    ctx.fillStyle = '#FF1744';
    for (let t = 1; t <= 3; t++) {
      ctx.beginPath(); ctx.arc(bx + t * 11, b.y, b.r * (1 - t * 0.22), 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Outer glow
    ctx.shadowColor = '#FF1744'; ctx.shadowBlur = 22;
    ctx.fillStyle = '#FF1744';
    ctx.beginPath(); ctx.arc(bx, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    // Inner core
    ctx.fillStyle = '#FF8A80';
    ctx.beginPath(); ctx.arc(bx, b.y, b.r * 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath(); ctx.arc(bx - b.r * 0.25, b.y - b.r * 0.25, b.r * 0.22, 0, Math.PI * 2); ctx.fill();
  }
}

function drawMFStopButton() {
  if (!mfStopButton) return;
  const bx = sx(mfStopButton.x); if (bx + mfStopButton.w < -20 || bx > W + 20) return;
  const by = mfStopButton.y, bw = mfStopButton.w, bh = mfStopButton.h;
  const pulse = 0.6 + Math.sin(tick * 0.14) * 0.4;
  // Pillar
  ctx.fillStyle = '#455A64'; ctx.fillRect(bx + bw / 2 - 5, by + bh, 10, GROUND_Y - by - bh);
  // Panel body
  ctx.shadowColor = '#FF1744'; ctx.shadowBlur = 18 * pulse;
  ctx.fillStyle = '#3C0000'; ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = '#FF1744'; ctx.fillRect(bx + 5, by + 5, bw - 10, bh - 10);
  ctx.fillStyle = '#FF6659'; ctx.fillRect(bx + 5, by + 5, bw - 10, 5);
  ctx.shadowBlur = 0;
  // Frame
  ctx.strokeStyle = '#FF8A80'; ctx.lineWidth = 2;
  ctx.strokeRect(bx - 2, by - 2, bw + 4, bh + 4);
  // Label
  ctx.fillStyle = '#FFF'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
  ctx.fillText('STOP', bx + bw / 2, by + bh / 2 - 2);
  ctx.fillStyle = '#FFCDD2'; ctx.font = '7px monospace';
  ctx.fillText('[RUN INTO]', bx + bw / 2, by + bh / 2 + 9);
  ctx.textAlign = 'left';
}

// ─── Background ──────────────────────────────────────────────────────────────
function drawFactoryBackground() {
  // Base metal gradient
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a1a1a'); g.addColorStop(0.5, '#222222'); g.addColorStop(1, '#2a2a2a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // Metal panel grid (parallax scrolling)
  const panelW = 120, panelH = 80;
  const offX = ((camX * 0.3) % panelW + panelW) % panelW;
  const offY = 0;
  for (let py = 0; py < H; py += panelH) {
    for (let px = -offX; px < W + panelW; px += panelW) {
      // Panel face
      ctx.fillStyle = (Math.floor((px+offX)/panelW) + Math.floor(py/panelH)) % 2 === 0
        ? '#252525' : '#202020';
      ctx.fillRect(px+2, py+2, panelW-4, panelH-4);
      // Panel border / seam
      ctx.fillStyle = '#111'; ctx.fillRect(px, py, panelW, 2); ctx.fillRect(px, py, 2, panelH);
      // Corner bolts
      ctx.fillStyle = '#444';
      for (const [bx, by] of [[px+6,py+6],[px+panelW-9,py+6],[px+6,py+panelH-9],[px+panelW-9,py+panelH-9]]) {
        ctx.beginPath(); ctx.arc(bx, by, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#666'; ctx.beginPath(); ctx.arc(bx-1, by-1, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#444';
      }
    }
  }

  // Wires / cables running horizontally across the back wall
  const wireData = [
    { y: 90,  color: '#E65100', w: 4, speed: 0.15 },   // thick orange
    { y: 95,  color: '#BF360C', w: 3, speed: 0.15 },   // dark orange
    { y: 160, color: '#F9A825', w: 3, speed: 0.2  },   // yellow
    { y: 164, color: '#F57F17', w: 2, speed: 0.2  },   // amber
    { y: 240, color: '#1B5E20', w: 4, speed: 0.1  },   // green data cable
    { y: 245, color: '#2E7D32', w: 2, speed: 0.1  },
    { y: 310, color: '#0D47A1', w: 3, speed: 0.25 },   // blue power
    { y: 315, color: '#1565C0', w: 2, speed: 0.25 },
    { y: 355, color: '#B71C1C', w: 5, speed: 0.12 },   // thick red
    { y: 361, color: '#C62828', w: 2, speed: 0.12 },
  ];
  for (const wd of wireData) {
    // Wire sag: draw as a series of short catenary curves
    const segW = 200;
    const startX = -(((camX * wd.speed) % segW + segW) % segW);
    ctx.strokeStyle = wd.color; ctx.lineWidth = wd.w; ctx.lineCap = 'round';
    ctx.beginPath();
    for (let sx = startX; sx < W + segW; sx += segW) {
      ctx.moveTo(sx, wd.y);
      ctx.quadraticCurveTo(sx + segW/2, wd.y + 14, sx + segW, wd.y);
    }
    ctx.stroke();
    // Wire connectors / clips every segment
    for (let sx = startX + segW; sx < W + segW; sx += segW) {
      ctx.fillStyle = '#555';
      ctx.fillRect(sx - 4, wd.y - 5, 8, 10);
      ctx.fillStyle = '#777';
      ctx.fillRect(sx - 3, wd.y - 3, 6, 6);
    }
  }

  // Distant machinery silhouettes (pipes, tanks)
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#111';
  const machX1 = ((-(camX * 0.08)) % (LEVEL_W + W) + LEVEL_W + W) % (LEVEL_W + W);
  for (const [ox, oy, ow, oh] of [[0,280,30,130],[140,240,60,170],[240,260,30,140],[380,220,80,180],[500,270,30,130],[680,230,50,170],[760,260,30,140]]) {
    ctx.fillRect(machX1 + ox - 300, oy, ow, oh);
    ctx.beginPath(); ctx.arc(machX1 + ox - 300 + ow/2, oy, ow/2, Math.PI, 0); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawUnderwaterBackground() {
  // Deep ocean gradient
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#01466B'); g.addColorStop(0.5, '#005F8A'); g.addColorStop(1, '#003F5C');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // Animated light caustic rays from surface
  ctx.save();
  for (let r = 0; r < 8; r++) {
    const rx = ((r * 137 - camX * 0.04) % W + W) % W;
    const sway = Math.sin(tick * 0.025 + r * 1.3) * 18;
    const alpha = 0.04 + Math.sin(tick * 0.03 + r) * 0.02;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#7DE8FF';
    ctx.beginPath();
    ctx.moveTo(rx + sway, 0);
    ctx.lineTo(rx + 28 + sway * 0.5, 0);
    ctx.lineTo(rx + 60 + sway, GROUND_Y);
    ctx.lineTo(rx + 20 + sway, GROUND_Y);
    ctx.closePath(); ctx.fill();
  }
  ctx.globalAlpha = 1; ctx.restore();

  // Distant coral/rock silhouettes (far parallax)
  ctx.globalAlpha = 0.15; ctx.fillStyle = '#003050';
  const rockOff = ((-(camX * 0.07)) % (LEVEL_W + W) + LEVEL_W + W) % (LEVEL_W + W);
  for (const [ox, oy, ow, oh] of [[0,310,50,100],[120,280,70,130],[260,300,40,110],[400,270,90,140],[560,295,45,115],[700,260,65,150],[820,290,50,120]]) {
    ctx.fillRect(rockOff + ox - 300, oy, ow, oh);
    ctx.beginPath(); ctx.arc(rockOff + ox - 300 + ow/2, oy, ow/2, Math.PI, 0); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Mid-layer seaweed (medium parallax)
  const swOff = ((-(camX * 0.18)) % (LEVEL_W + W/2) + LEVEL_W + W/2) % (LEVEL_W + W/2);
  for (let s = 0; s < 14; s++) {
    const sx2 = swOff + s * 190 - 200;
    if (sx2 < -30 || sx2 > W + 30) continue;
    const h2 = 40 + (s % 3) * 20;
    const sway2 = Math.sin(tick * 0.04 + s * 0.9) * 5;
    ctx.strokeStyle = s % 2 === 0 ? '#1A6B3A' : '#0F4F28';
    ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(sx2, GROUND_Y);
    ctx.quadraticCurveTo(sx2 + sway2, GROUND_Y - h2/2, sx2 + sway2*2, GROUND_Y - h2);
    ctx.stroke();
    // Seaweed leaf fronds
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx2 + sway2, GROUND_Y - h2*0.4);
    ctx.quadraticCurveTo(sx2 + sway2 + 10, GROUND_Y - h2*0.55, sx2 + sway2 + 16, GROUND_Y - h2*0.4);
    ctx.stroke();
  }

  // Floating bubbles
  for (let b = 0; b < 20; b++) {
    const bx = ((b * 173 + 40 - camX * 0.06) % W + W) % W;
    const by = ((tick * (0.4 + b*0.05) + b * 60) % (GROUND_Y + 20));
    const br = 2 + (b % 3);
    const ba = 0.25 + Math.sin(tick * 0.05 + b) * 0.1;
    ctx.globalAlpha = ba;
    ctx.strokeStyle = '#80DEEA'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(bx, GROUND_Y - by, br, 0, Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawBackground() {
  if (currentAdventure === 2) { drawUnderwaterBackground(); return; }
  if (currentAdventure === 1) { drawFactoryBackground(); return; }
  if (currentLevel === 3) { drawCastleBackground(); return; }
  const g = ctx.createLinearGradient(0, 0, 0, H);
  if (currentLevel === 2) {
    g.addColorStop(0, '#000008'); g.addColorStop(0.6, '#00001A'); g.addColorStop(1, '#000D28');
  } else if (currentLevel === 1) {
    g.addColorStop(0, '#1A0533'); g.addColorStop(0.5, '#6A1B4D'); g.addColorStop(1, '#FF6E40');
  } else {
    g.addColorStop(0, '#0D47A1'); g.addColorStop(0.55, '#1976D2'); g.addColorStop(1, '#42A5F5');
  }
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  if (currentLevel === 2) {
    // Stars
    for (let i = 0; i < 120; i++) {
      const sx2 = ((i*197 + 43) % (LEVEL_W+W));
      const sy  = (i*113 + 17) % (H - 80);
      const bx  = ((sx2 - camX*0.05) % (LEVEL_W+W) + LEVEL_W+W) % (LEVEL_W+W) - 50;
      const blink = 0.4 + Math.sin(tick*0.04 + i) * 0.4;
      ctx.globalAlpha = blink;
      ctx.fillStyle = i % 5 === 0 ? '#CCE5FF' : '#FFFFFF';
      const sz = i % 7 === 0 ? 2 : 1;
      ctx.fillRect(bx, sy, sz, sz);
    }
    ctx.globalAlpha = 1;
    // Moon
    const moonX = ((2600 - camX*0.05) % (LEVEL_W+W) + LEVEL_W+W) % (LEVEL_W+W) - 50;
    ctx.fillStyle = '#FFFDE7';
    ctx.beginPath(); ctx.arc(moonX, 60, 30, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#F9A825';
    ctx.beginPath(); ctx.arc(moonX, 60, 28, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFFDE7';
    ctx.beginPath(); ctx.arc(moonX, 60, 26, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,253,231,0.15)';
    ctx.beginPath(); ctx.arc(moonX, 60, 42, 0, Math.PI*2); ctx.fill();
    // Dark silhouette hills
    ctx.fillStyle = '#050510';
    for (const [hx,hy,hw] of [[0,380,200],[220,360,260],[540,375,200],[820,355,300],[1180,370,220],[1480,350,280],[1800,365,240],[2100,355,300]]) {
      const x = ((hx - camX*0.2) % (LEVEL_W*0.8+W) + LEVEL_W+W) % (LEVEL_W*0.8+W) - 100;
      ctx.beginPath(); ctx.ellipse(x+hw/2, hy+120, hw/2, 120, 0, 0, Math.PI); ctx.fill();
    }
    ctx.fillStyle = '#020208';
    for (const [hx,hy,hw] of [[0,360,240],[280,375,200],[560,355,270],[880,370,220],[1200,360,260],[1500,375,200]]) {
      const x = ((hx - camX*0.45) % (LEVEL_W*0.7+W) + LEVEL_W+W) % (LEVEL_W*0.7+W) - 80;
      ctx.beginPath(); ctx.ellipse(x+hw/2, hy+100, hw/2, 100, 0, 0, Math.PI); ctx.fill();
    }
    return;
  }

  ctx.fillStyle = currentLevel === 1 ? '#4A148C' : '#1565C0';
  for (const [hx,hy,hw] of [[0,380,200],[220,360,260],[540,375,200],[820,355,300],[1180,370,220],[1480,350,280],[1800,365,240],[2100,355,300]]) {
    const x = ((hx - camX*0.2) % (LEVEL_W*0.8+W) + LEVEL_W+W) % (LEVEL_W*0.8+W) - 100;
    ctx.beginPath(); ctx.ellipse(x+hw/2, hy+120, hw/2, 120, 0, 0, Math.PI); ctx.fill();
  }
  ctx.fillStyle = currentLevel === 1 ? '#880E4F' : '#1B5E20';
  for (const [hx,hy,hw] of [[0,360,240],[280,375,200],[560,355,270],[880,370,220],[1200,360,260],[1500,375,200]]) {
    const x = ((hx - camX*0.45) % (LEVEL_W*0.7+W) + LEVEL_W+W) % (LEVEL_W*0.7+W) - 80;
    ctx.beginPath(); ctx.ellipse(x+hw/2, hy+100, hw/2, 100, 0, 0, Math.PI); ctx.fill();
  }
  ctx.fillStyle = currentLevel === 1 ? 'rgba(255,150,100,0.65)' : 'rgba(255,255,255,0.85)';
  for (const [wx,wy,sc] of [[80,55,1.2],[360,72,0.9],[680,48,1.3],[1020,65,1.0],[1340,52,1.1],[1680,70,0.95],[2020,55,1.2],[2340,68,1.0],[2680,50,1.3],[3020,72,0.9]]) {
    const cw=72*sc, ch=28*sc;
    const x = ((wx - camX*0.18) % (LEVEL_W*1.1+W) + LEVEL_W+W) % (LEVEL_W*1.1+W) - 100;
    ctx.fillRect(x,wy,cw,ch); ctx.fillRect(x+cw*0.12,wy-ch*0.4,cw*0.6,ch*0.6); ctx.fillRect(x+cw*0.35,wy-ch*0.65,cw*0.32,ch*0.5);
  }
}

// ─── Platforms ───────────────────────────────────────────────────────────────
function drawPlatforms() {
  const isMF = currentAdventure === 1;
  const isUW = currentAdventure === 2;
  const [gc, gt, gl, gd] = isUW
    ? ['#C2A45A','#E8CC80','#F0D898','#9A7C38']   // sand ground
    : isMF
    ? ['#37474F','#546E7A','#78909C','#263238']
    : currentLevel === 3
    ? ['#2E2E2E','#3A3A3A','#4A4A4A','#1A1A1A']
    : currentLevel === 2
    ? ['#0A0A14','#12122A','#1A1A35','#060610']
    : currentLevel === 1
    ? ['#4A1942','#7B1FA2','#9C27B0','#311B3F']
    : ['#5D4037','#388E3C','#4CAF50','#4A2F20'];
  const [bc, bl, bd] = isUW
    ? ['#A0784A','#C49A5A','#7A5830']              // underwater rock/coral platforms
    : isMF
    ? ['#455A64','#607D8B','#37474F']
    : currentLevel === 3
    ? ['#383838','#555555','#222222']
    : currentLevel === 2
    ? ['#16162E','#2A2A50','#0D0D20']
    : currentLevel === 1
    ? ['#7B1FA2','#BA68C8','#4A148C']
    : ['#D4A017','#FFD54F','#A07820'];

  for (const [px,py,pw,ph] of platforms) {
    const x = sx(px); if (x+pw < 0 || x > W) continue;
    if (py >= GROUND_Y) {
      ctx.fillStyle = gc; ctx.fillRect(x, py, pw, ph);
      ctx.fillStyle = gt; ctx.fillRect(x, py, pw, 8);
      ctx.fillStyle = gl; ctx.fillRect(x, py+1, pw, 3);
      ctx.fillStyle = gd;
      for (let gx = 0; gx < pw; gx += 32) ctx.fillRect(x+gx, py+10, 2, ph-10);
      if (isMF) {
        // Metal plate seams
        ctx.fillStyle = '#263238';
        for (let gx = 0; gx < pw; gx += 48) ctx.fillRect(x+gx, py, 2, ph);
        // Rivets along top edge
        ctx.fillStyle = '#78909C';
        for (let gx = 8; gx < pw; gx += 24) {
          ctx.beginPath(); ctx.arc(x+gx, py+5, 2.5, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#90A4AE'; ctx.beginPath(); ctx.arc(x+gx-1, py+4, 1, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#78909C';
        }
      }
      if (isUW) {
        // Sand ripple lines
        ctx.fillStyle = '#B09048';
        for (let gx = 0; gx < pw; gx += 22) ctx.fillRect(x+gx, py+5, 12, 1);
        // Pebbles scattered along the surface
        ctx.fillStyle = '#A07838';
        for (let gx = 14; gx < pw; gx += 38) {
          ctx.beginPath(); ctx.ellipse(x+gx, py+3, 4, 3, 0, 0, Math.PI*2); ctx.fill();
        }
        // Small coral sprigs
        ctx.strokeStyle = '#E05060'; ctx.lineWidth = 2;
        for (let gx = 28; gx < pw; gx += 80) {
          ctx.beginPath(); ctx.moveTo(x+gx, py); ctx.lineTo(x+gx, py-10); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(x+gx, py-6); ctx.lineTo(x+gx+6, py-12); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(x+gx, py-6); ctx.lineTo(x+gx-6, py-12); ctx.stroke();
        }
      }
    } else {
      ctx.fillStyle = bc; ctx.fillRect(x, py, pw, ph);
      ctx.fillStyle = bl; ctx.fillRect(x, py, pw, 3);
      ctx.fillStyle = bd;
      ctx.fillRect(x, py+ph-3, pw, 3); ctx.fillRect(x, py+ph/2-1, pw, 2);
      for (let bx = 0;  bx < pw; bx += 20) ctx.fillRect(x+bx, py, 2, ph/2);
      for (let bx = 10; bx < pw; bx += 20) ctx.fillRect(x+bx, py+ph/2, 2, ph/2);
      if (isMF) {
        // Rivets on platform corners
        ctx.fillStyle = '#78909C';
        for (const rx of [5, pw-8]) {
          ctx.beginPath(); ctx.arc(x+rx, py+ph/2, 2, 0, Math.PI*2); ctx.fill();
        }
        // Orange warning stripe on platform edge
        ctx.fillStyle = '#E65100';
        ctx.fillRect(x, py, pw, 2);
      }
      if (isUW) {
        // Coral/barnacle top on platforms
        ctx.fillStyle = '#C05050';
        ctx.fillRect(x, py, pw, 2);
        ctx.fillStyle = '#E07060';
        for (let bx = 6; bx < pw; bx += 18) {
          ctx.beginPath(); ctx.arc(x+bx, py+1, 3, Math.PI, 0); ctx.fill();
        }
      }
    }
  }
}

// ─── Coins ───────────────────────────────────────────────────────────────────
function drawCoins() {
  for (const c of coins) {
    if (c.collected) continue;
    const x = sx(c.x); if (x < -20 || x > W+20) continue;
    const y = c.y + Math.sin(c.bob)*3;
    ctx.fillStyle = '#FDD835'; ctx.fillRect(x, y, 16, 16);
    ctx.fillStyle = '#FFF9C4'; ctx.fillRect(x+2, y+2, 6, 5);
    ctx.strokeStyle = '#F57F17'; ctx.lineWidth = 1.5; ctx.strokeRect(x+.75, y+.75, 14.5, 14.5);
    ctx.fillStyle = '#E65100'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'left'; ctx.fillText('$', x+4, y+12);
  }
}

// ─── Oxygen Bubbles ──────────────────────────────────────────────────────────
function drawOxygenBubbles() {
  for (const b of oxygenBubbles) {
    if (b.collected) continue;
    const bx = sx(b.x); if (bx < -20 || bx > W+20) continue;
    const by = b.y + Math.sin(b.bob)*4;
    // Outer glow ring
    ctx.globalAlpha = 0.4 + Math.sin(b.bob*2)*0.15;
    ctx.strokeStyle = '#80DEEA'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(bx+8, by+8, 11, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
    // Bubble fill
    ctx.fillStyle = 'rgba(0,188,212,0.25)';
    ctx.beginPath(); ctx.arc(bx+8, by+8, 9, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#00BCD4'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(bx+8, by+8, 9, 0, Math.PI*2); ctx.stroke();
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.arc(bx+5, by+5, 3, 0, Math.PI*2); ctx.fill();
    // "O₂" label
    ctx.fillStyle = '#E0F7FA'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
    ctx.fillText('O2', bx+8, by+12);
  }
  ctx.textAlign = 'left';
}

// ─── Chests ──────────────────────────────────────────────────────────────────
function drawChests() {
  for (const c of chests) {
    const x = sx(c.x); if (x+c.w < -10 || x > W+10) continue;
    if (!c.opened) {
      ctx.fillStyle = '#5D4037'; ctx.fillRect(x, c.y+c.h/2, c.w, c.h/2);
      ctx.fillStyle = '#795548'; ctx.fillRect(x, c.y, c.w, c.h/2);
      ctx.fillStyle = '#FDD835'; ctx.fillRect(x, c.y+c.h/2-2, c.w, 4);
      ctx.fillStyle = '#FDD835'; ctx.fillRect(x+c.w/2-4, c.y+c.h/2-7, 8, 8);
      ctx.fillStyle = '#E65100'; ctx.fillRect(x+c.w/2-2, c.y+c.h/2-4, 4, 5);
      ctx.fillStyle = '#A1887F'; ctx.fillRect(x+1, c.y+1, c.w-2, 2); ctx.fillRect(x+1, c.y+1, 2, c.h/2-2);
      ctx.fillStyle = '#3E2723'; ctx.fillRect(x+c.w-3, c.y+3, 3, c.h-3); ctx.fillRect(x+3, c.y+c.h-3, c.w-3, 3);
      // Powerup icon + pulsing label
      const pulse = 0.75 + Math.sin(tick * 0.1) * 0.25;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = c.type === 'speed' ? '#FFE082' : c.type === 'nightvision' ? '#00E5FF' : c.type === 'hammer' ? '#FF6F00' : '#CE93D8';
      ctx.font = '13px monospace'; ctx.textAlign = 'center';
      ctx.fillText(c.type === 'speed' ? '⚡' : c.type === 'nightvision' ? 'NV' : c.type === 'hammer' ? '🔨' : '★', x+c.w/2, c.y-4);
      ctx.globalAlpha = 1; ctx.textAlign = 'left';
    } else {
      // Open body
      ctx.fillStyle = '#5D4037'; ctx.fillRect(x, c.y+c.h/2, c.w, c.h/2);
      ctx.fillStyle = '#1A0A00'; ctx.fillRect(x+3, c.y+c.h/2, c.w-6, 6);
      ctx.fillStyle = '#FDD835'; ctx.fillRect(x, c.y+c.h/2-2, c.w, 4);
      // Lid flipped open
      ctx.fillStyle = '#795548'; ctx.fillRect(x-4, c.y-10, c.w, c.h/2-2);
      ctx.fillStyle = '#A1887F'; ctx.fillRect(x-3, c.y-9, c.w-2, 2);
      ctx.fillStyle = '#FDD835'; ctx.fillRect(x-4, c.y-10+c.h/2-4, c.w, 3);
    }
  }
}

// ─── Goal Flag ───────────────────────────────────────────────────────────────
function drawGoalFlag() {
  const gx = sx(LEVEL_W - 90); if (gx < -50 || gx > W+50) return;

  // Mechanical Factory: draw industrial metal door for all levels
  if (currentAdventure === 1) {
    const dw = 52, dh = 80;
    const dx = gx + 14, dy = GROUND_Y - dh;
    // Door frame (thick steel)
    ctx.fillStyle = '#263238'; ctx.fillRect(dx - 6, dy - 6, dw + 12, dh + 6);
    // Door panel
    ctx.fillStyle = '#37474F'; ctx.fillRect(dx, dy, dw, dh);
    // Steel sheen
    ctx.fillStyle = '#546E7A'; ctx.fillRect(dx, dy, dw, 4); ctx.fillRect(dx, dy, 4, dh);
    // Horizontal panel lines
    ctx.fillStyle = '#263238';
    ctx.fillRect(dx + 4, dy + dh/2 - 1, dw - 8, 2);
    ctx.fillRect(dx + 4, dy + dh/4, dw - 8, 1);
    ctx.fillRect(dx + 4, dy + dh*3/4, dw - 8, 1);
    // Rivets (corners of panels)
    ctx.fillStyle = '#78909C';
    const rivets = [
      [dx+6, dy+8], [dx+dw-10, dy+8],
      [dx+6, dy+dh/2-8], [dx+dw-10, dy+dh/2-8],
      [dx+6, dy+dh/2+6], [dx+dw-10, dy+dh/2+6],
      [dx+6, dy+dh-12], [dx+dw-10, dy+dh-12],
    ];
    for (const [rx, ry] of rivets) { ctx.fillRect(rx, ry, 4, 4); }
    // Door handle
    ctx.fillStyle = '#FF6F00'; ctx.fillRect(dx + dw - 12, dy + dh/2 - 4, 6, 8);
    ctx.fillStyle = '#FFB300'; ctx.fillRect(dx + dw - 11, dy + dh/2 - 3, 4, 6);
    // Orange warning stripe at bottom
    const stripeY = dy + dh - 10;
    for (let i = 0; i < dw; i += 10) {
      ctx.fillStyle = (Math.floor(i/10) % 2 === 0) ? '#FF6F00' : '#263238';
      ctx.fillRect(dx + i, stripeY, 10, 10);
    }
    // Orange glow effect
    const glow = 0.3 + Math.sin(tick * 0.08) * 0.15;
    ctx.fillStyle = `rgba(255,111,0,${glow})`;
    ctx.fillRect(dx - 6, dy - 6, dw + 12, 4);
    ctx.fillRect(dx - 6, dy - 6, 4, dh + 6);
    ctx.fillRect(dx + dw + 2, dy - 6, 4, dh + 6);
    // "EXIT" sign above door
    ctx.fillStyle = '#FF6F00'; ctx.fillRect(dx + 6, dy - 20, dw - 12, 14);
    ctx.fillStyle = '#000'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText('EXIT', dx + dw/2, dy - 9);
    return;
  }

  if (currentLevel === 2) {
    // Castle for Level 3
    const cx = gx, cy = GROUND_Y, cw = 80, wall = 160;
    const base = cy - wall;
    // Main wall
    ctx.fillStyle = '#455A64'; ctx.fillRect(cx, base, cw, wall);
    // Stone highlight
    ctx.fillStyle = '#546E7A'; ctx.fillRect(cx, base, cw, 4); ctx.fillRect(cx, base, 4, wall);
    // Stone lines
    ctx.fillStyle = '#37474F';
    for (let row = 0; row < wall; row += 18) {
      const off = (Math.floor(row/18) % 2) * 18;
      for (let col = off; col < cw; col += 36) ctx.fillRect(cx+col, base+row, 18, 1);
      ctx.fillRect(cx, base+row, cw, 1);
    }
    // Shadow edge
    ctx.fillStyle = '#263238'; ctx.fillRect(cx+cw-4, base, 4, wall); ctx.fillRect(cx, base+wall-4, cw, 4);
    // Battlements (5 merlons)
    ctx.fillStyle = '#455A64';
    for (let i = 0; i < 5; i++) {
      if (i % 2 === 0) ctx.fillRect(cx + i*16, base-20, 16, 20);
    }
    // Gate arch
    ctx.fillStyle = '#000010';
    ctx.fillRect(cx+28, base+wall-50, 24, 50);
    ctx.beginPath(); ctx.arc(cx+40, base+wall-50, 12, Math.PI, 0); ctx.fill();
    // Windows
    ctx.fillStyle = '#000010';
    ctx.fillRect(cx+10, base+30, 12, 16); ctx.fillRect(cx+58, base+30, 12, 16);
    // Window glow (candles inside)
    const wg = 0.5 + Math.sin(tick*0.07)*0.3;
    ctx.fillStyle = `rgba(255,200,80,${wg})`;
    ctx.fillRect(cx+12, base+32, 8, 12); ctx.fillRect(cx+60, base+32, 8, 12);
    // Flag on tower
    ctx.fillStyle = '#546E7A'; ctx.fillRect(cx+37, base-50, 4, 32);
    ctx.fillStyle = '#00BCD4'; ctx.fillRect(cx+41, base-50, 22, 14);
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'left';
    ctx.fillText('WIN', cx+43, base-39);
    return;
  }

  ctx.fillStyle = '#78909C'; ctx.fillRect(gx+22, 200, 6, GROUND_Y-200);
  ctx.fillStyle = '#B0BEC5'; ctx.fillRect(gx+22, 200, 3, GROUND_Y-200);
  ctx.fillStyle = currentLevel === 1 ? '#9C27B0' : '#F44336';
  ctx.fillRect(gx+28, 200, 44, 30);
  ctx.fillStyle = '#FFEB3B'; ctx.fillRect(gx+28, 200, 44, 11);
  ctx.fillStyle = '#FFF'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'left';
  ctx.fillText('GOAL!', gx+31, 224);
  ctx.fillStyle = '#FDD835'; ctx.fillRect(gx+18, 194, 14, 14);
  ctx.fillStyle = '#F57F17'; ctx.fillRect(gx+20, 196, 10, 10);
}

// ─── Player Cube ─────────────────────────────────────────────────────────────
function drawPlayerCube(p) {
  if (!p || p.lives <= 0) return;
  if (p.invincible > 0 && Math.floor(p.invincible/5)%2 === 1) return;
  const moving = Math.abs(p.vx) > 0.5;
  const sqX    = p.onGround && moving ? 2 : 0;
  const strY   = p.vy < -4 ? -3 : (p.vy > 3 ? 2 : 0);
  const pw = p.w + sqX, ph = p.h - sqX + strY;
  const px = p.x - sqX*0.5, py = p.y + sqX - strY;

  if (p.powerups.speed > 0) { ctx.shadowColor = equippedSkin === 'murderer' ? '#FF6D00' : '#FFD700'; ctx.shadowBlur = 12; }
  if (p.powerups.size  > 0) { ctx.shadowColor = '#E040FB'; ctx.shadowBlur = 14; }
  drawCube(px, py, pw, ph, p.colors.mid, p.colors.dark, p.colors.light);
  ctx.shadowBlur = 0;

  const ex = sx(px), eSize = Math.max(4, Math.round(pw*0.18));
  // Speed lines
  if (p.powerups.speed > 0 && Math.abs(p.vx) > 2) {
    ctx.strokeStyle = 'rgba(255,215,0,0.55)'; ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const lx = p.facingRight ? ex - 5 - i*8 : ex + pw + 5 + i*8;
      const ly = py + ph * (0.2 + i*0.25);
      const dir = p.facingRight ? 10+i*4 : -(10+i*4);
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx+dir, ly); ctx.stroke();
    }
  }

  // Tycoon skin: golden top hat + business suit
  if (equippedSkin === 'tycoon') {
    const crownH = Math.floor(ph * 0.55), crownW = Math.floor(pw * 0.65);
    const crownX = ex + Math.floor((pw - crownW) / 2);
    // Crown
    ctx.fillStyle = '#FFD700'; ctx.fillRect(crownX, py - crownH, crownW, crownH);
    ctx.fillStyle = '#FFE55C'; ctx.fillRect(crownX, py - crownH, 2, crownH);
    ctx.fillStyle = '#B8860B'; ctx.fillRect(crownX + crownW - 3, py - crownH, 3, crownH);
    ctx.fillStyle = '#B8860B'; ctx.fillRect(crownX, py - crownH, crownW, 2); // top
    // Hat band
    ctx.fillStyle = '#7A5C00'; ctx.fillRect(crownX, py - Math.floor(ph * 0.14), crownW, 3);
    // Brim
    ctx.fillStyle = '#FFD700'; ctx.fillRect(ex - 4, py - 3, pw + 8, 4);
    ctx.fillStyle = '#B8860B'; ctx.fillRect(ex - 4, py - 3 + 3, pw + 8, 1);

    // Suit (lower ~58% of cube)
    const lapelY = Math.round(py + ph * 0.42);
    const lapelH = Math.round(py + ph) - lapelY;
    ctx.fillStyle = '#B8860B'; ctx.fillRect(ex, lapelY, pw, lapelH);
    ctx.fillStyle = '#FFD700'; ctx.fillRect(ex, lapelY, pw, 2); // top edge
    // Lapels
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(ex + 1, lapelY, Math.floor(pw * 0.26), Math.floor(lapelH * 0.6));
    ctx.fillRect(ex + pw - 1 - Math.floor(pw * 0.26), lapelY, Math.floor(pw * 0.26), Math.floor(lapelH * 0.6));
    // Shirt / tie strip
    ctx.fillStyle = '#7A5C00';
    ctx.fillRect(ex + Math.floor(pw * 0.38), lapelY, Math.floor(pw * 0.24), lapelH);
    ctx.fillStyle = '#FFE55C';
    ctx.fillRect(ex + Math.floor(pw * 0.44), lapelY + 2, 2, Math.floor(lapelH * 0.65));
    // Bottom shadow
    ctx.fillStyle = '#7A5C00'; ctx.fillRect(ex, py + ph - 2, pw, 2);
  }

  // Explorer skin: green backpack + brown suit
  if (equippedSkin === 'explorer') {
    // Backpack (green, protrudes to the right of the cube)
    const bpW = Math.floor(pw * 0.45), bpH = Math.floor(ph * 0.55);
    const bpX = ex - bpW + 2, bpY = py + Math.floor(ph * 0.18);
    ctx.fillStyle = '#388E3C'; ctx.fillRect(bpX, bpY, bpW, bpH);
    ctx.fillStyle = '#43A047'; ctx.fillRect(bpX, bpY, bpW, 2);            // top highlight
    ctx.fillStyle = '#2E7D32'; ctx.fillRect(bpX + bpW - 2, bpY, 2, bpH); // right shadow
    ctx.fillStyle = '#1B5E20'; ctx.fillRect(bpX, bpY + bpH - 2, bpW, 2); // bottom trim
    ctx.fillStyle = '#1B5E20';
    ctx.fillRect(bpX + Math.floor(bpW * 0.35), bpY + Math.floor(bpH * 0.35), Math.floor(bpW * 0.3), 2);

    // Brown suit — full body coverage like the tycoon suit
    const lapelY = Math.round(py + ph * 0.38);
    const lapelH = Math.round(py + ph) - lapelY;
    // Suit jacket (lower ~62%)
    ctx.fillStyle = '#5D4037'; ctx.fillRect(ex, lapelY, pw, lapelH);
    ctx.fillStyle = '#6D4C41'; ctx.fillRect(ex, lapelY, pw, 2);            // top highlight
    // Lapels
    ctx.fillStyle = '#8D6E63';
    ctx.fillRect(ex + 1, lapelY, Math.floor(pw * 0.28), Math.floor(lapelH * 0.55));
    ctx.fillRect(ex + pw - 1 - Math.floor(pw * 0.28), lapelY, Math.floor(pw * 0.28), Math.floor(lapelH * 0.55));
    // Shirt / tie strip (cream)
    ctx.fillStyle = '#EFEBE9';
    ctx.fillRect(ex + Math.floor(pw * 0.38), lapelY, Math.floor(pw * 0.24), lapelH);
    // Bottom trim
    ctx.fillStyle = '#3E2723'; ctx.fillRect(ex, py + ph - 2, pw, 2);
  }

  // Murderer skin: pitch black cube + Jason mask + knife
  if (equippedSkin === 'murderer') {
    // Pitch black overlay over entire cube
    ctx.fillStyle = '#000'; ctx.fillRect(ex, py, pw, ph);
    ctx.fillStyle = '#111'; ctx.fillRect(ex, py, pw, 2); // subtle top highlight
    ctx.fillStyle = '#0a0a0a'; ctx.fillRect(ex, py + ph - 2, pw, 2);

    const fireMode = p.powerups.speed > 0;

    // FIRE JASON — animated pixel flames around cube
    if (fireMode) {
      const ft = Date.now() / 80;
      const flameData = [
        { rx: 0.05, rh: 0.7, ph: 0.4 }, { rx: 0.2,  rh: 0.9, ph: 1.3 },
        { rx: 0.35, rh: 0.75, ph: 0.7 }, { rx: 0.5, rh: 1.0, ph: 2.1 },
        { rx: 0.65, rh: 0.8, ph: 0.3 }, { rx: 0.8,  rh: 0.85, ph: 1.7 },
        { rx: 0.92, rh: 0.65, ph: 0.9 },
      ];
      const fw = Math.max(3, Math.floor(pw * 0.16));
      for (const f of flameData) {
        const flicker = 0.75 + Math.sin(ft + f.ph) * 0.25;
        const fh = Math.floor(ph * f.rh * flicker);
        const fx = ex + Math.floor(pw * f.rx) - Math.floor(fw / 2);
        const fy = py - fh;
        ctx.fillStyle = '#7B1800'; ctx.fillRect(fx - 1, fy + Math.floor(fh * 0.4), fw + 2, Math.floor(fh * 0.6));
        ctx.fillStyle = '#FF3D00'; ctx.fillRect(fx, fy + Math.floor(fh * 0.2), fw, Math.floor(fh * 0.6));
        ctx.fillStyle = '#FF6D00'; ctx.fillRect(fx, fy + Math.floor(fh * 0.05), fw - 1, Math.floor(fh * 0.5));
        ctx.fillStyle = '#FF9800'; ctx.fillRect(fx + 1, fy, fw - 2, Math.floor(fh * 0.4));
        ctx.fillStyle = '#FFCC00'; ctx.fillRect(fx + 1, fy, fw - 2, 2);
      }
      // Side flame wisps
      for (let side = 0; side < 2; side++) {
        const sx2 = side === 0 ? ex - fw : ex + pw;
        for (let i = 0; i < 3; i++) {
          const flicker = 0.6 + Math.sin(ft * 1.3 + i + side * 2) * 0.4;
          const fh = Math.floor(ph * 0.45 * flicker);
          const fy = py + Math.floor(ph * (0.1 + i * 0.25));
          ctx.fillStyle = '#FF3D00'; ctx.fillRect(sx2, fy, fw - 1, fh);
          ctx.fillStyle = '#FF6D00'; ctx.fillRect(sx2 + (side === 0 ? 1 : 0), fy, fw - 2, Math.floor(fh * 0.6));
        }
      }
      // Orange glow pulse on the cube itself
      ctx.globalAlpha = 0.18 + Math.sin(ft * 0.7) * 0.07;
      ctx.fillStyle = '#FF6D00'; ctx.fillRect(ex, py, pw, ph);
      ctx.globalAlpha = 1;
    }

    // Jason Voorhees hockey mask
    const mw = Math.floor(pw * 0.78), mh = Math.floor(ph * 0.78);
    const mx = ex + Math.floor((pw - mw) / 2);
    const my = py + Math.floor(ph * 0.08);
    // Mask base — scorched orange-white in fire mode, normal white otherwise
    ctx.fillStyle = fireMode ? '#C84800' : '#E8E4DC'; ctx.fillRect(mx, my, mw, mh);
    ctx.fillStyle = fireMode ? '#8B2500' : '#C8C4BC'; ctx.fillRect(mx, my, 2, mh);
    ctx.fillStyle = fireMode ? '#FF6D00' : '#F0EDE8'; ctx.fillRect(mx + mw - 2, my, 2, mh);
    // Round eye holes — glowing orange in fire mode
    const eHsz = Math.max(3, Math.floor(mw * 0.2));
    const eHy  = my + Math.floor(mh * 0.22);
    ctx.fillStyle = fireMode ? '#FF9800' : '#111';
    ctx.fillRect(mx + Math.floor(mw * 0.08), eHy, eHsz, eHsz);
    ctx.fillRect(mx + mw - Math.floor(mw * 0.08) - eHsz, eHy, eHsz, eHsz);
    if (fireMode) {
      // Bright eye glow centers
      ctx.fillStyle = '#FFEB3B';
      ctx.fillRect(mx + Math.floor(mw * 0.08) + 1, eHy + 1, eHsz - 2, eHsz - 2);
      ctx.fillRect(mx + mw - Math.floor(mw * 0.08) - eHsz + 1, eHy + 1, eHsz - 2, eHsz - 2);
    }
    // Nose holes
    ctx.fillStyle = fireMode ? '#FF6D00' : '#111';
    ctx.fillRect(mx + Math.floor(mw * 0.38), my + Math.floor(mh * 0.52), 2, 2);
    ctx.fillRect(mx + Math.floor(mw * 0.55), my + Math.floor(mh * 0.52), 2, 2);
    // Mouth grill
    ctx.fillStyle = fireMode ? '#FF3D00' : '#888';
    for (let s = 0; s < 3; s++)
      ctx.fillRect(mx + Math.floor(mw * 0.18), my + Math.floor(mh * 0.70) + s * 3, Math.floor(mw * 0.64), 2);
    // RED CHEVRON MARKS — orange/yellow in fire mode
    ctx.fillStyle = fireMode ? '#FFCC00' : '#CC1111';
    // Forehead chevron (large, centered at top)
    const cvW = Math.floor(mw * 0.52), cvH = Math.floor(mh * 0.26);
    const cvX = mx + Math.floor((mw - cvW) / 2), cvY = my + 1;
    for (let r = 0; r < cvH; r++) {
      const w = Math.max(1, Math.floor(cvW * (1 - r / cvH)));
      ctx.fillRect(cvX + Math.floor((cvW - w) / 2), cvY + r, w, 1);
    }
    // Left cheek chevron (smaller)
    const kcW = Math.floor(mw * 0.26), kcH = Math.floor(mh * 0.16);
    const lcvX = mx + Math.floor(mw * 0.04), lcvY = my + Math.floor(mh * 0.44);
    for (let r = 0; r < kcH; r++) {
      const w = Math.max(1, Math.floor(kcW * (1 - r / kcH)));
      ctx.fillRect(lcvX + Math.floor((kcW - w) / 2), lcvY + r, w, 1);
    }
    // Right cheek chevron (mirror)
    const rcvX = mx + mw - Math.floor(mw * 0.04) - kcW;
    for (let r = 0; r < kcH; r++) {
      const w = Math.max(1, Math.floor(kcW * (1 - r / kcH)));
      ctx.fillRect(rcvX + Math.floor((kcW - w) / 2), lcvY + r, w, 1);
    }

    // Knife — held on facing side, angled up
    const knifeX = p.facingRight ? ex + pw + 1 : ex - Math.floor(pw * 0.55);
    const knifeY = py + Math.floor(ph * 0.35);
    const swingT  = p.knifeSwing / 24; // 1→0 over animation
    // Swing: rotate from -0.4 (held up) toward +1.4 (slashed down) then back
    const swingAngle = swingT > 0
      ? (swingT > 0.5
          ? -0.4 + (1 - swingT) * 2 * 1.8   // downswing
          : -0.4 + swingT * 2 * 1.8)          // upswing back
      : -0.4;
    const kAnchorX = knifeX + (p.facingRight ? 0 : Math.floor(pw * 0.55));
    const kAnchorY = knifeY;
    ctx.save();
    ctx.translate(kAnchorX, kAnchorY);
    ctx.rotate(p.facingRight ? swingAngle : Math.PI - swingAngle);
    // Blade (grey, 3px wide, 12px long pointing up)
    const bLen = Math.max(10, Math.floor(ph * 0.45));
    ctx.fillStyle = '#B0BEC5'; ctx.fillRect(-1, -bLen, 3, bLen);
    ctx.fillStyle = '#CFD8DC'; ctx.fillRect(0, -bLen, 1, bLen); // highlight
    ctx.fillStyle = '#607D8B'; ctx.fillRect(-1, -bLen, 3, 2);   // tip
    // Handle (dark brown, 3px wide, 6px tall below blade)
    const hLen = Math.max(6, Math.floor(ph * 0.22));
    ctx.fillStyle = '#4E342E'; ctx.fillRect(-2, 0, 5, hLen);
    ctx.fillStyle = '#6D4C41'; ctx.fillRect(-2, 0, 5, 2);       // guard
    ctx.fillStyle = '#3E2723'; ctx.fillRect(-2, hLen - 2, 5, 2); // pommel
    ctx.restore();
  }

  // Mechanic skin: orange hard hat + cosmetic hammer
  if (equippedSkin === 'mechanic') {
    // Brim (black, wide)
    ctx.fillStyle = '#1A1A1A';
    ctx.fillRect(ex - 5, py - 4, pw + 10, 4);
    ctx.fillStyle = '#333';
    ctx.fillRect(ex - 5, py - 4, pw + 10, 1); // brim highlight
    // Side lugs (bumps on brim)
    ctx.fillStyle = '#E65100';
    ctx.fillRect(ex - 2, py - 8, 5, 5);
    ctx.fillRect(ex + pw - 3, py - 8, 5, 5);
    ctx.fillStyle = '#BF360C';
    ctx.fillRect(ex - 2, py - 5, 5, 2);
    ctx.fillRect(ex + pw - 3, py - 5, 5, 2);
    // Dome (orange, pixelated hard hat shape)
    const dW = Math.floor(pw * 0.78), dH = Math.floor(ph * 0.60);
    const dX = ex + Math.floor((pw - dW) / 2), dY = py - 4 - dH;
    ctx.fillStyle = '#E65100';
    ctx.fillRect(dX, dY, dW, dH);
    // Dome highlight (lighter orange, top-left)
    ctx.fillStyle = '#FF8F00';
    ctx.fillRect(dX + 1, dY, dW - 3, 2);
    ctx.fillRect(dX, dY + 2, 2, dH - 5);
    // Dome shadow (darker, bottom-right)
    ctx.fillStyle = '#BF360C';
    ctx.fillRect(dX + dW - 3, dY + 2, 3, dH - 2);
    ctx.fillRect(dX + 1, dY + dH - 3, dW - 4, 3);
    // Black top vent strip
    ctx.fillStyle = '#1A1A1A';
    ctx.fillRect(dX + Math.floor(dW * 0.36), dY, Math.floor(dW * 0.28), Math.floor(dH * 0.52));
    // Cosmetic hammer (held on facing side, static)
    const hSide = p.facingRight ? 1 : -1;
    const hmrBaseX = p.facingRight ? ex + pw + 2 : ex - 14;
    const hmrBaseY = py + Math.floor(ph * 0.22);
    const hndleH = Math.floor(ph * 0.7);
    // Handle (wood brown)
    ctx.fillStyle = '#8D6E63'; ctx.fillRect(hmrBaseX + 4, hmrBaseY + 6, 4, hndleH);
    ctx.fillStyle = '#6D4C41'; ctx.fillRect(hmrBaseX + 6, hmrBaseY + 6, 2, hndleH);
    // Head (steel gray)
    ctx.fillStyle = '#546E7A'; ctx.fillRect(hmrBaseX, hmrBaseY, 12, 9);
    ctx.fillStyle = '#78909C'; ctx.fillRect(hmrBaseX, hmrBaseY, 12, 2);     // top highlight
    ctx.fillStyle = '#37474F'; ctx.fillRect(hmrBaseX, hmrBaseY + 7, 12, 2); // bottom shadow
    ctx.fillStyle = '#90A4AE'; ctx.fillRect(hmrBaseX, hmrBaseY, 2, 9);      // left highlight
  }

  // R.O.B.O.T skin: player looks like a robot enemy
  if (equippedSkin === 'robot') {
    const fr = p.facingRight;
    const armored = robotSkinVariant === 1;
    if (armored) {
      // Armored variant — override cube with dark steel
      ctx.fillStyle = '#37474F'; ctx.fillRect(ex, py, pw, ph);
      ctx.fillStyle = '#1C313A'; ctx.fillRect(ex+pw-3, py+3, 3, ph-3); ctx.fillRect(ex+3, py+ph-3, pw-3, 3);
      ctx.fillStyle = '#546E7A'; ctx.fillRect(ex+1, py+1, pw-4, 2); ctx.fillRect(ex+1, py+1, 2, ph-4);
      // Shoulder plates
      ctx.fillStyle = '#263238';
      ctx.fillRect(ex - 4, py + 2, 5, ph * 0.45); ctx.fillRect(ex + pw - 1, py + 2, 5, ph * 0.45);
      ctx.fillStyle = '#455A64';
      ctx.fillRect(ex - 3, py + 3, 3, ph * 0.43); ctx.fillRect(ex + pw, py + 3, 3, ph * 0.43);
      // Panel seams
      ctx.fillStyle = '#1C313A';
      ctx.fillRect(ex, py + ph*0.5, pw, 2); ctx.fillRect(ex + pw*0.5, py, 2, ph);
      ctx.fillRect(ex, py + ph*0.25, pw, 1); ctx.fillRect(ex, py + ph*0.75, pw, 1);
      // Hazard stripes
      ctx.save();
      ctx.beginPath(); ctx.rect(ex, py, pw, ph); ctx.clip();
      ctx.fillStyle = '#E65100';
      for (let s = -pw; s < pw * 2; s += 8) ctx.fillRect(ex + s, py + ph * 0.43, 4, ph * 0.14);
      ctx.restore();
      // Pulsing energy core
      const pulse = 0.6 + Math.sin(tick * 0.15) * 0.4;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#FF6F00'; ctx.shadowColor = '#FF6F00'; ctx.shadowBlur = 10 * pulse;
      ctx.fillRect(ex + pw*0.5 - 4, py + ph*0.38, 8, 8);
      ctx.shadowBlur = 0; ctx.globalAlpha = 1;
      // Rivets
      ctx.fillStyle = '#78909C';
      for (const [rx,ry] of [[ex+3,py+3],[ex+pw-6,py+3],[ex+3,py+ph-6],[ex+pw-6,py+ph-6],[ex+3,py+ph*0.5-1],[ex+pw-6,py+ph*0.5-1],[ex+pw*0.5-1,py+3],[ex+pw*0.5-1,py+ph-6]])
        { ctx.beginPath(); ctx.arc(rx, ry, 2, 0, Math.PI*2); ctx.fill(); }
      // Dual antennas
      ctx.fillStyle = '#546E7A';
      ctx.fillRect(ex + pw*0.3 - 1, py - 9, 2, 9); ctx.fillRect(ex + pw*0.7 - 1, py - 9, 2, 9);
      ctx.fillStyle = '#FF1744'; ctx.shadowColor = '#FF1744'; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(ex + pw*0.3, py - 10, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex + pw*0.7, py - 10, 3, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      // Eyes (wide red)
      const eyeYa = py + ph * 0.26;
      ctx.fillStyle = '#FF1744';
      if (fr) { ctx.fillRect(ex+pw*0.50, eyeYa, 7, 5); ctx.fillRect(ex+pw*0.72, eyeYa, 7, 5); }
      else    { ctx.fillRect(ex+pw*0.12, eyeYa, 7, 5); ctx.fillRect(ex+pw*0.34, eyeYa, 7, 5); }
      // Grille
      ctx.fillStyle = '#0D1F26';
      const grYa = py + ph*0.58;
      if (fr) { for (let i=0; i<5; i++) ctx.fillRect(ex+pw*.48+i*4, grYa, 3, 5); }
      else    { for (let i=0; i<5; i++) ctx.fillRect(ex+pw*.08+i*4, grYa, 3, 5); }
    } else {
      // Standard robot variant
      ctx.fillStyle = '#546E7A'; ctx.fillRect(ex, py, pw, ph);
      ctx.fillStyle = '#37474F'; ctx.fillRect(ex+pw-3, py+3, 3, ph-3); ctx.fillRect(ex+3, py+ph-3, pw-3, 3);
      ctx.fillStyle = '#78909C'; ctx.fillRect(ex+1, py+1, pw-4, 2); ctx.fillRect(ex+1, py+1, 2, ph-4);
      // Panel seams
      ctx.fillStyle = '#37474F';
      ctx.fillRect(ex, py + ph*0.5, pw, 2); ctx.fillRect(ex + pw*0.5, py, 2, ph);
      // Corner rivets
      ctx.fillStyle = '#90A4AE';
      for (const [rx,ry] of [[ex+3,py+3],[ex+pw-6,py+3],[ex+3,py+ph-6],[ex+pw-6,py+ph-6]])
        { ctx.beginPath(); ctx.arc(rx, ry, 2, 0, Math.PI*2); ctx.fill(); }
      // Antenna
      ctx.fillStyle = '#607D8B'; ctx.fillRect(ex + pw*0.5 - 1, py - 6, 2, 6);
      ctx.fillStyle = '#FF1744';
      ctx.beginPath(); ctx.arc(ex + pw*0.5, py - 7, 2.5, 0, Math.PI*2); ctx.fill();
      // Eyes
      const eyeYs = py + ph * 0.28;
      ctx.fillStyle = '#FF1744';
      if (fr) { ctx.fillRect(ex+pw*0.52, eyeYs, 5, 4); ctx.fillRect(ex+pw*0.73, eyeYs, 5, 4); }
      else    { ctx.fillRect(ex+pw*0.15, eyeYs, 5, 4); ctx.fillRect(ex+pw*0.36, eyeYs, 5, 4); }
      // Grille
      ctx.fillStyle = '#263238';
      const grYs = py + ph*0.58;
      if (fr) { for (let i=0; i<4; i++) ctx.fillRect(ex+pw*.52+i*5, grYs, 3, 5); }
      else    { for (let i=0; i<4; i++) ctx.fillRect(ex+pw*.12+i*5, grYs, 3, 5); }
    }
  }

  // Swimmer skin: diving mask + snorkel
  if (equippedSkin === 'swimmer') {
    const fr = p.facingRight;
    // Mask strap (across forehead)
    ctx.fillStyle = '#000'; ctx.fillRect(ex, py + Math.floor(ph*0.18), pw, 4);
    // Mask lens (tinted goggle over eyes)
    const lensY = py + Math.floor(ph*0.25);
    ctx.fillStyle = 'rgba(0,188,212,0.55)';
    if (fr) { ctx.fillRect(ex+pw*0.44, lensY, pw*0.44, ph*0.24); }
    else    { ctx.fillRect(ex+pw*0.12, lensY, pw*0.44, ph*0.24); }
    // Mask frame
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
    if (fr) { ctx.strokeRect(ex+pw*0.44, lensY, pw*0.44, ph*0.24); }
    else    { ctx.strokeRect(ex+pw*0.12, lensY, pw*0.44, ph*0.24); }
    // Lens shine
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    if (fr) { ctx.fillRect(ex+pw*0.47, lensY+2, pw*0.12, ph*0.08); }
    else    { ctx.fillRect(ex+pw*0.15, lensY+2, pw*0.12, ph*0.08); }
    // Snorkel tube (on outside face edge)
    ctx.fillStyle = '#FF7043'; ctx.fillRect(fr ? ex+pw-2 : ex-2, py, 4, ph*0.55);
    ctx.fillStyle = '#BF360C'; ctx.fillRect(fr ? ex+pw-2 : ex-2, py, 2, ph*0.55);
    // Snorkel bend at top
    ctx.fillStyle = '#FF7043'; ctx.fillRect(fr ? ex+pw-10 : ex-2, py-6, 12, 4);
    // Flippers hint at bottom (small orange feet)
    ctx.fillStyle = '#FF7043';
    ctx.fillRect(ex - 3, py + ph - 4, pw + 6, 4);
    ctx.fillStyle = '#E64A19'; ctx.fillRect(ex-3, py+ph-4, pw+6, 2);
  }

  if (equippedSkin === 'owner') {
    // OWNER sign floating above head
    const signW = pw + 14, signH = 10;
    const signX = ex - 7, signY = py - signH - 5;
    ctx.fillStyle = '#111'; ctx.fillRect(signX, signY, signW, signH);
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1;
    ctx.strokeRect(signX + 0.5, signY + 0.5, signW - 1, signH - 1);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
    ctx.fillText('OWNER', ex + pw / 2, signY + 8);
    ctx.textAlign = 'left';
    // Sign post (little stick connecting to head)
    ctx.fillStyle = '#888'; ctx.fillRect(ex + pw/2 - 1, signY + signH, 2, 5);

    // MLG pixel sunglasses
    const glassY = py + Math.floor(ph * 0.28);
    const glassW = pw + 4, glassH = Math.floor(ph * 0.22);
    const glassX = ex - 2;
    // Bridge
    ctx.fillStyle = '#000'; ctx.fillRect(glassX + Math.floor(glassW*0.46), glassY + Math.floor(glassH*0.3), Math.floor(glassW*0.08), Math.floor(glassH*0.4));
    // Left lens
    ctx.fillStyle = '#000'; ctx.fillRect(glassX, glassY, Math.floor(glassW*0.45), glassH);
    // Right lens
    ctx.fillStyle = '#000'; ctx.fillRect(glassX + Math.floor(glassW*0.54), glassY, Math.floor(glassW*0.45), glassH);
    // Arm (temple) on face side
    ctx.fillStyle = '#000';
    if (p.facingRight) { ctx.fillRect(glassX + glassW - 1, glassY + 2, 4, 2); }
    else               { ctx.fillRect(glassX - 4, glassY + 2, 4, 2); }
    // Lens shine (white pixel checkers, top-left of each lens)
    ctx.fillStyle = '#FFF';
    ctx.fillRect(glassX + 2, glassY + 1, 2, 2);
    ctx.fillRect(glassX + 4, glassY + 3, 2, 2);
    ctx.fillRect(glassX + Math.floor(glassW*0.54) + 2, glassY + 1, 2, 2);
    ctx.fillRect(glassX + Math.floor(glassW*0.54) + 4, glassY + 3, 2, 2);

    // Smile
    const mouthY = py + Math.floor(ph * 0.62);
    const mouthW = Math.floor(pw * 0.42);
    const mouthX = p.facingRight ? ex + Math.floor(pw * 0.38) : ex + Math.floor(pw * 0.2);
    ctx.fillStyle = '#000';
    ctx.fillRect(mouthX, mouthY, mouthW, 2);
    ctx.fillRect(mouthX, mouthY - 3, 2, 3);
    ctx.fillRect(mouthX + mouthW - 2, mouthY - 3, 2, 3);
  }

  if (equippedSkin === 'gamer') {
    // Blue screen background
    const screenX = ex + 2, screenY = py + 2, screenW = pw - 4, screenH = ph - 4;
    ctx.fillStyle = '#1A237E'; ctx.fillRect(screenX, screenY, screenW, screenH);

    // Colored squares row at top (blue, green, red, yellow)
    const sqS = Math.max(3, Math.floor(screenW / 5));
    const sqColors = ['#42A5F5','#66BB6A','#EF5350','#FFEE58'];
    const totalSqW = sqColors.length * sqS + (sqColors.length - 1);
    let sqX = screenX + Math.floor((screenW - totalSqW) / 2);
    const sqY = screenY + 1;
    for (const c of sqColors) {
      ctx.fillStyle = c; ctx.fillRect(sqX, sqY, sqS, sqS);
      sqX += sqS + 1;
    }

    // Controller pixel art — upper body + two grips below (slightly smaller)
    const ctTop = sqY + sqS + 2;
    const ctLeft = screenX + 3;
    const ctW = screenW - 6;
    const remaining = screenH - (ctTop - screenY) - 1;
    const bodyH = Math.max(2, Math.floor(remaining * 0.55));
    const gripH = Math.max(0, Math.floor((remaining - bodyH) * 0.6));
    const gripW = Math.floor(ctW * 0.24);

    // Upper body
    ctx.fillStyle = '#DDD';
    ctx.fillRect(ctLeft, ctTop, ctW, bodyH);
    // Left grip
    if (gripH > 0) ctx.fillRect(ctLeft, ctTop + bodyH, gripW, gripH);
    // Right grip
    if (gripH > 0) ctx.fillRect(ctLeft + ctW - gripW, ctTop + bodyH, gripW, gripH);

    // Circle (left side of body, instead of D-pad)
    const dpCX = ctLeft + Math.floor(ctW * 0.24);
    const dpCY = ctTop + Math.floor(bodyH * 0.5);
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(dpCX, dpCY, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Face buttons — diamond of 4 colored 1px dots (right side)
    const fbCX = ctLeft + Math.floor(ctW * 0.76);
    const fbCY = ctTop + Math.floor(bodyH * 0.45);
    ctx.fillStyle = '#EF5350'; ctx.fillRect(fbCX,     fbCY - 2, 2, 2); // top (red)
    ctx.fillStyle = '#FFEE58'; ctx.fillRect(fbCX + 2, fbCY,     2, 2); // right (yellow)
    ctx.fillStyle = '#42A5F5'; ctx.fillRect(fbCX - 2, fbCY,     2, 2); // left (blue)
    ctx.fillStyle = '#66BB6A'; ctx.fillRect(fbCX,     fbCY + 2, 2, 2); // bottom (green)

    // Center bump (start button)
    ctx.fillStyle = '#AAA';
    ctx.fillRect(ctLeft + Math.floor(ctW/2) - 1, ctTop + Math.floor(bodyH * 0.3), 3, 2);
  }

  if (equippedSkin === 'geometry') {
    // Orange/yellow gradient body (override cube color)
    const gx = ex, gy = py, gw = pw, gh = ph;
    // Black outline
    ctx.fillStyle = '#000'; ctx.fillRect(gx - 1, gy - 1, gw + 2, gh + 2);
    // Top half — bright yellow-orange
    ctx.fillStyle = '#FFB300'; ctx.fillRect(gx, gy, gw, Math.floor(gh/2));
    // Bottom half — deeper orange
    ctx.fillStyle = '#F57C00'; ctx.fillRect(gx, gy + Math.floor(gh/2), gw, gh - Math.floor(gh/2));
    // Side glow hint
    ctx.fillStyle = 'rgba(255,220,80,0.25)'; ctx.fillRect(gx, gy, 2, gh);

    // Cyan square eyes with black border — face direction player is moving
    const eyeSize = Math.max(3, Math.floor(gw * 0.22));
    const eyeY = gy + Math.floor(gh * 0.18);
    const eyeL = p.facingRight ? gx + Math.floor(gw * 0.52) : gx + Math.floor(gw * 0.16);
    const eyeR = p.facingRight ? gx + Math.floor(gw * 0.73) : gx + Math.floor(gw * 0.37);
    // Black borders
    ctx.fillStyle = '#000';
    ctx.fillRect(eyeL - 1, eyeY - 1, eyeSize + 2, eyeSize + 2);
    ctx.fillRect(eyeR - 1, eyeY - 1, eyeSize + 2, eyeSize + 2);
    // Cyan fill
    ctx.fillStyle = '#00E5FF';
    ctx.fillRect(eyeL, eyeY, eyeSize, eyeSize);
    ctx.fillRect(eyeR, eyeY, eyeSize, eyeSize);

    // Cyan wide mouth bar with black border
    const mouthH = Math.max(3, Math.floor(gh * 0.18));
    const mouthW = Math.floor(gw * 0.72);
    const mouthX = gx + Math.floor((gw - mouthW) / 2);
    const mouthY = gy + Math.floor(gh * 0.62);
    ctx.fillStyle = '#000';
    ctx.fillRect(mouthX - 1, mouthY - 1, mouthW + 2, mouthH + 2);
    ctx.fillStyle = '#00E5FF';
    ctx.fillRect(mouthX, mouthY, mouthW, mouthH);
  }

  // Face drawn on top — skip for murderer, robot, owner, gamer, and geometry (they have their own)
  if (equippedSkin !== 'murderer' && equippedSkin !== 'robot' && equippedSkin !== 'owner' && equippedSkin !== 'gamer' && equippedSkin !== 'geometry') {
    const eyeY = py + Math.floor(ph*0.28);
    ctx.fillStyle = '#000';
    if (p.facingRight) {
      ctx.fillRect(ex+pw*0.52, eyeY, eSize, eSize); ctx.fillRect(ex+pw*0.73, eyeY, eSize, eSize);
      ctx.fillStyle = '#FFF';
      ctx.fillRect(ex+pw*0.52+1, eyeY+1, 2, 2); ctx.fillRect(ex+pw*0.73+1, eyeY+1, 2, 2);
    } else {
      ctx.fillRect(ex+pw*0.15, eyeY, eSize, eSize); ctx.fillRect(ex+pw*0.36, eyeY, eSize, eSize);
      ctx.fillStyle = '#FFF';
      ctx.fillRect(ex+pw*0.15+1, eyeY+1, 2, 2); ctx.fillRect(ex+pw*0.36+1, eyeY+1, 2, 2);
    }
    // Smile — on bare cube or mechanic skin
    if (!equippedSkin || equippedSkin === 'mechanic') {
      const mouthY = py + Math.floor(ph * 0.62);
      const mouthW = Math.floor(pw * 0.42);
      const mouthX = p.facingRight ? ex + Math.floor(pw * 0.38) : ex + Math.floor(pw * 0.2);
      ctx.fillStyle = '#000';
      ctx.fillRect(mouthX, mouthY, mouthW, 2);          // bottom bar
      ctx.fillRect(mouthX, mouthY - 3, 2, 3);           // left corner curves up
      ctx.fillRect(mouthX + mouthW - 2, mouthY - 3, 2, 3); // right corner curves up
    }
  }
}

// ─── Generator / Wire Minigame ───────────────────────────────────────────────
function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function openGenerator(idx) {
  generatorOpen = true; activeGenIdx = idx;
  genStage = 0; genTransition = false; genTransTimer = 0;
  genStartTime = Date.now();
  initGenStage(0);
}
function initGenStage(stage) {
  genStage = stage;
  if (stage === 0) {
    wireLeftOrder = shuffleArr([0,1,2,3,4]); wireRightOrder = shuffleArr([0,1,2,3,4]);
    wireMatches = {}; wireSelected = null; wireErrorTimer = 0; wireErrorPos = -1;
  } else if (stage === 1) {
    seqPattern = Array.from({length:4}, () => Math.floor(Math.random()*4));
    seqPhase = 'showing'; seqTick = 0; seqPlayerIdx = 0; seqPressedBtn = -1; seqPressedTimer = 0;
  } else if (stage === 2) {
    gaugeTargets = Array.from({length:3}, () => 2 + Math.floor(Math.random()*7));
    gaugeValues  = Array.from({length:3}, () => 1);
  } else if (stage === 3) {
    patternTarget = Array.from({length:9}, () => Math.random() < 0.5);
    patternPlayer = Array(9).fill(false);
    patternPhase = 'show'; patternTimer = 150;
  } else if (stage === 4) {
    lightsGrid = Array(9).fill(false);
    for (let i = 0; i < 5; i++) toggleLightsOut(Math.floor(Math.random()*9));
    if (!lightsGrid.some(v => v)) toggleLightsOut(4);
  }
}
function advanceGenStage() {
  const next = genStage + 1;
  if (next >= 4) {
    generators[activeGenIdx].solved = true;
    generatorOpen = false; activeGenIdx = null;
    // 2 seconds of invincibility for completing the generator
    for (const p of [player1, player2]) { if (p) p.invincible = 120; }
    // Fixer badge: completed generator in under 30 seconds
    if ((Date.now() - genStartTime) < 30000 && !badges.has('fixer')) {
      badges.add('fixer'); localStorage.setItem('cb_badges', JSON.stringify([...badges]));
    }
  } else {
    genNextStage = next; genTransition = true; genTransTimer = 70;
  }
}
function checkWireSolved() {
  if (Object.keys(wireMatches).length === 5) advanceGenStage();
}
function toggleLightsOut(pos) {
  const r = Math.floor(pos/3), c = pos%3;
  for (const [nr,nc] of [[r,c],[r-1,c],[r+1,c],[r,c-1],[r,c+1]]) {
    if (nr>=0 && nr<3 && nc>=0 && nc<3) lightsGrid[nr*3+nc] = !lightsGrid[nr*3+nc];
  }
}
function drawGenerators() {
  for (const gen of generators) {
    const gx = sx(gen.x), dx = sx(gen.doorX);
    // Cable from generator to door
    ctx.strokeStyle = '#FF9800'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(gx+gen.w, gen.y+gen.h-10); ctx.lineTo(dx, gen.y+gen.h-10); ctx.stroke();
    ctx.strokeStyle = '#E65100'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(gx+gen.w, gen.y+gen.h-14); ctx.lineTo(dx, gen.y+gen.h-14); ctx.stroke();
    // Door
    const doorH = Math.max(0, GROUND_Y * (1 - gen.doorAnim));
    if (doorH > 0) {
      ctx.fillStyle = '#263238'; ctx.fillRect(dx-3, 0, 30, doorH);  // frame
      ctx.fillStyle = '#37474F'; ctx.fillRect(dx, 0, 24, doorH);     // body
      ctx.fillStyle = '#546E7A'; ctx.fillRect(dx+2, 0, 4, doorH);   // highlight
      ctx.fillStyle = '#1C2A30'; ctx.fillRect(dx+20, 0, 4, doorH);  // shadow
      ctx.fillStyle = '#263238';
      for (let gy = 36; gy < doorH; gy += 36) ctx.fillRect(dx, gy, 24, 2);  // seams
      ctx.fillStyle = '#607D8B';
      for (let gy = 16; gy < doorH; gy += 36) {
        ctx.beginPath(); ctx.arc(dx+6, gy, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(dx+18, gy, 2, 0, Math.PI*2); ctx.fill();
      }
      if (doorH > 8) { ctx.fillStyle='#E65100'; ctx.fillRect(dx, doorH-5, 24, 5); }
    }
    // Generator machine body

function drawGeneratorMinigame() {

function drawWireStage(PX,PY,PW,PH) {

  ctx.fillText('SOURCE', LC, PY+60); ctx.fillText('TARGET', RC, PY+60);

    const ly=CY0+i*CYS, ry=CY0+i*CYS;
    const lCol=WIRE_COLORS[wireLeftOrder[i]], rCol=WIRE_COLORS[wireRightOrder[i]];
    const lMatched=wireMatches[i]!==undefined, rMatchedByAny=Object.values(wireMatches).includes(i);
    const errFlash=wireErrorTimer>0&&wireErrorPos===i&&(wireErrorTimer%6<3), lSel=wireSelected===i;
    ctx.strokeStyle=lCol; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(PX,ly); ctx.lineTo(LC-12,ly); ctx.stroke();
    ctx.fillStyle=lMatched?lCol:lSel?'#FFF':'#263238'; ctx.strokeStyle=lCol; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(LC,ly,9,0,Math.PI*2); ctx.fill(); ctx.stroke();

    ctx.beginPath(); ctx.moveTo(RC+12,ry); ctx.lineTo(PX+PW,ry); ctx.stroke();
    ctx.fillStyle=rMatchedByAny?rCol:errFlash?'#FF1744':'#263238'; ctx.strokeStyle=rCol; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(RC,ry,9,0,Math.PI*2); ctx.fill(); ctx.stroke();
  }
  ctx.lineWidth=3;
  for (const [lPos,rPos] of Object.entries(wireMatches)) {
    const lp=parseInt(lPos), col=WIRE_COLORS[wireLeftOrder[lp]];
    const ly=CY0+lp*CYS, ry=CY0+rPos*CYS; ctx.strokeStyle=col;
    ctx.beginPath(); ctx.moveTo(LC+9,ly); ctx.bezierCurveTo(LC+80,ly,RC-80,ry,RC-9,ry); ctx.stroke();

  ctx.fillText(`${Object.keys(wireMatches).length}/5 connected`, W/2, PY+PH-18);
}

function drawPressureStage(PX,PY,PW,PH) {
  const gCX=[PX+80,PX+200,PX+320], gCY=PY+155;

    ctx.beginPath(); ctx.moveTo(gx+Math.cos(tA)*26,gCY+Math.sin(tA)*26); ctx.lineTo(gx+Math.cos(tA)*42,gCY+Math.sin(tA)*42); ctx.stroke();

function drawEnemies() {
  const darkMode = currentLevel === 2 && !hasNightVision() && currentAdventure === 0;
  const robotMode = currentAdventure === 1;
  for (const e of enemies) {
    if (!e.alive) {
      if (e.squish > 0) {
        const sh = Math.max(4,10*e.squish);

          const dl = robotMode ? '#78909C' : '#EF9A9A';

        }
