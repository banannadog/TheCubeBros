const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 450;

// Redirect all ctx.font assignments to use the pixel font automatically
(function() {
  const _fontDesc = Object.getOwnPropertyDescriptor(CanvasRenderingContext2D.prototype, 'font');
  Object.defineProperty(ctx, 'font', {
    get() { return _fontDesc.get.call(this); },
    set(val) { _fontDesc.set.call(this, val.replace(/(\d+(\.\d+)?)px/g, (_, n) => (Math.round(parseFloat(n) * 0.75)) + 'px').replace(/monospace/g, "'Press Start 2P', monospace")); }
  });
})();

function resizeCanvas() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Mobile Touch Controls ───────────────────────────────────────────────────
const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
const touch = { left: false, right: false, jump: false, interact: false, menu: false };
const TOUCH_BTNS = {
  left:     { x: 12,  y: 328, w: 62, h: 58, label: '◀' },
  right:    { x: 84,  y: 328, w: 62, h: 58, label: '▶' },
  menu:     { x: 369, y: 350, w: 62, h: 36, label: 'MENU' },
  interact: { x: 650, y: 328, w: 62, h: 58, label: 'USE' },
  jump:     { x: 722, y: 328, w: 62, h: 58, label: '▲' },
};
function updateTouchState(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  touch.left = touch.right = touch.jump = touch.interact = false;
  for (const t of e.touches) {
    const tx = (t.clientX - rect.left) * scaleX;
    const ty = (t.clientY - rect.top)  * scaleY;
    for (const [key, btn] of Object.entries(TOUCH_BTNS)) {
      if (tx >= btn.x && tx <= btn.x + btn.w && ty >= btn.y && ty <= btn.y + btn.h)
        touch[key] = true;
    }
    // Menu card selection on touch
    const cW = 220, cH = 200, cY = 148, c1X = W/2 - cW - 20, c2X = W/2 + 20;
    if (gameState === 'select') {
      if (tx >= c1X && tx <= c1X+cW && ty >= cY && ty <= cY+cH) { playTacoBell(); pendingPlayers=1; gameState='adventure'; menuSel=0; }
      if (tx >= c2X && tx <= c2X+cW && ty >= cY && ty <= cY+cH) { playTacoBell(); pendingPlayers=2; gameState='adventure'; menuSel=0; }
    }
    if (gameState === 'adventure') {
      const acW = 170, acH = 205, acY = 140;
      const ac1X = W/2-acW*1.5-15, ac2X = W/2-acW/2, ac3X = W/2+acW/2+15;
      if (tx >= ac1X && tx <= ac1X+acW && ty >= acY && ty <= acY+acH) { currentAdventure=0; playTacoBell(); gameState='difficulty'; menuSel=0; }
      if (badges.has('adventurer') && tx >= ac2X && tx <= ac2X+acW && ty >= acY && ty <= acY+acH) { currentAdventure=1; playTacoBell(); gameState='difficulty'; menuSel=0; }
      if (badges.has('engineer') && tx >= ac3X && tx <= ac3X+acW && ty >= acY && ty <= acY+acH) { currentAdventure=2; playTacoBell(); gameState='difficulty'; menuSel=0; }
    }
    if (gameState === 'difficulty') {
      if (tx >= c1X && tx <= c1X+cW && ty >= cY && ty <= cY+cH) { difficulty='easy'; playTacoBell(); initGame(pendingPlayers); }
      if (tx >= c2X && tx <= c2X+cW && ty >= cY && ty <= cY+cH) { difficulty='hard'; playTacoBell(); initGame(pendingPlayers); }
    }
  }
}
canvas.addEventListener('touchstart', updateTouchState, { passive: false });
canvas.addEventListener('touchmove',  updateTouchState, { passive: false });
canvas.addEventListener('touchend',   updateTouchState, { passive: false });

function drawTouchControls() {
  if (!isMobile) return;
  const showAll = gameState === 'playing' || gameState === 'cutscene' || gameState === 'mfcutscene';
  for (const [key, btn] of Object.entries(TOUCH_BTNS)) {
    // MENU button shows whenever a game is active; movement buttons only during gameplay
    if (key !== 'menu' && !showAll) continue;
    if (key === 'menu' && gameState === 'select') continue;
    const active = touch[key];
    const isMenu = key === 'menu';
    ctx.globalAlpha = active ? 0.85 : 0.4;
    ctx.fillStyle = active ? (isMenu ? '#FF6F00' : '#00E5FF') : (isMenu ? '#3A1800' : '#334');
    ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
    ctx.strokeStyle = isMenu ? '#FF6F00' : '#00E5FF'; ctx.lineWidth = 2;
    ctx.strokeRect(btn.x + 1, btn.y + 1, btn.w - 2, btn.h - 2);
    ctx.globalAlpha = active ? 1 : 0.75;
    ctx.fillStyle = active ? '#000' : (isMenu ? '#FF6F00' : '#00E5FF');
    ctx.font = 'bold ' + (btn.label === 'USE' || btn.label === 'MENU' ? '10' : '18') + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(btn.label, btn.x + btn.w / 2, btn.y + btn.h / 2 + (isMenu ? 4 : 6));
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}

// ─── Audio ───────────────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
document.addEventListener('keydown', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); });

const tacoBell = new Audio('https://www.myinstants.com/media/sounds/taco-bell-bong-sfx.mp3');
tacoBell.volume = 0.7;
function playTacoBell() { tacoBell.currentTime = 0; tacoBell.play().catch(()=>{}); }

function playCoinSound() {
  const play = () => {
    const t = audioCtx.currentTime;
    for (const [freq, start, dur] of [[988, 0, 0.07], [1319, 0.06, 0.28]]) {
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, t + start);
      gain.gain.setValueAtTime(0.4, t + start);
      gain.gain.exponentialRampToValueAtTime(0.001, t + start + dur);
      osc.start(t + start); osc.stop(t + start + dur + 0.01);
    }
  };
  if (audioCtx.state === 'suspended') audioCtx.resume().then(play); else play();
}

function playPowerupSound() {
  const play = () => {
    const t = audioCtx.currentTime;
    for (const [freq, start] of [[523,0],[659,0.08],[784,0.16],[1047,0.24]]) {
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + start);
      gain.gain.setValueAtTime(0.35, t + start);
      gain.gain.exponentialRampToValueAtTime(0.001, t + start + 0.18);
      osc.start(t + start); osc.stop(t + start + 0.2);
    }
  };
  if (audioCtx.state === 'suspended') audioCtx.resume().then(play); else play();
}

const particles = [];
function spawnParticles(x, y, color, n = 8) {
  for (let i = 0; i < n; i++) {
    const a = (Math.PI*2/n)*i + Math.random()*0.6, s = 2 + Math.random()*4;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s-1.5,
                     life: 1, decay: 0.03+Math.random()*0.025, size: 4+Math.random()*5, color });
  }
}

const moneyTrail = [];
const heartTrail = [];
const basicTrail = [];
const bubbleTrail = [];
function updateMoneyTrail() {
  // Spawn — money trail via equipped trail OR tycoon+speed legacy
  const wantMoney  = equippedTrail === 'money';
  const wantHearts = equippedTrail === 'hearts';
  const wantBasic  = equippedTrail === 'basic';
  const active = [player1, player2].filter(p => p && p.lives > 0);
  for (const p of active) {
    const tycoonBoost = equippedSkin === 'tycoon' && p.powerups.speed > 0;
    if (wantBasic && tick % 2 === 0) {
      basicTrail.push({
        x: p.x + p.w * 0.5 + (Math.random() - 0.5) * p.w * 0.4,
        y: p.y + p.h * 0.5 + (Math.random() - 0.5) * p.h * 0.4,
        size: 3 + Math.random() * 3,
        life: 1,
        decay: 0.04 + Math.random() * 0.02,
      });
    }
    if (tick % 3 !== 0) continue;
    if (wantMoney || tycoonBoost) {
      moneyTrail.push({
        x: p.x + p.w * 0.5 + (p.facingRight ? -p.w * 0.7 : p.w * 0.7),
        y: p.y + p.h * 0.2 + Math.random() * p.h * 0.5,
        vx: (p.facingRight ? -1 : 1) * (0.8 + Math.random() * 1.5),
        vy: -1.2 - Math.random() * 1.5,
        life: 1,
        decay: 0.022 + Math.random() * 0.014,
        size: 9 + Math.random() * 5,
      });
    }
    if (wantHearts) {
      heartTrail.push({
        x: p.x + p.w * 0.5 + (Math.random() - 0.5) * p.w,
        y: p.y + p.h * 0.3 + Math.random() * p.h * 0.4,
        vx: (Math.random() - 0.5) * 1.5,
        vy: -1.5 - Math.random() * 1.5,
        life: 1,
        decay: 0.018 + Math.random() * 0.012,
        size: 8 + Math.random() * 6,
      });
    }
    if (equippedTrail === 'bubbles') {
      bubbleTrail.push({
        x: p.x + p.w * 0.5 + (Math.random() - 0.5) * p.w * 0.6,
        y: p.y + p.h * 0.4 + Math.random() * p.h * 0.3,
        vx: (Math.random() - 0.5) * 0.8,
        vy: -0.8 - Math.random() * 1.2,
        life: 1,
        decay: 0.016 + Math.random() * 0.012,
        r: 3 + Math.random() * 4,
      });
    }
  }
  // Update money
  for (let i = moneyTrail.length - 1; i >= 0; i--) {
    const m = moneyTrail[i];
    m.x += m.vx; m.y += m.vy; m.vy += 0.08;
    m.life -= m.decay;
    if (m.life <= 0) moneyTrail.splice(i, 1);
  }
  // Update hearts
  for (let i = heartTrail.length - 1; i >= 0; i--) {
    const h = heartTrail[i];
    h.x += h.vx; h.y += h.vy; h.vy += 0.04;
    h.life -= h.decay;
    if (h.life <= 0) heartTrail.splice(i, 1);
  }
  // Update basic
  for (let i = basicTrail.length - 1; i >= 0; i--) {
    const b = basicTrail[i];
    b.life -= b.decay;
    if (b.life <= 0) basicTrail.splice(i, 1);
  }
  // Update bubbles
  for (let i = bubbleTrail.length - 1; i >= 0; i--) {
    const b = bubbleTrail[i];
    b.x += b.vx; b.y += b.vy;
    b.life -= b.decay;
    if (b.life <= 0) bubbleTrail.splice(i, 1);
  }
}

function hsvToHex(h, s, v) {

  const x = n => Math.round(f(n)*255).toString(16).padStart(2,'0');
  return `#${x(5)}${x(3)}${x(1)}`;
}
function hexToHsv(hex) {
  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
  const v=max, s=max===0?0:d/max;
  let h=0;
  if(d!==0){ if(max===r) h=((g-b)/d)%6; else if(max===g) h=(b-r)/d+2; else h=(r-g)/d+4; h=(h*60+360)%360; }
  return [h,s,v];
}

function applyPowerup(p, type) {
  if (type === 'speed') {
    p.powerups.speed = SPEED_FRAMES;
    spawnParticles(p.x + p.w/2, p.y + p.h/2, '#FFD700', 14);
    if (equippedSkin === 'murderer') jasonFlash = 60;
  } else if (type === 'size') {
    if (p.powerups.size === 0) { p.y -= 14; p.w = 42; p.h = 42; }
    p.powerups.size = POWERUP_FRAMES;
    spawnParticles(p.x + p.w/2, p.y + p.h/2, '#E040FB', 14);
  } else if (type === 'nightvision') {
    p.powerups.nightvision = NIGHTVISION_FRAMES;
    spawnParticles(p.x + p.w/2, p.y + p.h/2, '#00E5FF', 16);
  } else if (type === 'hammer') {
    p.hasHammer = true;
    spawnParticles(p.x + p.w/2, p.y + p.h/2, '#FF6F00', 18);
  }
  playPowerupSound();
}

    attack: () => keys['KeyF']  || touch.interact,

    left:   () => keys['ArrowLeft'],
    right:  () => keys['ArrowRight'],

  tookDamage = false;

}

function startLevel(n) {

    ? d.oxyBubbles.map(([x,y]) => ({ x, y, collected: false, bob: Math.random()*Math.PI*2 }))

// ─── Collision ───────────────────────────────────────────────────────────────
function overlap(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function resolveX(ent) {
  for (const [px,py,pw,ph] of platforms) {
    if (!overlap(ent.x,ent.y,ent.w,ent.h,px,py,pw,ph)) continue;
    if (ent.vx > 0) ent.x = px - ent.w; else ent.x = px + pw;
    ent.vx = 0;
  }
}
function resolveY(ent) {
  for (const [px,py,pw,ph] of platforms) {
    if (!overlap(ent.x,ent.y,ent.w,ent.h,px,py,pw,ph)) continue;
    if (ent.vy >= 0) { ent.y = py - ent.h; ent.vy = 0; ent.onGround = true; }
    else             { ent.y = py + ph;     ent.vy = 0; }
  }
}

// ─── Player Update ───────────────────────────────────────────────────────────
function updatePlayer(p) {
  if (!p || p.lives <= 0) return;
  const wasBig = p.powerups.size > 0;
  const wasSpeed = p.powerups.speed > 0;
  if (p.powerups.speed      > 0) p.powerups.speed--;
  if (wasSpeed && p.powerups.speed === 0 && equippedSkin === 'murderer') jasonFlash = 25;
  if (p.powerups.size       > 0) p.powerups.size--;
  if (p.powerups.nightvision > 0) p.powerups.nightvision--;
  if (p.knifeSwing          > 0) p.knifeSwing--;
  if (wasBig && p.powerups.size === 0) {
    p.w = p.baseW; p.h = p.baseH;
    if (p.onGround) p.y += 14;
  }
  const spd = MOVE_SPEED * (p.powerups.speed > 0 ? 2.0 : 1.0);
  const cutsceneLock = (currentAdventure === 1 && currentLevel === 3 && !mfBossCutsceneDone)
                    || (currentAdventure === 0 && currentLevel === 3 && ckBossCutsceneActive)
                    || (currentAdventure === 2 && currentLevel === 3 && uwSharkIntroTimer > 0);
  if (!cutsceneLock) {
    if (p.ctrl.left())       { p.vx = -spd; p.facingRight = false; }
    else if (p.ctrl.right()) { p.vx =  spd; p.facingRight = true;  }
    else                     { p.vx *= 0.78; if (Math.abs(p.vx) < 0.2) p.vx = 0; }
  } else { p.vx *= 0.8; if (Math.abs(p.vx) < 0.2) p.vx = 0; }
  if (p.onGround) p.coyoteTime = 8;
  else if (p.coyoteTime > 0) p.coyoteTime--;
  if (!cutsceneLock && p.ctrl.jump() && p.coyoteTime > 0) { p.vy = JUMP_FORCE; p.coyoteTime = 0; p.wobble = 7; }
  p.vy = Math.min(p.vy + (p.vy > 0 ? GRAVITY * 0.65 : GRAVITY), MAX_FALL);
  p.onGround = false;
  if (p.wobble > 0) p.wobble--;
  p.x += p.vx;
  const arenaWall = (currentAdventure === 1 && currentLevel === 3) ? 18 : 0;
  if (p.x < arenaWall) { p.x = arenaWall; p.vx = 0; }
  else if (p.x < 0) { p.x = 0; p.vx = 0; }
  if (p.x + p.w > levelW - arenaWall) { p.x = levelW - arenaWall - p.w; p.vx = 0; }
  resolveX(p);
  // Door collision for MF generators
  for (const gen of generators) {
    const doorH = GROUND_Y * (1 - gen.doorAnim);
    if (doorH <= 2) continue;
    if (p.x + p.w > gen.doorX && p.x < gen.doorX + 24 && p.y < doorH) {
      if (p.x + p.w / 2 <= gen.doorX + 12) { p.x = gen.doorX - p.w; } else { p.x = gen.doorX + 24; }
      p.vx = 0;
    }
  }
  p.y += p.vy;
  resolveY(p);
  if (p.y > H + 100) {
    p.lives--; tookDamage = true; checkMistakesBadge(p); checkNyctophobiaBadge(p);
    if (p.lives <= 0) return;
    p.x = Math.max(60, camX + 40);
    p.y = GROUND_Y - p.h - 10;
    p.vx = 0; p.vy = 0; p.invincible = 80;
  }
  if (p.invincible > 0) p.invincible--;
  // Attack edge detection (one-shot per press)
  const atk = p.ctrl.attack && p.ctrl.attack();
  p.justAttacked = atk && !p.attackPressed;
  p.attackPressed = atk;
}

// ─── Boss Update ─────────────────────────────────────────────────────────────
function updateBoss(active) {
  if (!boss || boss.lives <= 0 || !boss.active || active.length === 0) return;
  boss.stateTimer++;
  if (boss.invincible > 0) boss.invincible--;
  if (bossHitCooldown > 0) bossHitCooldown--;

  // Boss gravity
  boss.vy = Math.min(boss.vy + GRAVITY, MAX_FALL);
  boss.onGround = false;
  boss.y += boss.vy;
  resolveY(boss);
  boss.x += boss.vx;
  boss.x = Math.max(4575, Math.min(boss.x, 5400 - boss.w - 10));

  const nearest = active.reduce((a,b) => Math.abs(b.x-boss.x)<Math.abs(a.x-boss.x)?b:a, active[0]);

  if (boss.state === 'idle') {
    const dir = nearest.x > boss.x ? 1 : -1;
    boss.vx = dir * 1.4;
    boss.facingRight = dir > 0;
    if (boss.stateTimer >= 90) {
      boss.state = 'swinging'; boss.stateTimer = 0; boss.vx = 0;
    }
  } else if (boss.state === 'swinging') {
    boss.vx = 0;
    const swingFrame = boss.stateTimer % 40;
    boss.facingRight = nearest.x > boss.x;
    // Active hitbox: frames 8-28 of each 40-frame swing
    if (swingFrame >= 8 && swingFrame <= 28) {
      const swordX = boss.facingRight ? boss.x + boss.w : boss.x - 38;
      for (const p of active) {
        if (p.invincible > 0) continue;
        if (overlap(swordX, boss.y+18, 38, 14, p.x, p.y, p.w, p.h)) {
          if (difficulty === 'hard') p.lives = 0; else p.lives--;
          tookDamage = true; checkMistakesBadge(p); checkNyctophobiaBadge(p); p.invincible = 100; p.vy = -7;
          p.vx = p.x < boss.x + boss.w/2 ? -5 : 5;
          spawnParticles(p.x+p.w/2, p.y+p.h/2, '#FF4444', 10);
        }
      }
    }
    if (boss.stateTimer >= 120) {
      boss.state = 'tired'; boss.stateTimer = 0;
      const sx2 = boss.facingRight ? boss.x + boss.w + 6 : boss.x - 38;
      boss.droppedSword = { x: sx2, y: GROUND_Y - 14, w: 34, h: 10, pickedUp: false };
    }
  } else if (boss.state === 'tired') {
    boss.vx = 0;
    // Sword pickup
    if (boss.droppedSword && !boss.droppedSword.pickedUp) {
      for (const p of active) {
        if (overlap(p.x,p.y,p.w,p.h, boss.droppedSword.x,boss.droppedSword.y,boss.droppedSword.w,boss.droppedSword.h)) {
          boss.droppedSword.pickedUp = true;
          playerHasSword = true;
          playPowerupSound();
        }
      }
    }
    // Player sword attack (press F when close)
    if (playerHasSword && bossHitCooldown <= 0) {
      for (const p of active) {
        if (!p.justAttacked) continue;
        const dist = Math.abs((p.x+p.w/2) - (boss.x+boss.w/2));
        if (dist <= 60) {
          boss.lives--;
          bossHitCooldown = 50;
          playerHasSword = false;
          spawnParticles(boss.x+boss.w/2, boss.y+boss.h/2, '#FFD700', 18);
          if (boss.lives <= 0) {
            victoryDoor = { x: boss.x - 60, y: GROUND_Y - 50, w: 28, h: 50 };
            if (!badges.has('swordfighter')) {
              badges.add('swordfighter');
              localStorage.setItem('cb_badges', JSON.stringify([...badges]));
              badgeNotif = { name: 'Swordfighter', timer: 240 };
            }
            return;
          }
          boss.state = 'idle'; boss.stateTimer = 0; boss.droppedSword = null;
        }
      }
    }
    if (boss.stateTimer >= BOSS_TIRED_FRAMES) {
      boss.state = 'idle'; boss.stateTimer = 0; boss.droppedSword = null;
      playerHasSword = false;
    }
  }
}

// ─── MF Boss Cutscene / Update ────────────────────────────────────────────────
function updateMFBoss() {
  if (!mfBoss) return;
  mfBossCutsceneTimer++;
  const t = mfBossCutsceneTimer;
  if (mfBossScreenFlash > 0) mfBossScreenFlash -= 0.08;

  // Auto-move player during cutscene
  if (!mfBossCutsceneDone) {
    for (const p of [player1, player2]) {
      if (!p) continue;
      if (mfBossCutscenePhase === 'walk') {
        if (p.x < 240) { p.x += 2.2; p.facingRight = true; }
        p.vx = 0;
      } else {
        p.vx = 0; // hold still
      }
    }
  }

  if (mfBossCutscenePhase === 'walk') {
    if (t >= 130) { mfBossCutscenePhase = 'pause'; mfBossCutsceneTimer = 0; }

  } else if (mfBossCutscenePhase === 'pause') {
    if (t >= 50) { mfBossCutscenePhase = 'appear'; mfBossCutsceneTimer = 0; }

  } else if (mfBossCutscenePhase === 'appear') {
    // Boss falls from ceiling
    mfBoss.vy += 1.4;
    mfBoss.y += mfBoss.vy;
    if (mfBoss.y >= GROUND_Y - mfBoss.h) {
      mfBoss.y = GROUND_Y - mfBoss.h;
      mfBoss.vy = 0;
      mfBossScreenFlash = 1.0;
      spawnParticles(mfBoss.x + mfBoss.w/2, mfBoss.y + mfBoss.h, '#546E7A', 28);
      spawnParticles(mfBoss.x + mfBoss.w/2, mfBoss.y + mfBoss.h, '#FF6F00', 14);
      mfBossCutscenePhase = 'impact'; mfBossCutsceneTimer = 0;
    }

  } else if (mfBossCutscenePhase === 'impact') {
    if (t >= 35) { mfBossCutscenePhase = 'rise'; mfBossCutsceneTimer = 0; }

  } else if (mfBossCutscenePhase === 'rise') {
    // Boss rises into air
    mfBoss.y -= 1.8;
    if (mfBoss.y <= mfBoss.targetY) {
      mfBoss.y = mfBoss.targetY;
      mfBossCutscenePhase = 'text'; mfBossCutsceneTimer = 0;
    }

  } else if (mfBossCutscenePhase === 'text') {
    if (t >= 140) {
      mfBossCutscenePhase = 'done';
      mfBossCutsceneDone = true;
      mfBoss.phase = 'idle'; mfBoss.phaseTimer = 0;
    }
  }

  // ── Battle phase ──────────────────────────────────────────────────────────
  if (!mfBossCutsceneDone || !mfBoss) return;
  const b = mfBoss;
  if (b.invincible > 0) b.invincible--;
  b.phaseTimer++;

  // Update boss lasers
  for (let i = bossLasers.length - 1; i >= 0; i--) {
    const bl = bossLasers[i];
    bl.x += bl.vx; bl.y += bl.vy;
    if (bl.x < -60 || bl.x > levelW + 60 || bl.y > GROUND_Y + 60) { bossLasers.splice(i, 1); continue; }
    for (const p of [player1, player2]) {
      if (!p || p.invincible > 0) continue;
      if (Math.hypot(p.x + p.w/2 - bl.x, p.y + p.h/2 - bl.y) < bl.r + 13) {
        p.lives -= difficulty === 'hard' ? 2 : 1; tookDamage = true;
        checkMistakesBadge(p); p.invincible = 100; p.vy = -7;
        p.vx = p.x < bl.x ? -5 : 5;
        spawnParticles(bl.x, bl.y, '#FF1744', 10);
        bossLasers.splice(i, 1); break;
      }
    }
  }

  if (b.phase === 'idle') {
    b.y = b.targetY + Math.sin(tick * 0.05) * 8;
    if (b.phaseTimer >= 55) { b.phase = 'shooting'; b.phaseTimer = 0; b.shootRound = 0; b.ballsFired = 0; b.shootTimer = 20; }

  } else if (b.phase === 'shooting') {
    b.y = b.targetY + Math.sin(tick * 0.05) * 8;
    b.shootTimer--;
    if (b.shootTimer <= 0 && b.ballsFired < 3) {
      // Fire one ball aimed at player
      const p = player1 && player1.lives > 0 ? player1 : player2;
      if (p) {
        const a = Math.atan2((p.y+p.h/2)-(b.y+b.h/2), (p.x+p.w/2)-(b.x+b.w/2));
        bossLasers.push({ x: b.x+b.w/2, y: b.y+b.h/2, vx: Math.cos(a)*5, vy: Math.sin(a)*5, r: 9 });
        spawnParticles(b.x+b.w/2, b.y+b.h/2, '#FF6F00', 5);
      }
      b.ballsFired++;
      b.shootTimer = 30; // 30 frames between each ball
    }
    if (b.ballsFired >= 3 && b.shootTimer <= 0) {
      if (b.shootRound === 0) {
        // First round done — pause then second round
        b.phase = 'waiting'; b.phaseTimer = 0;
      } else {
        // Second round done — fall
        b.phase = 'falling'; b.phaseTimer = 0; b.vy = 0;
      }
    }

  } else if (b.phase === 'waiting') {
    b.y = b.targetY + Math.sin(tick * 0.05) * 8;
    if (b.phaseTimer >= 50) { b.phase = 'shooting'; b.phaseTimer = 0; b.shootRound = 1; b.ballsFired = 0; b.shootTimer = 20; }

  } else if (b.phase === 'falling') {
    b.vy += 0.9;
    b.y += b.vy;
    if (b.y >= GROUND_Y - b.h) {
      b.y = GROUND_Y - b.h; b.vy = 0;
      b.phase = 'grounded'; b.phaseTimer = 0;
      bossLasers.length = 0;
      spawnParticles(b.x + b.w/2, b.y + b.h, '#546E7A', 24);
      mfBossScreenFlash = 0.5;
    }

  } else if (b.phase === 'grounded') {
    // Auto-rise after 10 seconds even if not stomped
    if (b.phaseTimer >= 600) { b.phase = 'rising'; b.phaseTimer = 0; }
    if (b.invincible > 0) return;
    for (const p of [player1, player2]) {
      if (!p || p.invincible > 0 || p.lives <= 0) continue;
      if (p.vy > 0 && (p.y + p.h) < (b.y + b.h * 0.45 + p.vy + 4) &&
          overlap(p.x, p.y, p.w, p.h, b.x - 4, b.y, b.w + 8, b.h)) {
        b.hp--;
        p.vy = -11; b.invincible = 60;
        spawnParticles(b.x + b.w/2, b.y + b.h * 0.25, '#FF6F00', 20);
        mfBossScreenFlash = 0.7;
        if (b.hp <= 0) {
          b.phase = 'dead';
          spawnParticles(b.x + b.w/2, b.y + b.h/2, '#FF1744', 40);
          spawnParticles(b.x + b.w/2, b.y + b.h/2, '#FF6F00', 30);
        } else {
          b.phase = 'hit'; b.phaseTimer = 0;
        }
        break;
      }
    }

  } else if (b.phase === 'hit') {
    // Brief flash stagger before rising
    if (b.phaseTimer >= 45) { b.phase = 'rising'; b.phaseTimer = 0; }

  } else if (b.phase === 'rising') {
    b.y -= 2.5;
    if (b.y <= b.targetY) {
      b.y = b.targetY; b.phase = 'idle'; b.phaseTimer = 0;
    }
  }
}

function drawBossLasers() {
  for (const bl of bossLasers) {
    const bx = sx(bl.x);
    const pulse = 0.7 + Math.sin(tick * 0.3 + bl.x) * 0.3;
    ctx.shadowColor = '#FF6F00'; ctx.shadowBlur = 14 * pulse;
    ctx.fillStyle = '#FF6F00';
    ctx.beginPath(); ctx.arc(bx, bl.y, bl.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFCC80';
    ctx.beginPath(); ctx.arc(bx - 2, bl.y - 2, bl.r * 0.45, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawMFBossIntroOverlay() {

  }
}

function drawCKBossCutscene() {
  if (!ckBossCutsceneActive) return;
  const t = ckBossCutsceneTimer;

  // Letterbox bars
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, 44);
  ctx.fillRect(0, H - 44, W, 44);

  if (ckBossCutscenePhase === 'text') {
    const alpha = Math.min(1, t / 22);
    ctx.globalAlpha = alpha;

// Draw the MF boss cube (big armored robot)
function drawMFBoss() {
  if (!mfBoss) return;
  const bx = sx(mfBoss.x);
  const by = mfBoss.y;
  const bw = mfBoss.w, bh = mfBoss.h;
  const pulse = 0.6 + Math.sin(tick * 0.15) * 0.4;

  // Shadow on ground when hovering
  if (mfBossCutsceneDone || mfBossCutscenePhase === 'rise' || mfBossCutscenePhase === 'text') {
    const shadowAlpha = 0.3 * (1 - (GROUND_Y - bh - by) / 200);
    if (shadowAlpha > 0) {
      ctx.fillStyle = `rgba(0,0,0,${shadowAlpha.toFixed(2)})`;
      ctx.fillRect(bx + bw * 0.1, GROUND_Y - 6, bw * 0.8, 10);
    }
  }

  // Shoulder armor plates
  ctx.fillStyle = '#1C313A';
  ctx.fillRect(bx - 6, by + 4, 7, bh * 0.4);
  ctx.fillRect(bx + bw - 1, by + 4, 7, bh * 0.4);
  ctx.fillStyle = '#37474F';
  ctx.fillRect(bx - 5, by + 5, 4, bh * 0.38);
  ctx.fillRect(bx + bw, by + 5, 4, bh * 0.38);

  // Body
  drawCube(mfBoss.x, by, bw, bh, '#263238', '#1C313A', '#37474F');

  // Panel seams
  ctx.fillStyle = '#1C313A';
  ctx.fillRect(bx, by + bh*0.5, bw, 2);
  ctx.fillRect(bx + bw*0.5, by, 2, bh);
  ctx.fillRect(bx, by + bh*0.25, bw, 1);
  ctx.fillRect(bx, by + bh*0.75, bw, 1);

  // Orange hazard stripe
  ctx.save();
  ctx.beginPath(); ctx.rect(bx, by, bw, bh); ctx.clip();
  ctx.fillStyle = '#E65100';
  for (let s = -bw; s < bw*2; s += 10) ctx.fillRect(bx + s, by + bh*0.42, 5, bh*0.16);
  ctx.restore();

  // Pulsing energy core (orange, bigger than L3 enemies)
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#FF6F00';
  ctx.shadowColor = '#FF6F00'; ctx.shadowBlur = 16 * pulse;
  ctx.fillRect(bx + bw*0.5 - 7, by + bh*0.36, 14, 14);
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;

  // Rivets (10 — more than L3)
  ctx.fillStyle = '#546E7A';
  for (const [rx,ry] of [
    [bx+4,by+4],[bx+bw-7,by+4],[bx+4,by+bh-7],[bx+bw-7,by+bh-7],
    [bx+4,by+bh*0.5-1],[bx+bw-7,by+bh*0.5-1],
    [bx+bw*0.5-1,by+4],[bx+bw*0.5-1,by+bh-7],
    [bx+bw*0.25,by+bh*0.25],[bx+bw*0.75,by+bh*0.25],
  ]) {
    ctx.beginPath(); ctx.arc(rx, ry, 2.5, 0, Math.PI*2); ctx.fill();
  }

  // Dual antennas (taller)
  ctx.fillStyle = '#455A64';
  ctx.fillRect(bx + bw*0.28 - 1.5, by - 14, 3, 14);
  ctx.fillRect(bx + bw*0.72 - 1.5, by - 14, 3, 14);
  ctx.shadowColor = '#FF1744'; ctx.shadowBlur = 14 * pulse;
  ctx.fillStyle = '#FF1744';
  ctx.beginPath(); ctx.arc(bx + bw*0.28, by - 15, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx + bw*0.72, by - 15, 4, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Eyes (large, glowing)
  const eyeY = by + bh * 0.25;
  ctx.shadowColor = '#FF1744'; ctx.shadowBlur = 22 * pulse;
  ctx.fillStyle = '#FF1744';
  ctx.fillRect(bx + bw*0.16, eyeY, 12, 8);
  ctx.fillRect(bx + bw*0.58, eyeY, 12, 8);
  ctx.shadowBlur = 0;

  // Grille (wide)
  ctx.fillStyle = '#0D1F26';
  const grY = by + bh * 0.58;
  for (let i = 0; i < 6; i++) ctx.fillRect(bx + bw*0.12 + i*5, grY, 4, 7);

  // Hit flash — white overlay on boss when stomped
  if (mfBossCutsceneDone && (mfBoss.phase === 'hit' || mfBoss.invincible > 40)) {
    ctx.globalAlpha = 0.55 + Math.sin(tick * 0.8) * 0.3;
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(bx - 6, by - 16, bw + 12, bh + 16);
    ctx.globalAlpha = 1;
  }

  // "STOMP ME!" hint when grounded
  if (mfBossCutsceneDone && mfBoss.phase === 'grounded' && mfBoss.invincible === 0) {
    const ap = 0.7 + Math.sin(tick * 0.15) * 0.3;
    ctx.globalAlpha = ap;
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
    ctx.fillText('⬇ STOMP!', bx + bw/2, by - 24);
    ctx.globalAlpha = 1; ctx.textAlign = 'left';
  }

  // HP bar (only when battle started)
  if (mfBossCutsceneDone) {
    const barW = 160, barX = W/2 - barW/2, barY = 52;
    ctx.fillStyle = '#111'; ctx.fillRect(barX - 2, barY - 2, barW + 4, 14);
    ctx.fillStyle = '#B71C1C'; ctx.fillRect(barX, barY, barW, 10);
    ctx.fillStyle = '#F44336';
    ctx.fillRect(barX, barY, barW * (mfBoss.hp / mfBoss.maxHp), 10);
    // Heart icons for lives
    ctx.font = '10px monospace'; ctx.textAlign = 'left';
    for (let i = 0; i < mfBoss.maxHp; i++) {
      ctx.fillStyle = i < mfBoss.hp ? '#F44336' : '#333';
      ctx.fillText('♥', barX + i * 16, barY + 9);
    }
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
    ctx.fillText('FACTORY COMMANDER', W/2, barY - 3);
    ctx.textAlign = 'left';
  }
}

function updateMFVictoryCutscene() {
  if (!mfVictoryCutscene) return;
  const cs = mfVictoryCutscene;
  cs.timer++;

  if (cs.phase === 'spin') {
    cs.hammerAngle += 0.22;
    if (cs.timer >= 120) { // 2 seconds of spinning
      cs.phase = 'throw'; cs.timer = 0;
      cs.hammerVX = 1.6; cs.hammerVY = -9;
    }
  } else if (cs.phase === 'throw') {
    cs.hammerAngle += 0.28; // keep spinning while flying
    cs.hammerX += cs.hammerVX;
    cs.hammerY += cs.hammerVY;
    cs.hammerVY += 0.1; // gravity
    cs.hammerVX *= 0.998;
    // Camera follows hammer upward
    const targetCamY = Math.max(0, cs.hammerY - H * 0.45);
    cs.camYOffset += (targetCamY - cs.camYOffset) * 0.1;
    if (cs.hammerVY >= 0) { cs.phase = 'halt'; cs.timer = 0; } // hammer peaked
  } else if (cs.phase === 'halt') {
    cs.hammerAngle += 0.03; // gentle slow drift
    cs.hammerY += cs.hammerVY;
    cs.hammerVY += 0.02; // very slow fall
    if (cs.timer >= 70) {
      cs.fadeAlpha = Math.min(1, cs.fadeAlpha + 0.018);
      if (cs.fadeAlpha >= 1) cs.phase = 'freeze';
    }
  }
}

function drawMFHand(cx, cy, sz) {
  // Small blue cube hand
  ctx.fillStyle = '#42A5F5'; ctx.fillRect(cx - sz/2, cy - sz/2, sz, sz);
  ctx.fillStyle = '#90CAF9'; ctx.fillRect(cx - sz/2, cy - sz/2, sz, 2);     // top highlight
  ctx.fillStyle = '#1565C0'; ctx.fillRect(cx - sz/2, cy + sz/2 - 2, sz, 2); // bottom shadow
  ctx.fillStyle = '#1976D2'; ctx.fillRect(cx + sz/2 - 2, cy - sz/2, 2, sz); // right shadow
  // Little knuckle lines
  ctx.fillStyle = '#1565C0';
  ctx.fillRect(cx - sz/2 + 2, cy + sz/2 - 4, sz - 4, 1);
}

function drawHammerItem(wx, wy, angle) {
  ctx.save();
  ctx.translate(wx, wy);
  ctx.rotate(angle);
  ctx.fillStyle = '#6D4C41'; ctx.fillRect(-2, -3, 4, 20);  // handle
  ctx.fillStyle = '#8D6E63'; ctx.fillRect(-2, 3, 4, 5);    // grip wrap
  ctx.fillStyle = '#546E7A'; ctx.fillRect(-11, -15, 22, 11); // head
  ctx.fillStyle = '#78909C'; ctx.fillRect(-10, -14, 20, 3);  // head highlight
  ctx.fillStyle = '#37474F'; ctx.fillRect(-11, -4, 22, 2);   // head dark edge
  ctx.fillStyle = '#90A4AE';
  ctx.beginPath(); ctx.arc(-7, -9, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7, -9, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawMFVictoryCutscene() {
  const cs = mfVictoryCutscene;
  const sz = 28;
  const P1c = player1 ? player1.colors : { mid: '#42A5F5', dark: '#1565C0', light: '#90CAF9' };
  const P2c = player2 ? player2.colors : { mid: '#EF5350', dark: '#B71C1C', light: '#EF9A9A' };

  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(0, -cs.camYOffset);

  // Background fill — extended for camera pan
  ctx.fillStyle = '#151515';
  ctx.fillRect(0, -400, W, 400 + GROUND_Y + 50);

  // Metal panel grid
  ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 1;
  for (let py = -400; py < GROUND_Y; py += 80) {
    for (let px = 0; px < W; px += 120) {
      ctx.strokeRect(px + 5, py + 5, 110, 70);
      ctx.fillStyle = '#1e1e1e';
      for (const [bx2,by2] of [[px+10,py+10],[px+115,py+10],[px+10,py+70],[px+115,py+70]]) {
        ctx.beginPath(); ctx.arc(bx2, by2, 1.5, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  // Ground
  ctx.fillStyle = '#546E7A'; ctx.fillRect(0, GROUND_Y, W, 40);
  ctx.fillStyle = '#607D8B'; ctx.fillRect(0, GROUND_Y, W, 6);
  ctx.fillStyle = '#37474F'; ctx.fillRect(0, GROUND_Y + 34, W, 6);
  ctx.fillStyle = '#78909C';
  for (let rx = 20; rx < W; rx += 48) { ctx.beginPath(); ctx.arc(rx, GROUND_Y + 3, 2, 0, Math.PI*2); ctx.fill(); }

  // Side platforms
  ctx.fillStyle = '#455A64';
  ctx.fillRect(160, 330, 100, 12); ctx.fillRect(600, 330, 100, 12);
  ctx.fillStyle = '#607D8B';
  ctx.fillRect(160, 330, 100, 3); ctx.fillRect(600, 330, 100, 3);

  // Player 2 watching (to the right, facing left)
  if (numPlayers === 2) {
    drawMiniCube(cs.p2X, cs.p2Y, sz, P2c.mid, P2c.dark, P2c.light);
    // Eyes on left side (watching P1)
    ctx.fillStyle = '#111';
    ctx.fillRect(cs.p2X + 3, cs.p2Y + 8, 4, 4);
    ctx.fillRect(cs.p2X + 10, cs.p2Y + 8, 4, 4);
    // "!" speech bubble
    const bubPulse = 0.7 + Math.sin(cs.timer * 0.1) * 0.3;
    ctx.globalAlpha = bubPulse;
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center';
    ctx.fillText('!', cs.p2X + sz/2, cs.p2Y - 10);
    ctx.globalAlpha = 1; ctx.textAlign = 'left';
  }

  // Player 1 — slight lunge forward during throw
  const p1LungeX = (cs.phase === 'throw' && cs.timer < 18) ? 5 : 0;
  drawMiniCube(cs.p1X + p1LungeX, cs.p1Y, sz, P1c.mid, P1c.dark, P1c.light);

  // Hammer + hand
  if (cs.phase === 'spin') {
    // Hammer orbits above P1
    drawHammerItem(cs.p1X + 14, cs.p1Y - 26, cs.hammerAngle);
    // Hand grips the handle — orbits at the grip end (14px down the handle in local space)
    const hamCX = cs.p1X + 14, hamCY = cs.p1Y - 26;
    const handX = hamCX - 14 * Math.sin(cs.hammerAngle);
    const handY = hamCY + 14 * Math.cos(cs.hammerAngle);
    drawMFHand(handX, handY, 10);
  } else if (cs.phase === 'throw' || cs.phase === 'halt') {
    // Hammer flies free
    drawHammerItem(cs.hammerX, cs.hammerY, cs.hammerAngle);
    // Hand stays on P1: arm extends upward during early throw frames, then rests at side
    const throwProg = Math.min(1, cs.timer / 18);
    const armLift = cs.phase === 'throw' ? (1 - throwProg) * 18 : 0;
    const armOffX = cs.phase === 'throw' && cs.timer < 18 ? 12 + (1 - throwProg) * 8 : 10;
    drawMFHand(cs.p1X + p1LungeX + armOffX, cs.p1Y + 6 - armLift, 10);
  }

  ctx.restore(); // end camera pan

  // Screen-space fade and win overlay
  if ((cs.phase === 'halt' && cs.timer >= 70) || cs.phase === 'freeze') {
    ctx.fillStyle = `rgba(0,0,0,${cs.fadeAlpha.toFixed(3)})`;
    ctx.fillRect(0, 0, W, H);
  }
  if (cs.phase === 'freeze') {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FF6F00'; ctx.font = 'bold 38px monospace';
    ctx.fillText('YOU WIN!', W/2, 110);
    ctx.fillStyle = '#FFD700'; ctx.font = '22px monospace';
    ctx.fillText('★  ★  ★', W/2, 142);
    if (numPlayers === 2 && player2) {
      ctx.fillStyle = P1c.light; ctx.font = 'bold 16px monospace';
      ctx.fillText(`P1: ${String(player1.score).padStart(6,'0')}`, W/2, 192);
      ctx.fillStyle = P2c.light;
      ctx.fillText(`P2: ${String(player2.score).padStart(6,'0')}`, W/2, 216);
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 18px monospace';
      ctx.fillText(`TOTAL: ${String(player1.score + player2.score).padStart(6,'0')}`, W/2, 248);
    } else {
      ctx.fillStyle = '#FFF'; ctx.font = 'bold 20px monospace';
      ctx.fillText(`Score: ${String(player1.score).padStart(6,'0')}`, W/2, 210);
    }
    ctx.fillStyle = '#AAA'; ctx.font = '13px monospace';
    ctx.fillText('Mechanical Factory cleared!', W/2, 290);
    ctx.fillStyle = '#777'; ctx.font = '11px monospace';
    ctx.fillText('Press R to return to menu', W/2, 315);
    ctx.textAlign = 'left';
  }
}
