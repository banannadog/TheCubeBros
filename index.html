// ─── Mobile Touch Controls ───────────────────────────────────────────────────
const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
const touch = { left: false, right: false, jump: false, interact: false };
const TOUCH_BTNS = {
  left:     { x: 12,  y: 415, w: 62, h: 58, label: '◀' },
  right:    { x: 84,  y: 415, w: 62, h: 58, label: '▶' },
  interact: { x: 650, y: 415, w: 62, h: 58, label: 'USE' },
  jump:     { x: 722, y: 415, w: 62, h: 58, label: '▲' },
};
function updateTouchState(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  touch.left = touch.right = touch.jump = touch.interact = false;
  for (const t of e.touches) {
    const tx = (t.clientX - rect.left) * scaleX;
    const ty = (t.clientY - rect.top)  * scaleY;
    for (const [key, btn] of Object.entries(TOUCH_BTNS)) {
      if (tx >= btn.x && tx <= btn.x + btn.w && ty >= btn.y && ty <= btn.y + btn.h)
        touch[key] = true;
    }
    // Menu card selection on touch
    if (gameState === 'select') {
      const cW = 220, cH = 200, cY = 148, c1X = W/2 - cW - 20, c2X = W/2 + 20;
      if (tx >= c1X && tx <= c1X+cW && ty >= cY && ty <= cY+cH) { playTacoBell(); initGame(1); }
      if (tx >= c2X && tx <= c2X+cW && ty >= cY && ty <= cY+cH) { playTacoBell(); initGame(2); }
    }
  }
}
canvas.addEventListener('touchstart', updateTouchState, { passive: false });
canvas.addEventListener('touchmove',  updateTouchState, { passive: false });
canvas.addEventListener('touchend',   updateTouchState, { passive: false });

function drawTouchControls() {
  if (!isMobile || (gameState !== 'playing' && gameState !== 'cutscene')) return;
  for (const [key, btn] of Object.entries(TOUCH_BTNS)) {
    const active = touch[key];
    ctx.globalAlpha = active ? 0.75 : 0.35;
    ctx.fillStyle = active ? '#00E5FF' : '#334';
    ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
    ctx.strokeStyle = '#00E5FF'; ctx.lineWidth = 2;
    ctx.strokeRect(btn.x + 1, btn.y + 1, btn.w - 2, btn.h - 2);
    ctx.globalAlpha = active ? 1 : 0.7;
    ctx.fillStyle = active ? '#000' : '#00E5FF';
    ctx.font = 'bold ' + (btn.label === 'USE' ? '11' : '18') + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(btn.label, btn.x + btn.w / 2, btn.y + btn.h / 2 + 6);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}

function playCoinSound() {
  const play = () => {
    const t = audioCtx.currentTime;
    for (const [freq, start, dur] of [[988, 0, 0.07], [1319, 0.06, 0.28]]) {
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, t + start);
      gain.gain.setValueAtTime(0.4, t + start);
      gain.gain.exponentialRampToValueAtTime(0.001, t + start + dur);
      osc.start(t + start); osc.stop(t + start + dur + 0.01);
    }
  };
  if (audioCtx.state === 'suspended') audioCtx.resume().then(play); else play();
}

function playPowerupSound() {
  const play = () => {
    const t = audioCtx.currentTime;
    for (const [freq, start] of [[523,0],[659,0.08],[784,0.16],[1047,0.24]]) {
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + start);
      gain.gain.setValueAtTime(0.35, t + start);
      gain.gain.exponentialRampToValueAtTime(0.001, t + start + 0.18);
      osc.start(t + start); osc.stop(t + start + 0.2);
    }
  };
  if (audioCtx.state === 'suspended') audioCtx.resume().then(play); else play();
}

const particles = [];
function spawnParticles(x, y, color, n = 8) {
  for (let i = 0; i < n; i++) {
    const a = (Math.PI*2/n)*i + Math.random()*0.6, s = 2 + Math.random()*4;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s-1.5,
                     life: 1, decay: 0.03+Math.random()*0.025, size: 4+Math.random()*5, color });
  }
}

const moneyTrail = [];
const heartTrail = [];
const basicTrail = [];
function updateMoneyTrail() {
  // Spawn — money trail via equipped trail OR tycoon+speed legacy
  const wantMoney  = equippedTrail === 'money';
  const wantHearts = equippedTrail === 'hearts';
  const wantBasic  = equippedTrail === 'basic';
  const active = [player1, player2].filter(p => p && p.lives > 0);
  for (const p of active) {
    const tycoonBoost = equippedSkin === 'tycoon' && p.powerups.speed > 0;
    if (wantBasic && tick % 2 === 0) {
      basicTrail.push({
        x: p.x + p.w * 0.5 + (Math.random() - 0.5) * p.w * 0.4,
        y: p.y + p.h * 0.5 + (Math.random() - 0.5) * p.h * 0.4,
        size: 3 + Math.random() * 3,
        life: 1,
        decay: 0.04 + Math.random() * 0.02,
      });
    }
    if (tick % 3 !== 0) continue;
    if (wantMoney || tycoonBoost) {
      moneyTrail.push({
        x: p.x + p.w * 0.5 + (p.facingRight ? -p.w * 0.7 : p.w * 0.7),
        y: p.y + p.h * 0.2 + Math.random() * p.h * 0.5,
        vx: (p.facingRight ? -1 : 1) * (0.8 + Math.random() * 1.5),
        vy: -1.2 - Math.random() * 1.5,
        life: 1,
        decay: 0.022 + Math.random() * 0.014,
        size: 9 + Math.random() * 5,
      });
    }
    if (wantHearts) {
      heartTrail.push({
        x: p.x + p.w * 0.5 + (Math.random() - 0.5) * p.w,
        y: p.y + p.h * 0.3 + Math.random() * p.h * 0.4,
        vx: (Math.random() - 0.5) * 1.5,
        vy: -1.5 - Math.random() * 1.5,
        life: 1,
        decay: 0.018 + Math.random() * 0.012,
        size: 8 + Math.random() * 6,
      });
    }
  }
  // Update money
  for (let i = moneyTrail.length - 1; i >= 0; i--) {
    const m = moneyTrail[i];
    m.x += m.vx; m.y += m.vy; m.vy += 0.08;
    m.life -= m.decay;
    if (m.life <= 0) moneyTrail.splice(i, 1);
  }
  // Update hearts
  for (let i = heartTrail.length - 1; i >= 0; i--) {
    const h = heartTrail[i];
    h.x += h.vx; h.y += h.vy; h.vy += 0.04;
    h.life -= h.decay;
    if (h.life <= 0) heartTrail.splice(i, 1);
  }
  // Update basic
  for (let i = basicTrail.length - 1; i >= 0; i--) {
    const b = basicTrail[i];
    b.life -= b.decay;
    if (b.life <= 0) basicTrail.splice(i, 1);
  }
}

function hsvToHex(h, s, v) {
  const f = (n, k = (n + h / 60) % 6) => v - v * s * Math.max(0, Math.min(k, 4 - k, 1));
  const x = n => Math.round(f(n)*255).toString(16).padStart(2,'0');
  return `#${x(5)}${x(3)}${x(1)}`;
}
function hexToHsv(hex) {
  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
  const v=max, s=max===0?0:d/max;
  let h=0;
  if(d!==0){ if(max===r) h=((g-b)/d)%6; else if(max===g) h=(b-r)/d+2; else h=(r-g)/d+4; h=(h*60+360)%360; }
  return [h,s,v];
}

function applyPowerup(p, type) {
  if (type === 'speed') {
    p.powerups.speed = SPEED_FRAMES;
    spawnParticles(p.x + p.w/2, p.y + p.h/2, '#FFD700', 14);
    if (equippedSkin === 'murderer') jasonFlash = 60;
  } else if (type === 'size') {
    if (p.powerups.size === 0) { p.y -= 14; p.w = 42; p.h = 42; }
    p.powerups.size = POWERUP_FRAMES;
    spawnParticles(p.x + p.w/2, p.y + p.h/2, '#E040FB', 14);
  } else if (type === 'nightvision') {
    p.powerups.nightvision = NIGHTVISION_FRAMES;
    spawnParticles(p.x + p.w/2, p.y + p.h/2, '#00E5FF', 16);
  }
  playPowerupSound();
}

// ─── Collision ───────────────────────────────────────────────────────────────
function overlap(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function resolveX(ent) {
  for (const [px,py,pw,ph] of platforms) {
    if (!overlap(ent.x,ent.y,ent.w,ent.h,px,py,pw,ph)) continue;
    if (ent.vx > 0) ent.x = px - ent.w; else ent.x = px + pw;
    ent.vx = 0;
  }
}
function resolveY(ent) {
  for (const [px,py,pw,ph] of platforms) {
    if (!overlap(ent.x,ent.y,ent.w,ent.h,px,py,pw,ph)) continue;
    if (ent.vy >= 0) { ent.y = py - ent.h; ent.vy = 0; ent.onGround = true; }
    else             { ent.y = py + ph;     ent.vy = 0; }
  }
}

// ─── Player Update ───────────────────────────────────────────────────────────
function updatePlayer(p) {
  if (!p || p.lives <= 0) return;
  const wasBig = p.powerups.size > 0;
  const wasSpeed = p.powerups.speed > 0;
  if (p.powerups.speed      > 0) p.powerups.speed--;
  if (wasSpeed && p.powerups.speed === 0 && equippedSkin === 'murderer') jasonFlash = 25;
  if (p.powerups.size       > 0) p.powerups.size--;
  if (p.powerups.nightvision > 0) p.powerups.nightvision--;
  if (p.knifeSwing          > 0) p.knifeSwing--;
  if (wasBig && p.powerups.size === 0) {
    p.w = p.baseW; p.h = p.baseH;
    if (p.onGround) p.y += 14;
  }
  const spd = MOVE_SPEED * (p.powerups.speed > 0 ? 2.0 : 1.0);
  if (p.ctrl.left())       { p.vx = -spd; p.facingRight = false; }
  else if (p.ctrl.right()) { p.vx =  spd; p.facingRight = true;  }
  else                     { p.vx *= 0.78; if (Math.abs(p.vx) < 0.2) p.vx = 0; }
  if (p.onGround) p.coyoteTime = 8;
  else if (p.coyoteTime > 0) p.coyoteTime--;
  if (p.ctrl.jump() && p.coyoteTime > 0) { p.vy = JUMP_FORCE; p.coyoteTime = 0; p.wobble = 7; }
  p.vy = Math.min(p.vy + (p.vy > 0 ? GRAVITY * 0.65 : GRAVITY), MAX_FALL);
  p.onGround = false;
  if (p.wobble > 0) p.wobble--;
  p.x += p.vx;
  if (p.x < 0) { p.x = 0; p.vx = 0; }
  resolveX(p);
  p.y += p.vy;
  resolveY(p);
  if (p.y > H + 100) {
    p.lives--; tookDamage = true;
    if (p.lives <= 0) return;
    p.x = Math.max(60, camX + 40);
    p.y = GROUND_Y - p.h - 10;
    p.vx = 0; p.vy = 0; p.invincible = 80;
  }
  if (p.invincible > 0) p.invincible--;
  // Attack edge detection (one-shot per press)
  const atk = p.ctrl.attack && p.ctrl.attack();
  p.justAttacked = atk && !p.attackPressed;
  p.attackPressed = atk;
}

// ─── Boss Update ─────────────────────────────────────────────────────────────
function updateBoss(active) {
  if (!boss || boss.lives <= 0 || !boss.active || active.length === 0) return;
  boss.stateTimer++;
  if (boss.invincible > 0) boss.invincible--;
  if (bossHitCooldown > 0) bossHitCooldown--;

  // Boss gravity
  boss.vy = Math.min(boss.vy + GRAVITY, MAX_FALL);
  boss.onGround = false;
  boss.y += boss.vy;
  resolveY(boss);
  boss.x += boss.vx;
  boss.x = Math.max(4575, Math.min(boss.x, 5400 - boss.w - 10));

  const nearest = active.reduce((a,b) => Math.abs(b.x-boss.x)<Math.abs(a.x-boss.x)?b:a, active[0]);

  if (boss.state === 'idle') {
    const dir = nearest.x > boss.x ? 1 : -1;
    boss.vx = dir * 1.4;
    boss.facingRight = dir > 0;
    if (boss.stateTimer >= 90) {
      boss.state = 'swinging'; boss.stateTimer = 0; boss.vx = 0;
    }
  } else if (boss.state === 'swinging') {
    boss.vx = 0;
    const swingFrame = boss.stateTimer % 40;
    boss.facingRight = nearest.x > boss.x;
    // Active hitbox: frames 8-28 of each 40-frame swing
    if (swingFrame >= 8 && swingFrame <= 28) {
      const swordX = boss.facingRight ? boss.x + boss.w : boss.x - 38;
      for (const p of active) {
        if (p.invincible > 0) continue;
        if (overlap(swordX, boss.y+18, 38, 14, p.x, p.y, p.w, p.h)) {
          p.lives--; tookDamage = true; p.invincible = 100; p.vy = -7;
          p.vx = p.x < boss.x + boss.w/2 ? -5 : 5;
          spawnParticles(p.x+p.w/2, p.y+p.h/2, '#FF4444', 10);
        }
      }
    }
    if (boss.stateTimer >= 120) {
      boss.state = 'tired'; boss.stateTimer = 0;
      const sx2 = boss.facingRight ? boss.x + boss.w + 6 : boss.x - 38;
      boss.droppedSword = { x: sx2, y: GROUND_Y - 14, w: 34, h: 10, pickedUp: false };
    }
  } else if (boss.state === 'tired') {
    boss.vx = 0;
    // Sword pickup
    if (boss.droppedSword && !boss.droppedSword.pickedUp) {
      for (const p of active) {
        if (overlap(p.x,p.y,p.w,p.h, boss.droppedSword.x,boss.droppedSword.y,boss.droppedSword.w,boss.droppedSword.h)) {
          boss.droppedSword.pickedUp = true;
          playerHasSword = true;
          playPowerupSound();
        }
      }
    }
    // Player sword attack (press F when close)
    if (playerHasSword && bossHitCooldown <= 0) {
      for (const p of active) {
        if (!p.justAttacked) continue;
        const dist = Math.abs((p.x+p.w/2) - (boss.x+boss.w/2));
        if (dist <= 60) {
          boss.lives--;
          bossHitCooldown = 50;
          playerHasSword = false;
          spawnParticles(boss.x+boss.w/2, boss.y+boss.h/2, '#FFD700', 18);
          if (boss.lives <= 0) {
            victoryDoor = { x: boss.x - 60, y: GROUND_Y - 50, w: 28, h: 50 };
            if (!badges.has('swordfighter')) {
              badges.add('swordfighter');
              localStorage.setItem('cb_badges', JSON.stringify([...badges]));
              badgeNotif = { name: 'Swordfighter', timer: 240 };
            }
            return;
          }
          boss.state = 'idle'; boss.stateTimer = 0; boss.droppedSword = null;
        }
      }
    }
    if (boss.stateTimer >= BOSS_TIRED_FRAMES) {
      boss.state = 'idle'; boss.stateTimer = 0; boss.droppedSword = null;
      playerHasSword = false;
    }
  }
}

// ─── Victory Cutscene ─────────────────────────────────────────────────────────
function startCutscene() {
  if (!badges.has('adventurer')) {
    badges.add('adventurer');
    localStorage.setItem('cb_badges', JSON.stringify([...badges]));
    badgeNotif = { name: 'Adventurer', timer: 240 };
  }
  if (!tookDamage && !badges.has('invincible')) {
    badges.add('invincible');
    localStorage.setItem('cb_badges', JSON.stringify([...badges]));
    badgeNotif = { name: 'Invincible', timer: 240 };
  }
  gamesBeaten++;
  localStorage.setItem('cb_wins', gamesBeaten);
  if (gamesBeaten >= 10 && !badges.has('reallylike')) {
    badges.add('reallylike');
    localStorage.setItem('cb_badges', JSON.stringify([...badges]));
    badgeNotif = { name: 'You REALLY like this game', timer: 300 };
  }
  const CSGY = 330;
  cutscene = {
    phase: 'walk',   // 'walk' → 'stand' → 'jump' → 'freeze'
    timer: 0,
    fadeTimer: 0,    // 0-30: pitch black, 30-60: fade to clear
    bgOffset: 0,
    y: CSGY - 28,
    vy: 0,
    bobAngle: 0,
    groundY: CSGY,
  };
  gameState = 'cutscene';
}

function updateCutscene() {
  const cs = cutscene;
  cs.timer++;
  if (cs.fadeTimer < 60) cs.fadeTimer++;
  cs.bobAngle += 0.28;
  if (cs.phase === 'walk') {
    cs.bgOffset += 2;
    if (cs.timer >= 120) { cs.phase = 'stand'; cs.timer = 0; }
  } else if (cs.phase === 'stand') {
    if (cs.timer >= 90) { cs.phase = 'jump'; cs.timer = 0; cs.vy = -13; }
  } else if (cs.phase === 'jump') {
    cs.vy += 0.5;
    cs.y += cs.vy;
    if (cs.timer >= 14) { cs.phase = 'freeze'; cs.timer = 0; }
  }
  // 'freeze': nothing updates — score stays on screen
}

function drawCutscene() {
  const cs = cutscene;
  const CSGY = cs.groundY;

  // Sky gradient
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0D47A1'); g.addColorStop(0.6, '#1976D2'); g.addColorStop(1, '#64B5F6');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // Scrolling clouds
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (const [cx2, cy2, sc] of [[80,50,1.2],[320,68,0.9],[580,44,1.1],[820,60,1.0],[1060,52,1.15]]) {
    const cw = 72*sc, ch = 28*sc;
    const x = ((cx2 - cs.bgOffset * 0.35) % (W*2.5) + W*2.5) % (W*2.5) - 100;
    ctx.fillRect(x,cy2,cw,ch);
    ctx.fillRect(x+cw*0.12,cy2-ch*0.4,cw*0.6,ch*0.6);
    ctx.fillRect(x+cw*0.35,cy2-ch*0.65,cw*0.32,ch*0.5);
  }

  // Scrolling hills
  ctx.fillStyle = '#2E7D32';
  for (const [hx2, hw] of [[0,220],[200,270],[460,210],[700,300],[960,230],[1200,260]]) {
    const x = ((hx2 - cs.bgOffset * 0.6) % (W*2.5) + W*2.5) % (W*2.5) - 100;
    ctx.beginPath(); ctx.ellipse(x+hw/2, CSGY+60, hw/2, 90, 0, 0, Math.PI); ctx.fill();
  }

  // Ground
  ctx.fillStyle = '#1B5E20'; ctx.fillRect(0, CSGY, W, H - CSGY);
  ctx.fillStyle = '#4CAF50'; ctx.fillRect(0, CSGY, W, 8);
  ctx.fillStyle = '#388E3C'; ctx.fillRect(0, CSGY+8, W, 6);

  // Cube positions (centered, side by side for 2P)
  const sz = 52;
  const bobY = cs.phase === 'walk' ? Math.sin(cs.bobAngle) * 3 : 0;
  const cx1 = numPlayers === 2 ? W/2 - sz - 8 : W/2 - sz/2;
  const cx2 = cx1 + sz + 16;
  const cubeY = cs.y + bobY;

  drawMiniCube(cx1, cubeY, sz, P1.mid, P1.dark, P1.light);
  if (numPlayers === 2) drawMiniCube(cx2, cubeY, sz, P2.mid, P2.dark, P2.light);

  // Score overlay when frozen
  if (cs.phase === 'freeze') {
    ctx.fillStyle = 'rgba(0,0,0,0.58)';
    ctx.fillRect(0, 0, W, H);
    // Redraw cubes on top of overlay
    drawMiniCube(cx1, cs.y, sz, P1.mid, P1.dark, P1.light);
    if (numPlayers === 2) drawMiniCube(cx2, cs.y, sz, P2.mid, P2.dark, P2.light);

    ctx.textAlign = 'center';
    // YOU WIN
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 38px monospace';
    ctx.fillText('YOU WIN!', W/2, 110);
    // Stars
    ctx.font = '22px monospace';
    ctx.fillText('★  ★  ★', W/2, 142);

    if (numPlayers === 2) {
      const total = player1.score + player2.score;
      ctx.fillStyle = P1.dark; ctx.font = 'bold 16px monospace';
      ctx.fillText(`P1 Score:  ${String(player1.score).padStart(6,'0')}`, W/2, 190);
      ctx.fillStyle = P2.dark;
      ctx.fillText(`P2 Score:  ${String(player2.score).padStart(6,'0')}`, W/2, 215);
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 18px monospace';
      ctx.fillText(`TOTAL:  ${String(total).padStart(6,'0')}`, W/2, 248);
    } else {
      ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 20px monospace';
      ctx.fillText(`Score:  ${String(player1.score).padStart(6,'0')}`, W/2, 210);
    }

    ctx.fillStyle = '#AAAAAA'; ctx.font = '13px monospace';
    ctx.fillText('Thanks for playing The Cube Bros!', W/2, 300);
    ctx.fillStyle = '#888'; ctx.font = '11px monospace';
    ctx.fillText('Press R to return to menu', W/2, 322);
    ctx.textAlign = 'left';
  }

  // Fade-in: pitch black for 0.5s, then fade to clear over 0.5s
  if (cs.fadeTimer < 60) {
    const alpha = cs.fadeTimer < 30 ? 1.0 : 1.0 - (cs.fadeTimer - 30) / 30;
    ctx.fillStyle = `rgba(0,0,0,${alpha.toFixed(3)})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ─── Main Update ─────────────────────────────────────────────────────────────
function update() {
  if (gameState === 'cutscene') { updateCutscene(); return; }
  if (gameState === 'transition') {
    tick++;
    transitionTimer--;
    if (transitionTimer <= 0) startLevel(currentLevel + 2);
    return;
  }
  if (badgeNotif) { badgeNotif.timer--; if (badgeNotif.timer <= 0) badgeNotif = null; }
  if (jasonFlash > 0) jasonFlash--;
  if (badgesPanelOpen || skinsPanelOpen || trailsPanelOpen || colorPickerOpen) return;
  if (gameState !== 'playing' || gameOver || won) return;
  tick++;
  updatePlayer(player1);
  updatePlayer(player2);

  const active = [player1, player2].filter(p => p && p.lives > 0);

  // Coins
  for (const c of coins) {
    if (c.collected) continue;
    c.bob = (c.bob + 0.08) % (Math.PI*2);
    for (const p of active) {
      if (overlap(p.x,p.y,p.w,p.h, c.x,c.y,16,16)) {
        c.collected = true; p.coins++; p.score += 100;
        spawnParticles(c.x+8, c.y+8, '#FDD835', 6);
        playCoinSound();
        // Trillionaire badge: 1000 coins across all sessions
        totalCoinsEver++;
        localStorage.setItem('cb_tcoins', totalCoinsEver);
        if (totalCoinsEver >= 500 && !badges.has('trillionaire')) {
          badges.add('trillionaire');
          localStorage.setItem('cb_badges', JSON.stringify([...badges]));
          badgeNotif = { name: 'Trillionaire', timer: 240 };
        }
        // Billionaire badge: all coins collected across all players
        if (!badges.has('billionaire')) {
          const totalCollected = (player1 ? player1.coins : 0) + (player2 ? player2.coins : 0);
          if (totalCollected >= TOTAL_COINS_IN_GAME) {
            badges.add('billionaire');
            localStorage.setItem('cb_badges', JSON.stringify([...badges]));
            badgeNotif = { name: 'Billionaire', timer: 240 };
          }
        }
        break;
      }
    }
  }

  // Chests
  for (const c of chests) {
    if (c.opened) continue;
    for (const p of active) {
      if (overlap(p.x,p.y,p.w,p.h, c.x,c.y,c.w,c.h)) {
        c.opened = true;
        for (const ap of active) applyPowerup(ap, c.type);
        break;
      }
    }
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) { if (e.squish > 0) e.squish -= 0.06; continue; }
    e.x += e.vx;
    if (e.x <= e.patrolStart || e.x + e.w >= e.patrolEnd) {
      e.vx *= -1;
      e.x = Math.max(e.patrolStart, Math.min(e.x, e.patrolEnd - e.w));
    }
    for (const p of active) {
      if (p.invincible > 0 || !overlap(p.x,p.y,p.w,p.h,e.x,e.y,e.w,e.h)) continue;
      if (p.powerups.size > 0) {
        // Big powerup — instant kill on any touch
        e.alive = false; e.squish = 1;
        p.score += 200;
        spawnParticles(e.x+e.w/2, e.y+e.h/2, '#E040FB', 12);
        enemyKillCount++; checkMurdererBadge();
        if (equippedSkin === 'murderer') p.knifeSwing = 24;
        break;
      } else if (p.vy > 0 && (p.y + p.h) < (e.y + e.h*0.55 + p.vy + 2)) {
        e.alive = false; e.squish = 1;
        p.vy = -9; p.score += 200;
        spawnParticles(e.x+e.w/2, e.y+e.h/2, '#EF5350', 10);
        enemyKillCount++; checkMurdererBadge();
        break;
      } else {
        p.lives--; tookDamage = true; p.invincible = 100; p.vy = -7;
        p.vx = p.x < e.x+e.w/2 ? -5 : 5;
        spawnParticles(p.x+p.w/2, p.y+p.h/2, '#FF7043', 8);
      }
    }
  }

  // Win / Game Over
  const p1a = player1.lives > 0;
  const p2a = player2 && player2.lives > 0;
  if (currentLevel < 3) {
    const hitGoal = (p1a && player1.x + player1.w >= levelW - 60) ||
                    (p2a && player2.x + player2.w >= levelW - 60);
    if (hitGoal) {
      if (currentLevel < LEVEL_DATA.length - 1) {
        if (player1) { if (player1.lives > 0) player1.lives++; else player1.lives = 1; }
        if (player2) { if (player2.lives > 0) player2.lives++; else player2.lives = 1; }
        gameState = 'transition'; transitionTimer = 210;
      } else won = true;
    }
  }
  // Level 4: door interaction, key collection, boss
  if (currentLevel === 3) {
    // Castle door — press F near any door
    let doorTaken = false;
    for (const p of active) {
      if (doorTaken || !p.justAttacked) continue;
      for (const door of castleDoors) {
        if (door.locked) continue;
        if (!overlap(p.x-8, p.y, p.w+16, p.h, door.x, door.y, door.w, door.h)) continue;
        const destY = GROUND_Y - p.baseH;
        for (const ap of active) { ap.x = door.destX; ap.y = destY; ap.vx = 0; ap.vy = 0; }
        camX = Math.max(0, Math.min(door.destX - W * 0.33, levelW - W));
        if (door.bossEntry) boss.active = true;
        if (!door.isExit && !door.bossEntry && bossKey && !bossKey.collected) doorsWithoutKey++;
        doorTaken = true;
        break;
      }
    }
    // Key pickup
    if (bossKey && !bossKey.collected) {
      for (const p of active) {
        if (overlap(p.x,p.y,p.w,p.h, bossKey.x,bossKey.y,bossKey.w,bossKey.h)) {
          bossKey.collected = true;
          const bossDoor = castleDoors.find(d => d.bossEntry);
          if (bossDoor) bossDoor.locked = false;
          spawnParticles(bossKey.x+10, bossKey.y+10, '#FFD700', 14);
          playPowerupSound();
          if (doorsWithoutKey >= 4 && !badges.has('unlucky')) {
            badges.add('unlucky');
            localStorage.setItem('cb_badges', JSON.stringify([...badges]));
            badgeNotif = { name: 'Unlucky', timer: 240 };
          }
          break;
        }
      }
    }
    updateBoss(active);
    // Victory door check
    if (victoryDoor) {
      for (const p of active) {
        if (overlap(p.x-4, p.y, p.w+8, p.h, victoryDoor.x, victoryDoor.y, victoryDoor.w, victoryDoor.h)) {
          startCutscene(); break;
        }
      }
    }
  }
  if (!p1a && (numPlayers === 1 || !p2a)) gameOver = true;

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.22; p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  updateMoneyTrail();

  // Camera
  let targetCam;
  if (numPlayers === 1 || !p2a)      targetCam = (p1a ? player1.x : camX) - W*0.33;
  else if (!p1a)                     targetCam = player2.x - W*0.33;
  else {
    const mid = (player1.x + player2.x) / 2;
    targetCam = mid - W*0.5;
    const lm = Math.min(player1.x, player2.x);
    if (lm - targetCam < 20) targetCam = lm - 20;
  }
  camX += (targetCam - camX) * 0.1;
  camX  = Math.max(0, Math.min(camX, levelW - W));
}

// ─── Draw Helpers ────────────────────────────────────────────────────────────
function sx(worldX) { return worldX - camX; }

function drawCube(wx, wy, w, h, mid, dark, light) {
  const x = sx(wx);
  ctx.fillStyle = mid;   ctx.fillRect(x, wy, w, h);
  ctx.fillStyle = dark;  ctx.fillRect(x+w-4, wy+4, 4, h-4); ctx.fillRect(x+4, wy+h-4, w-4, 4);
  ctx.fillStyle = light; ctx.fillRect(x+1, wy+1, w-5, 3);    ctx.fillRect(x+1, wy+1, 3, h-5);
}

function drawMiniCube(x, y, sz, mid, dark, light) {
  ctx.fillStyle = mid;   ctx.fillRect(x, y, sz, sz);
  ctx.fillStyle = dark;  ctx.fillRect(x+sz-3, y+3, 3, sz-3); ctx.fillRect(x+3, y+sz-3, sz-3, 3);
  ctx.fillStyle = light; ctx.fillRect(x+1, y+1, sz-4, 2);     ctx.fillRect(x+1, y+1, 2, sz-4);
  ctx.fillStyle = '#000';
  ctx.fillRect(x+Math.round(sz*0.52), y+Math.round(sz*0.28), Math.round(sz*0.16), Math.round(sz*0.16));
  ctx.fillRect(x+Math.round(sz*0.73), y+Math.round(sz*0.28), Math.round(sz*0.16), Math.round(sz*0.16));
}

// ─── Castle Interior Background (Level 4) ────────────────────────────────────
function drawCastleBackground() {
  // Dark stone ceiling and walls
  ctx.fillStyle = '#1C1C1C'; ctx.fillRect(0, 0, W, H);
  // Brick tiling
  const bW = 64, bH = 32, offX = Math.floor(camX) % bW;
  for (let row = 0; row * bH < H - 40; row++) {
    const shift = (row % 2) * (bW / 2);
    for (let col = -1; col * bW < W + bW; col++) {
      const bx = col * bW - offX + shift, by = row * bH;
      ctx.fillStyle = (row + col) % 3 === 0 ? '#2E2E2E' : '#262626';
      ctx.fillRect(bx, by, bW - 2, bH - 2);
      ctx.fillStyle = '#191919';
      ctx.fillRect(bx + bW - 2, by, 2, bH);
      ctx.fillRect(bx, by + bH - 2, bW, 2);
    }
  }
  // Floor border highlight
  ctx.fillStyle = '#444'; ctx.fillRect(0, GROUND_Y - 4, W, 4);
  // Room arch pillars at boundaries between room islands
  for (const rx of [490, 1200, 2000, 2800, 3600, 4400]) {
    const ax = sx(rx);
    if (ax < -40 || ax > W + 40) continue;
    ctx.fillStyle = '#383838';
    ctx.fillRect(ax - 16, 0, 16, GROUND_Y - 4); // left pillar
    ctx.fillRect(ax, 0, 16, GROUND_Y - 4);       // right pillar
    ctx.fillStyle = '#444';
    ctx.fillRect(ax - 15, 0, 3, GROUND_Y - 4);   // highlight
    ctx.fillRect(ax + 1, 0, 3, GROUND_Y - 4);
    ctx.fillStyle = '#4A4A4A';
    ctx.fillRect(ax - 16, GROUND_Y - 200, 32, 20); // arch lintel
    // Torch flicker
    const fl = 0.6 + Math.sin(tick * 0.13 + rx) * 0.4;
    ctx.globalAlpha = fl;
    ctx.fillStyle = '#FF8C00';
    ctx.beginPath(); ctx.arc(ax, GROUND_Y - 190, 8, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = fl * 0.25;
    ctx.beginPath(); ctx.arc(ax, GROUND_Y - 190, 20, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // Boss area entrance arch at x=4560
  const bx4 = sx(4560);
  if (bx4 > -60 && bx4 < W + 60) {
    ctx.fillStyle = '#1A1A1A';
    ctx.fillRect(bx4 - 16, 0, 16, GROUND_Y - 4);
    ctx.fillRect(bx4, 0, 16, GROUND_Y - 4);
    ctx.fillStyle = '#333'; ctx.fillRect(bx4 - 16, GROUND_Y - 220, 32, 24);
    ctx.fillStyle = '#8B0000'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText('BOSS', bx4, GROUND_Y - 226); ctx.textAlign = 'left';
  }
}

// ─── Castle Doors (Level 4) ───────────────────────────────────────────────────
function drawCastleDoors() {
  if (!castleDoors) return;
  for (const door of castleDoors) {
    const dx = sx(door.x);
    if (dx + door.w < -10 || dx > W + 10) continue;
    const dy = door.y;
    // Door fill
    ctx.fillStyle = door.locked ? '#3B1414' : door.bossEntry ? '#6B1111' : door.isExit ? '#0D2B4A' : '#0D3318';
    ctx.fillRect(dx, dy, door.w, door.h);
    // Door panels
    ctx.fillStyle = door.locked ? '#5A1F1F' : door.bossEntry ? '#9C2020' : door.isExit ? '#1565C0' : '#1B5E20';
    ctx.fillRect(dx+3, dy+4,       door.w-6, Math.floor(door.h/2)-6);
    ctx.fillRect(dx+3, dy+Math.floor(door.h/2)+2, door.w-6, Math.floor(door.h/2)-6);
    // Frame
    ctx.fillStyle = '#888';
    ctx.fillRect(dx-2, dy-2, door.w+4, 3);
    ctx.fillRect(dx-2, dy-2, 3, door.h+5);
    ctx.fillRect(dx+door.w-1, dy-2, 3, door.h+5);
    ctx.fillRect(dx-2, dy+door.h, door.w+4, 4);
    // Knob
    ctx.fillStyle = door.locked ? '#555' : '#FFD700';
    ctx.fillRect(dx + door.w - 8, dy + Math.floor(door.h/2) - 3, 5, 5);
    // Label above door
    ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillStyle = door.locked ? '#AA4444' : '#FFD700';
    ctx.fillText(door.label === '<' ? 'EXIT' : door.label, dx + door.w/2, dy - 5);
    // LOCKED text
    if (door.locked) {
      ctx.fillStyle = '#AA4444'; ctx.font = '7px monospace';
      ctx.fillText('LOCKED', dx + door.w/2, dy + Math.floor(door.h/2) + 4);
    }
    // [F] prompt when a player is nearby
    const near = [player1, player2].some(p =>
      p && p.lives > 0 &&
      Math.abs((p.x + p.w/2) - (door.x + door.w/2)) < 55 &&
      Math.abs((p.y + p.h/2) - (door.y + door.h/2)) < 65
    );
    if (near && !door.locked) {
      ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 8px monospace';
      ctx.fillText('[F]', dx + door.w/2, dy - 16);
    }
    ctx.textAlign = 'left';
  }
}

// ─── Background ──────────────────────────────────────────────────────────────
function drawBackground() {
  if (currentLevel === 3) { drawCastleBackground(); return; }
  const g = ctx.createLinearGradient(0, 0, 0, H);
  if (currentLevel === 2) {
    g.addColorStop(0, '#000008'); g.addColorStop(0.6, '#00001A'); g.addColorStop(1, '#000D28');
  } else if (currentLevel === 1) {
    g.addColorStop(0, '#1A0533'); g.addColorStop(0.5, '#6A1B4D'); g.addColorStop(1, '#FF6E40');
  } else {
    g.addColorStop(0, '#0D47A1'); g.addColorStop(0.55, '#1976D2'); g.addColorStop(1, '#42A5F5');
  }
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  if (currentLevel === 2) {
    // Stars
    for (let i = 0; i < 120; i++) {
      const sx2 = ((i*197 + 43) % (LEVEL_W+W));
      const sy  = (i*113 + 17) % (H - 80);
      const bx  = ((sx2 - camX*0.05) % (LEVEL_W+W) + LEVEL_W+W) % (LEVEL_W+W) - 50;
      const blink = 0.4 + Math.sin(tick*0.04 + i) * 0.4;
      ctx.globalAlpha = blink;
      ctx.fillStyle = i % 5 === 0 ? '#CCE5FF' : '#FFFFFF';
      const sz = i % 7 === 0 ? 2 : 1;
      ctx.fillRect(bx, sy, sz, sz);
    }
    ctx.globalAlpha = 1;
    // Moon
    const moonX = ((2600 - camX*0.05) % (LEVEL_W+W) + LEVEL_W+W) % (LEVEL_W+W) - 50;
    ctx.fillStyle = '#FFFDE7';
    ctx.beginPath(); ctx.arc(moonX, 60, 30, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#F9A825';
    ctx.beginPath(); ctx.arc(moonX, 60, 28, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFFDE7';
    ctx.beginPath(); ctx.arc(moonX, 60, 26, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,253,231,0.15)';
    ctx.beginPath(); ctx.arc(moonX, 60, 42, 0, Math.PI*2); ctx.fill();
    // Dark silhouette hills
    ctx.fillStyle = '#050510';
    for (const [hx,hy,hw] of [[0,380,200],[220,360,260],[540,375,200],[820,355,300],[1180,370,220],[1480,350,280],[1800,365,240],[2100,355,300]]) {
      const x = ((hx - camX*0.2) % (LEVEL_W*0.8+W) + LEVEL_W+W) % (LEVEL_W*0.8+W) - 100;
      ctx.beginPath(); ctx.ellipse(x+hw/2, hy+120, hw/2, 120, 0, 0, Math.PI); ctx.fill();
    }
    ctx.fillStyle = '#020208';
    for (const [hx,hy,hw] of [[0,360,240],[280,375,200],[560,355,270],[880,370,220],[1200,360,260],[1500,375,200]]) {
      const x = ((hx - camX*0.45) % (LEVEL_W*0.7+W) + LEVEL_W+W) % (LEVEL_W*0.7+W) - 80;
      ctx.beginPath(); ctx.ellipse(x+hw/2, hy+100, hw/2, 100, 0, 0, Math.PI); ctx.fill();
    }
    return;
  }

  ctx.fillStyle = currentLevel === 1 ? '#4A148C' : '#1565C0';
  for (const [hx,hy,hw] of [[0,380,200],[220,360,260],[540,375,200],[820,355,300],[1180,370,220],[1480,350,280],[1800,365,240],[2100,355,300]]) {
    const x = ((hx - camX*0.2) % (LEVEL_W*0.8+W) + LEVEL_W+W) % (LEVEL_W*0.8+W) - 100;
    ctx.beginPath(); ctx.ellipse(x+hw/2, hy+120, hw/2, 120, 0, 0, Math.PI); ctx.fill();
  }
  ctx.fillStyle = currentLevel === 1 ? '#880E4F' : '#1B5E20';
  for (const [hx,hy,hw] of [[0,360,240],[280,375,200],[560,355,270],[880,370,220],[1200,360,260],[1500,375,200]]) {
    const x = ((hx - camX*0.45) % (LEVEL_W*0.7+W) + LEVEL_W+W) % (LEVEL_W*0.7+W) - 80;
    ctx.beginPath(); ctx.ellipse(x+hw/2, hy+100, hw/2, 100, 0, 0, Math.PI); ctx.fill();
  }
  ctx.fillStyle = currentLevel === 1 ? 'rgba(255,150,100,0.65)' : 'rgba(255,255,255,0.85)';
  for (const [wx,wy,sc] of [[80,55,1.2],[360,72,0.9],[680,48,1.3],[1020,65,1.0],[1340,52,1.1],[1680,70,0.95],[2020,55,1.2],[2340,68,1.0],[2680,50,1.3],[3020,72,0.9]]) {
    const cw=72*sc, ch=28*sc;
    const x = ((wx - camX*0.18) % (LEVEL_W*1.1+W) + LEVEL_W+W) % (LEVEL_W*1.1+W) - 100;
    ctx.fillRect(x,wy,cw,ch); ctx.fillRect(x+cw*0.12,wy-ch*0.4,cw*0.6,ch*0.6); ctx.fillRect(x+cw*0.35,wy-ch*0.65,cw*0.32,ch*0.5);
  }
}

// ─── Platforms ───────────────────────────────────────────────────────────────
function drawPlatforms() {
  const [gc, gt, gl, gd] = currentLevel === 3
    ? ['#2E2E2E','#3A3A3A','#4A4A4A','#1A1A1A']
    : currentLevel === 2
    ? ['#0A0A14','#12122A','#1A1A35','#060610']
    : currentLevel === 1
    ? ['#4A1942','#7B1FA2','#9C27B0','#311B3F']
    : ['#5D4037','#388E3C','#4CAF50','#4A2F20'];
  const [bc, bl, bd] = currentLevel === 3
    ? ['#383838','#555555','#222222']
    : currentLevel === 2
    ? ['#16162E','#2A2A50','#0D0D20']
    : currentLevel === 1
    ? ['#7B1FA2','#BA68C8','#4A148C']
    : ['#D4A017','#FFD54F','#A07820'];

  for (const [px,py,pw,ph] of platforms) {
    const x = sx(px); if (x+pw < 0 || x > W) continue;
    if (py >= GROUND_Y) {
      ctx.fillStyle = gc; ctx.fillRect(x, py, pw, ph);
      ctx.fillStyle = gt; ctx.fillRect(x, py, pw, 8);
      ctx.fillStyle = gl; ctx.fillRect(x, py+1, pw, 3);
      ctx.fillStyle = gd;
      for (let gx = 0; gx < pw; gx += 32) ctx.fillRect(x+gx, py+10, 2, ph-10);
    } else {
      ctx.fillStyle = bc; ctx.fillRect(x, py, pw, ph);
      ctx.fillStyle = bl; ctx.fillRect(x, py, pw, 3);
      ctx.fillStyle = bd;
      ctx.fillRect(x, py+ph-3, pw, 3); ctx.fillRect(x, py+ph/2-1, pw, 2);
      for (let bx = 0;  bx < pw; bx += 20) ctx.fillRect(x+bx, py, 2, ph/2);
      for (let bx = 10; bx < pw; bx += 20) ctx.fillRect(x+bx, py+ph/2, 2, ph/2);
    }
  }
}

// ─── Coins ───────────────────────────────────────────────────────────────────
function drawCoins() {
  for (const c of coins) {
    if (c.collected) continue;
    const x = sx(c.x); if (x < -20 || x > W+20) continue;
    const y = c.y + Math.sin(c.bob)*3;
    ctx.fillStyle = '#FDD835'; ctx.fillRect(x, y, 16, 16);
    ctx.fillStyle = '#FFF9C4'; ctx.fillRect(x+2, y+2, 6, 5);
    ctx.strokeStyle = '#F57F17'; ctx.lineWidth = 1.5; ctx.strokeRect(x+.75, y+.75, 14.5, 14.5);
    ctx.fillStyle = '#E65100'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'left'; ctx.fillText('$', x+4, y+12);
  }
}

// ─── Chests ──────────────────────────────────────────────────────────────────
function drawChests() {
  for (const c of chests) {
    const x = sx(c.x); if (x+c.w < -10 || x > W+10) continue;
    if (!c.opened) {
      ctx.fillStyle = '#5D4037'; ctx.fillRect(x, c.y+c.h/2, c.w, c.h/2);
      ctx.fillStyle = '#795548'; ctx.fillRect(x, c.y, c.w, c.h/2);
      ctx.fillStyle = '#FDD835'; ctx.fillRect(x, c.y+c.h/2-2, c.w, 4);
      ctx.fillStyle = '#FDD835'; ctx.fillRect(x+c.w/2-4, c.y+c.h/2-7, 8, 8);
      ctx.fillStyle = '#E65100'; ctx.fillRect(x+c.w/2-2, c.y+c.h/2-4, 4, 5);
      ctx.fillStyle = '#A1887F'; ctx.fillRect(x+1, c.y+1, c.w-2, 2); ctx.fillRect(x+1, c.y+1, 2, c.h/2-2);
      ctx.fillStyle = '#3E2723'; ctx.fillRect(x+c.w-3, c.y+3, 3, c.h-3); ctx.fillRect(x+3, c.y+c.h-3, c.w-3, 3);
      // Powerup icon + pulsing label
      const pulse = 0.75 + Math.sin(tick * 0.1) * 0.25;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = c.type === 'speed' ? '#FFE082' : c.type === 'nightvision' ? '#00E5FF' : '#CE93D8';
      ctx.font = '13px monospace'; ctx.textAlign = 'center';
      ctx.fillText(c.type === 'speed' ? '⚡' : c.type === 'nightvision' ? 'NV' : '★', x+c.w/2, c.y-4);
      ctx.globalAlpha = 1; ctx.textAlign = 'left';
    } else {
      // Open body
      ctx.fillStyle = '#5D4037'; ctx.fillRect(x, c.y+c.h/2, c.w, c.h/2);
      ctx.fillStyle = '#1A0A00'; ctx.fillRect(x+3, c.y+c.h/2, c.w-6, 6);
      ctx.fillStyle = '#FDD835'; ctx.fillRect(x, c.y+c.h/2-2, c.w, 4);
      // Lid flipped open
      ctx.fillStyle = '#795548'; ctx.fillRect(x-4, c.y-10, c.w, c.h/2-2);
      ctx.fillStyle = '#A1887F'; ctx.fillRect(x-3, c.y-9, c.w-2, 2);
      ctx.fillStyle = '#FDD835'; ctx.fillRect(x-4, c.y-10+c.h/2-4, c.w, 3);
    }
  }
}

// ─── Goal Flag ───────────────────────────────────────────────────────────────
function drawGoalFlag() {
  const gx = sx(LEVEL_W - 90); if (gx < -50 || gx > W+50) return;

  if (currentLevel === 2) {
    // Castle for Level 3
    const cx = gx, cy = GROUND_Y, cw = 80, wall = 160;
    const base = cy - wall;
    // Main wall
    ctx.fillStyle = '#455A64'; ctx.fillRect(cx, base, cw, wall);
    // Stone highlight
    ctx.fillStyle = '#546E7A'; ctx.fillRect(cx, base, cw, 4); ctx.fillRect(cx, base, 4, wall);
    // Stone lines
    ctx.fillStyle = '#37474F';
    for (let row = 0; row < wall; row += 18) {
      const off = (Math.floor(row/18) % 2) * 18;
      for (let col = off; col < cw; col += 36) ctx.fillRect(cx+col, base+row, 18, 1);
      ctx.fillRect(cx, base+row, cw, 1);
    }
    // Shadow edge
    ctx.fillStyle = '#263238'; ctx.fillRect(cx+cw-4, base, 4, wall); ctx.fillRect(cx, base+wall-4, cw, 4);
    // Battlements (5 merlons)
    ctx.fillStyle = '#455A64';
    for (let i = 0; i < 5; i++) {
      if (i % 2 === 0) ctx.fillRect(cx + i*16, base-20, 16, 20);
    }
    // Gate arch
    ctx.fillStyle = '#000010';
    ctx.fillRect(cx+28, base+wall-50, 24, 50);
    ctx.beginPath(); ctx.arc(cx+40, base+wall-50, 12, Math.PI, 0); ctx.fill();
    // Windows
    ctx.fillStyle = '#000010';
    ctx.fillRect(cx+10, base+30, 12, 16); ctx.fillRect(cx+58, base+30, 12, 16);
    // Window glow (candles inside)
    const wg = 0.5 + Math.sin(tick*0.07)*0.3;
    ctx.fillStyle = `rgba(255,200,80,${wg})`;
    ctx.fillRect(cx+12, base+32, 8, 12); ctx.fillRect(cx+60, base+32, 8, 12);
    // Flag on tower
    ctx.fillStyle = '#546E7A'; ctx.fillRect(cx+37, base-50, 4, 32);
    ctx.fillStyle = '#00BCD4'; ctx.fillRect(cx+41, base-50, 22, 14);
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'left';
    ctx.fillText('WIN', cx+43, base-39);
    return;
  }

  ctx.fillStyle = '#78909C'; ctx.fillRect(gx+22, 200, 6, GROUND_Y-200);
  ctx.fillStyle = '#B0BEC5'; ctx.fillRect(gx+22, 200, 3, GROUND_Y-200);
  ctx.fillStyle = currentLevel === 1 ? '#9C27B0' : '#F44336';
  ctx.fillRect(gx+28, 200, 44, 30);
  ctx.fillStyle = '#FFEB3B'; ctx.fillRect(gx+28, 200, 44, 11);
  ctx.fillStyle = '#FFF'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'left';
  ctx.fillText('GOAL!', gx+31, 224);
  ctx.fillStyle = '#FDD835'; ctx.fillRect(gx+18, 194, 14, 14);
  ctx.fillStyle = '#F57F17'; ctx.fillRect(gx+20, 196, 10, 10);
}

// ─── Player Cube ─────────────────────────────────────────────────────────────
function drawPlayerCube(p) {
  if (!p || p.lives <= 0) return;
  if (p.invincible > 0 && Math.floor(p.invincible/5)%2 === 1) return;
  const moving = Math.abs(p.vx) > 0.5;
  const sqX    = p.onGround && moving ? 2 : 0;
  const strY   = p.vy < -4 ? -3 : (p.vy > 3 ? 2 : 0);
  const pw = p.w + sqX, ph = p.h - sqX + strY;
  const px = p.x - sqX*0.5, py = p.y + sqX - strY;

  if (p.powerups.speed > 0) { ctx.shadowColor = equippedSkin === 'murderer' ? '#FF6D00' : '#FFD700'; ctx.shadowBlur = 12; }
  if (p.powerups.size  > 0) { ctx.shadowColor = '#E040FB'; ctx.shadowBlur = 14; }
  drawCube(px, py, pw, ph, p.colors.mid, p.colors.dark, p.colors.light);
  ctx.shadowBlur = 0;

  const ex = sx(px), eSize = Math.max(4, Math.round(pw*0.18));
  // Speed lines
  if (p.powerups.speed > 0 && Math.abs(p.vx) > 2) {
    ctx.strokeStyle = 'rgba(255,215,0,0.55)'; ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const lx = p.facingRight ? ex - 5 - i*8 : ex + pw + 5 + i*8;
      const ly = py + ph * (0.2 + i*0.25);
      const dir = p.facingRight ? 10+i*4 : -(10+i*4);
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx+dir, ly); ctx.stroke();
    }
  }

  // Tycoon skin: golden top hat + business suit
  if (equippedSkin === 'tycoon') {
    const crownH = Math.floor(ph * 0.55), crownW = Math.floor(pw * 0.65);
    const crownX = ex + Math.floor((pw - crownW) / 2);
    // Crown
    ctx.fillStyle = '#FFD700'; ctx.fillRect(crownX, py - crownH, crownW, crownH);
    ctx.fillStyle = '#FFE55C'; ctx.fillRect(crownX, py - crownH, 2, crownH);
    ctx.fillStyle = '#B8860B'; ctx.fillRect(crownX + crownW - 3, py - crownH, 3, crownH);
    ctx.fillStyle = '#B8860B'; ctx.fillRect(crownX, py - crownH, crownW, 2); // top
    // Hat band
    ctx.fillStyle = '#7A5C00'; ctx.fillRect(crownX, py - Math.floor(ph * 0.14), crownW, 3);
    // Brim
    ctx.fillStyle = '#FFD700'; ctx.fillRect(ex - 4, py - 3, pw + 8, 4);
    ctx.fillStyle = '#B8860B'; ctx.fillRect(ex - 4, py - 3 + 3, pw + 8, 1);

    // Suit (lower ~58% of cube)
    const lapelY = Math.round(py + ph * 0.42);
    const lapelH = Math.round(py + ph) - lapelY;
    ctx.fillStyle = '#B8860B'; ctx.fillRect(ex, lapelY, pw, lapelH);
    ctx.fillStyle = '#FFD700'; ctx.fillRect(ex, lapelY, pw, 2); // top edge
    // Lapels
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(ex + 1, lapelY, Math.floor(pw * 0.26), Math.floor(lapelH * 0.6));
    ctx.fillRect(ex + pw - 1 - Math.floor(pw * 0.26), lapelY, Math.floor(pw * 0.26), Math.floor(lapelH * 0.6));
    // Shirt / tie strip
    ctx.fillStyle = '#7A5C00';
    ctx.fillRect(ex + Math.floor(pw * 0.38), lapelY, Math.floor(pw * 0.24), lapelH);
    ctx.fillStyle = '#FFE55C';
    ctx.fillRect(ex + Math.floor(pw * 0.44), lapelY + 2, 2, Math.floor(lapelH * 0.65));
    // Bottom shadow
    ctx.fillStyle = '#7A5C00'; ctx.fillRect(ex, py + ph - 2, pw, 2);
  }

  // Explorer skin: green backpack + brown suit
  if (equippedSkin === 'explorer') {
    // Backpack (green, protrudes to the right of the cube)
    const bpW = Math.floor(pw * 0.45), bpH = Math.floor(ph * 0.55);
    const bpX = ex - bpW + 2, bpY = py + Math.floor(ph * 0.18);
    ctx.fillStyle = '#388E3C'; ctx.fillRect(bpX, bpY, bpW, bpH);
    ctx.fillStyle = '#43A047'; ctx.fillRect(bpX, bpY, bpW, 2);            // top highlight
    ctx.fillStyle = '#2E7D32'; ctx.fillRect(bpX + bpW - 2, bpY, 2, bpH); // right shadow
    ctx.fillStyle = '#1B5E20'; ctx.fillRect(bpX, bpY + bpH - 2, bpW, 2); // bottom trim
    ctx.fillStyle = '#1B5E20';
    ctx.fillRect(bpX + Math.floor(bpW * 0.35), bpY + Math.floor(bpH * 0.35), Math.floor(bpW * 0.3), 2);

    // Brown suit — full body coverage like the tycoon suit
    const lapelY = Math.round(py + ph * 0.38);
    const lapelH = Math.round(py + ph) - lapelY;
    // Suit jacket (lower ~62%)
    ctx.fillStyle = '#5D4037'; ctx.fillRect(ex, lapelY, pw, lapelH);
    ctx.fillStyle = '#6D4C41'; ctx.fillRect(ex, lapelY, pw, 2);            // top highlight
    // Lapels
    ctx.fillStyle = '#8D6E63';
    ctx.fillRect(ex + 1, lapelY, Math.floor(pw * 0.28), Math.floor(lapelH * 0.55));
    ctx.fillRect(ex + pw - 1 - Math.floor(pw * 0.28), lapelY, Math.floor(pw * 0.28), Math.floor(lapelH * 0.55));
    // Shirt / tie strip (cream)
    ctx.fillStyle = '#EFEBE9';
    ctx.fillRect(ex + Math.floor(pw * 0.38), lapelY, Math.floor(pw * 0.24), lapelH);
    // Bottom trim
    ctx.fillStyle = '#3E2723'; ctx.fillRect(ex, py + ph - 2, pw, 2);
  }

  // Murderer skin: pitch black cube + Jason mask + knife
  if (equippedSkin === 'murderer') {
    // Pitch black overlay over entire cube
    ctx.fillStyle = '#000'; ctx.fillRect(ex, py, pw, ph);
    ctx.fillStyle = '#111'; ctx.fillRect(ex, py, pw, 2); // subtle top highlight
    ctx.fillStyle = '#0a0a0a'; ctx.fillRect(ex, py + ph - 2, pw, 2);

    const fireMode = p.powerups.speed > 0;

    // FIRE JASON — animated pixel flames around cube
    if (fireMode) {
      const ft = Date.now() / 80;
      const flameData = [
        { rx: 0.05, rh: 0.7, ph: 0.4 }, { rx: 0.2,  rh: 0.9, ph: 1.3 },
        { rx: 0.35, rh: 0.75, ph: 0.7 }, { rx: 0.5, rh: 1.0, ph: 2.1 },
        { rx: 0.65, rh: 0.8, ph: 0.3 }, { rx: 0.8,  rh: 0.85, ph: 1.7 },
        { rx: 0.92, rh: 0.65, ph: 0.9 },
      ];
      const fw = Math.max(3, Math.floor(pw * 0.16));
      for (const f of flameData) {
        const flicker = 0.75 + Math.sin(ft + f.ph) * 0.25;
        const fh = Math.floor(ph * f.rh * flicker);
        const fx = ex + Math.floor(pw * f.rx) - Math.floor(fw / 2);
        const fy = py - fh;
        ctx.fillStyle = '#7B1800'; ctx.fillRect(fx - 1, fy + Math.floor(fh * 0.4), fw + 2, Math.floor(fh * 0.6));
        ctx.fillStyle = '#FF3D00'; ctx.fillRect(fx, fy + Math.floor(fh * 0.2), fw, Math.floor(fh * 0.6));
        ctx.fillStyle = '#FF6D00'; ctx.fillRect(fx, fy + Math.floor(fh * 0.05), fw - 1, Math.floor(fh * 0.5));
        ctx.fillStyle = '#FF9800'; ctx.fillRect(fx + 1, fy, fw - 2, Math.floor(fh * 0.4));
        ctx.fillStyle = '#FFCC00'; ctx.fillRect(fx + 1, fy, fw - 2, 2);
      }
      // Side flame wisps
      for (let side = 0; side < 2; side++) {
        const sx2 = side === 0 ? ex - fw : ex + pw;
        for (let i = 0; i < 3; i++) {
          const flicker = 0.6 + Math.sin(ft * 1.3 + i + side * 2) * 0.4;
          const fh = Math.floor(ph * 0.45 * flicker);
          const fy = py + Math.floor(ph * (0.1 + i * 0.25));
          ctx.fillStyle = '#FF3D00'; ctx.fillRect(sx2, fy, fw - 1, fh);
          ctx.fillStyle = '#FF6D00'; ctx.fillRect(sx2 + (side === 0 ? 1 : 0), fy, fw - 2, Math.floor(fh * 0.6));
        }
      }
      // Orange glow pulse on the cube itself
      ctx.globalAlpha = 0.18 + Math.sin(ft * 0.7) * 0.07;
      ctx.fillStyle = '#FF6D00'; ctx.fillRect(ex, py, pw, ph);
      ctx.globalAlpha = 1;
    }

    // Jason Voorhees hockey mask
    const mw = Math.floor(pw * 0.78), mh = Math.floor(ph * 0.78);
    const mx = ex + Math.floor((pw - mw) / 2);
    const my = py + Math.floor(ph * 0.08);
    // Mask base — scorched orange-white in fire mode, normal white otherwise
    ctx.fillStyle = fireMode ? '#C84800' : '#E8E4DC'; ctx.fillRect(mx, my, mw, mh);
    ctx.fillStyle = fireMode ? '#8B2500' : '#C8C4BC'; ctx.fillRect(mx, my, 2, mh);
    ctx.fillStyle = fireMode ? '#FF6D00' : '#F0EDE8'; ctx.fillRect(mx + mw - 2, my, 2, mh);
    // Round eye holes — glowing orange in fire mode
    const eHsz = Math.max(3, Math.floor(mw * 0.2));
    const eHy  = my + Math.floor(mh * 0.22);
    ctx.fillStyle = fireMode ? '#FF9800' : '#111';
    ctx.fillRect(mx + Math.floor(mw * 0.08), eHy, eHsz, eHsz);
    ctx.fillRect(mx + mw - Math.floor(mw * 0.08) - eHsz, eHy, eHsz, eHsz);
    if (fireMode) {
      // Bright eye glow centers
      ctx.fillStyle = '#FFEB3B';
      ctx.fillRect(mx + Math.floor(mw * 0.08) + 1, eHy + 1, eHsz - 2, eHsz - 2);
      ctx.fillRect(mx + mw - Math.floor(mw * 0.08) - eHsz + 1, eHy + 1, eHsz - 2, eHsz - 2);
    }
    // Nose holes
    ctx.fillStyle = fireMode ? '#FF6D00' : '#111';
    ctx.fillRect(mx + Math.floor(mw * 0.38), my + Math.floor(mh * 0.52), 2, 2);
    ctx.fillRect(mx + Math.floor(mw * 0.55), my + Math.floor(mh * 0.52), 2, 2);
    // Mouth grill
    ctx.fillStyle = fireMode ? '#FF3D00' : '#888';
    for (let s = 0; s < 3; s++)
      ctx.fillRect(mx + Math.floor(mw * 0.18), my + Math.floor(mh * 0.70) + s * 3, Math.floor(mw * 0.64), 2);
    // RED CHEVRON MARKS — orange/yellow in fire mode
    ctx.fillStyle = fireMode ? '#FFCC00' : '#CC1111';
    // Forehead chevron (large, centered at top)
    const cvW = Math.floor(mw * 0.52), cvH = Math.floor(mh * 0.26);
    const cvX = mx + Math.floor((mw - cvW) / 2), cvY = my + 1;
    for (let r = 0; r < cvH; r++) {
      const w = Math.max(1, Math.floor(cvW * (1 - r / cvH)));
      ctx.fillRect(cvX + Math.floor((cvW - w) / 2), cvY + r, w, 1);
    }
    // Left cheek chevron (smaller)
    const kcW = Math.floor(mw * 0.26), kcH = Math.floor(mh * 0.16);
    const lcvX = mx + Math.floor(mw * 0.04), lcvY = my + Math.floor(mh * 0.44);
    for (let r = 0; r < kcH; r++) {
      const w = Math.max(1, Math.floor(kcW * (1 - r / kcH)));
      ctx.fillRect(lcvX + Math.floor((kcW - w) / 2), lcvY + r, w, 1);
    }
    // Right cheek chevron (mirror)
    const rcvX = mx + mw - Math.floor(mw * 0.04) - kcW;
    for (let r = 0; r < kcH; r++) {
      const w = Math.max(1, Math.floor(kcW * (1 - r / kcH)));
      ctx.fillRect(rcvX + Math.floor((kcW - w) / 2), lcvY + r, w, 1);
    }

    // Knife — held on facing side, angled up
    const knifeX = p.facingRight ? ex + pw + 1 : ex - Math.floor(pw * 0.55);
    const knifeY = py + Math.floor(ph * 0.35);
    const swingT  = p.knifeSwing / 24; // 1→0 over animation
    // Swing: rotate from -0.4 (held up) toward +1.4 (slashed down) then back
    const swingAngle = swingT > 0
      ? (swingT > 0.5
          ? -0.4 + (1 - swingT) * 2 * 1.8   // downswing
          : -0.4 + swingT * 2 * 1.8)          // upswing back
      : -0.4;
    const kAnchorX = knifeX + (p.facingRight ? 0 : Math.floor(pw * 0.55));
    const kAnchorY = knifeY;
    ctx.save();
    ctx.translate(kAnchorX, kAnchorY);
    ctx.rotate(p.facingRight ? swingAngle : Math.PI - swingAngle);
    // Blade (grey, 3px wide, 12px long pointing up)
    const bLen = Math.max(10, Math.floor(ph * 0.45));
    ctx.fillStyle = '#B0BEC5'; ctx.fillRect(-1, -bLen, 3, bLen);
    ctx.fillStyle = '#CFD8DC'; ctx.fillRect(0, -bLen, 1, bLen); // highlight
    ctx.fillStyle = '#607D8B'; ctx.fillRect(-1, -bLen, 3, 2);   // tip
    // Handle (dark brown, 3px wide, 6px tall below blade)
    const hLen = Math.max(6, Math.floor(ph * 0.22));
    ctx.fillStyle = '#4E342E'; ctx.fillRect(-2, 0, 5, hLen);
    ctx.fillStyle = '#6D4C41'; ctx.fillRect(-2, 0, 5, 2);       // guard
    ctx.fillStyle = '#3E2723'; ctx.fillRect(-2, hLen - 2, 5, 2); // pommel
    ctx.restore();
  }

  // Face drawn on top — skip for murderer (mask replaces the face)
  if (equippedSkin !== 'murderer') {
    const eyeY = py + Math.floor(ph*0.28);
    ctx.fillStyle = '#000';
    if (p.facingRight) {
      ctx.fillRect(ex+pw*0.52, eyeY, eSize, eSize); ctx.fillRect(ex+pw*0.73, eyeY, eSize, eSize);
      ctx.fillStyle = '#FFF';
      ctx.fillRect(ex+pw*0.52+1, eyeY+1, 2, 2); ctx.fillRect(ex+pw*0.73+1, eyeY+1, 2, 2);
    } else {
      ctx.fillRect(ex+pw*0.15, eyeY, eSize, eSize); ctx.fillRect(ex+pw*0.36, eyeY, eSize, eSize);
      ctx.fillStyle = '#FFF';
      ctx.fillRect(ex+pw*0.15+1, eyeY+1, 2, 2); ctx.fillRect(ex+pw*0.36+1, eyeY+1, 2, 2);
    }
    // Smile — only on bare cube (no skin equipped)
    if (!equippedSkin) {
      const mouthY = py + Math.floor(ph * 0.62);
      const mouthW = Math.floor(pw * 0.42);
      const mouthX = p.facingRight ? ex + Math.floor(pw * 0.38) : ex + Math.floor(pw * 0.2);
      ctx.fillStyle = '#000';
      ctx.fillRect(mouthX, mouthY, mouthW, 2);          // bottom bar
      ctx.fillRect(mouthX, mouthY - 3, 2, 3);           // left corner curves up
      ctx.fillRect(mouthX + mouthW - 2, mouthY - 3, 2, 3); // right corner curves up
    }
  }
}

// ─── Night Vision Helper ──────────────────────────────────────────────────────
function checkMurdererBadge() {
  localStorage.setItem('cb_kills', enemyKillCount);
  if (enemyKillCount >= 25 && !badges.has('murderer')) {
    badges.add('murderer');
    localStorage.setItem('cb_badges', JSON.stringify([...badges]));
    badgeNotif = { name: 'Murderer', timer: 240 };
  }
}

function hasNightVision() {
  return (player1 && player1.powerups.nightvision > 0) ||
         (player2 && player2.powerups.nightvision > 0);
}

// ─── Enemies ─────────────────────────────────────────────────────────────────
function drawEnemies() {
  const darkMode = currentLevel === 2 && !hasNightVision();
  for (const e of enemies) {
    if (!e.alive) {
      if (e.squish > 0) { const sh = Math.max(4,10*e.squish); drawCube(e.x, e.y+e.h-sh, e.w, sh, '#E53935','#B71C1C','#EF9A9A'); }
      continue;
    }
    const ex = sx(e.x); if (ex+e.w < -10 || ex > W+10) continue;
    if (darkMode) continue; // body hidden in darkness — drawn by drawEnemyGlowEyes instead
    const fr = e.vx > 0;
    drawCube(e.x, e.y, e.w, e.h, '#E53935','#B71C1C','#EF9A9A');
    const eyeY = e.y + Math.floor(e.h*0.30);
    ctx.fillStyle = '#000';
    if (fr) { ctx.fillRect(ex+e.w*0.52, eyeY, 4, 4); ctx.fillRect(ex+e.w*0.73, eyeY, 4, 4); }
    else    { ctx.fillRect(ex+e.w*0.15, eyeY, 4, 4); ctx.fillRect(ex+e.w*0.36, eyeY, 4, 4); }
    ctx.fillStyle = '#7F0000';
    if (fr) { ctx.fillRect(ex+e.w*.50, eyeY-5, e.w*.20, 2); ctx.fillRect(ex+e.w*.71, eyeY-4, e.w*.21, 2); }
    else    { ctx.fillRect(ex+e.w*.08, eyeY-4, e.w*.21, 2); ctx.fillRect(ex+e.w*.30, eyeY-5, e.w*.20, 2); }
    const mb = e.y+e.h*0.65;
    if (fr) { ctx.fillRect(ex+e.w*.50,mb,e.w*.38,2); ctx.fillRect(ex+e.w*.50,mb-3,2,4); ctx.fillRect(ex+e.w*.88-2,mb,2,4); }
    else    { ctx.fillRect(ex+e.w*.12,mb,e.w*.38,2); ctx.fillRect(ex+e.w*.12,mb,2,4);   ctx.fillRect(ex+e.w*.50-2,mb-3,2,4); }
  }
}

function drawEnemyGlowEyes() {
  for (const e of enemies) {
    if (!e.alive) continue;
    const ex = sx(e.x); if (ex+e.w < -10 || ex > W+10) continue;
    const fr = e.vx > 0;
    const eyeY = e.y + Math.floor(e.h*0.30);
    const pulse = 0.8 + Math.sin(tick*0.12 + e.x*0.01) * 0.2;
    ctx.shadowColor = '#FF0000';
    ctx.shadowBlur  = 14 * pulse;
    ctx.fillStyle   = `rgba(255,${Math.floor(30*pulse)},${Math.floor(30*pulse)},1)`;
    if (fr) {
      ctx.fillRect(ex+e.w*0.52, eyeY, 5, 5);
      ctx.fillRect(ex+e.w*0.73, eyeY, 5, 5);
    } else {
      ctx.fillRect(ex+e.w*0.15, eyeY, 5, 5);
      ctx.fillRect(ex+e.w*0.36, eyeY, 5, 5);
    }
    ctx.shadowBlur = 0;
  }
}

// ─── Particles ───────────────────────────────────────────────────────────────
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    const s = p.size * p.life;
    ctx.fillStyle = p.color; ctx.fillRect(sx(p.x)-s/2, p.y-s/2, s, s);
  }
  // Money trail
  for (const m of moneyTrail) {
    ctx.globalAlpha = Math.max(0, m.life);
    ctx.fillStyle = trailColor || '#FFD700';
    ctx.font = `bold ${Math.max(6, Math.floor(m.size * m.life + 4))}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('$', sx(m.x), m.y);
  }
  // Hearts trail
  for (const h of heartTrail) {
    ctx.globalAlpha = Math.max(0, h.life);
    ctx.fillStyle = trailColor || '#FF4081';
    ctx.font = `bold ${Math.max(6, Math.floor(h.size * h.life + 4))}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('♥', sx(h.x), h.y);
  }
  // Basic trail
  for (const b of basicTrail) {
    ctx.globalAlpha = Math.max(0, b.life * 0.8);
    const sz = b.size * b.life;
    ctx.fillStyle = trailColor || '#FFFFFF';
    ctx.fillRect(sx(b.x) - sz / 2, b.y - sz / 2, sz, sz);
  }
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
// Badges button bounds (used for click detection too)
const BADGE_BTN = { x: 5, y: H - 22, w: 68, h: 16 };

function drawBadgesPanel() {
  // Badge earned popup above BADGES button
  if (badgeNotif) {
    const t = badgeNotif.timer;
    // Slide up during first 20 frames (t 240→220), stay, fade out last 40 frames
    const slideY = (t > 220 && t <= 240) ? (t - 220) * 2 : 0;
    const alpha  = t < 40 ? t / 40 : 1;
    const bx = BADGE_BTN.x, by = BADGE_BTN.y - 28 + slideY;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#222';
    ctx.fillRect(bx - 2, by, 120, 22);
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1;
    ctx.strokeRect(bx - 1.5, by + 0.5, 120, 21);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'left';
    ctx.fillText('🏅 Badge: ' + badgeNotif.name, bx + 4, by + 14);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  // Always draw the BADGES button in bottom-left
  const btn = BADGE_BTN;
  ctx.fillStyle = badgesPanelOpen ? '#7B5C00' : 'rgba(0,0,0,0.7)';
  ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1;
  ctx.strokeRect(btn.x + 0.5, btn.y + 0.5, btn.w - 1, btn.h - 1);
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('BADGES', btn.x + btn.w / 2, btn.y + 11);
  ctx.textAlign = 'left';

  if (!badgesPanelOpen) return;

  // Dim the game behind the panel
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);

  // Overlay panel
  const pw = 280, ph = 40 + BADGE_DEFS.length * 48 + 16;
  const px = W / 2 - pw / 2, py = H / 2 - ph / 2;
  ctx.fillStyle = '#111';
  ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
  ctx.strokeRect(px + 1, py + 1, pw - 2, ph - 2);

  // Title
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
  ctx.fillText('BADGES', W / 2, py + 22);

  // Badge rows
  BADGE_DEFS.forEach((b, i) => {
    const earned = badges.has(b.id);
    const ry = py + 38 + i * 48;
    // Row background
    ctx.fillStyle = earned ? 'rgba(255,215,0,0.08)' : 'rgba(255,255,255,0.04)';
    ctx.fillRect(px + 8, ry, pw - 16, 42);
    // Icon circle
    ctx.globalAlpha = earned ? 1 : 0.35;
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(px + 26, ry + 21, 13, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
    ctx.fillText(b.icon, px + 26, ry + 25);
    ctx.globalAlpha = 1;
    // Name + desc
    ctx.fillStyle = earned ? '#FFD700' : '#666';
    ctx.font = 'bold 10px monospace'; ctx.textAlign = 'left';
    ctx.fillText(b.name, px + 46, ry + 16);
    ctx.fillStyle = earned ? '#CCC' : '#444';
    ctx.font = '8px monospace';
    ctx.fillText(b.desc, px + 46, ry + 30);
    // EARNED tag

      ctx.fillStyle = '#4CAF50'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'right';
      ctx.fillText('EARNED', px + pw - 12, ry + 16);
    }
  });

  ctx.textAlign = 'left';
  // Close hint
  ctx.fillStyle = '#666'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('click BADGES to close', W / 2, py + ph - 5);

}

const SKINS_BTN  = { x: W - 73,  y: H - 22, w: 68, h: 16 };
const TRAILS_BTN = { x: W - 148, y: H - 22, w: 70, h: 16 };

function drawSkinsPanel() {
  // Always draw SKINS button in bottom-right
  const btn = SKINS_BTN;
  ctx.fillStyle = skinsPanelOpen ? '#004D40' : 'rgba(0,0,0,0.7)';
  ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
  ctx.strokeStyle = '#00E5FF'; ctx.lineWidth = 1;
  ctx.strokeRect(btn.x + 0.5, btn.y + 0.5, btn.w - 1, btn.h - 1);
  ctx.fillStyle = '#00E5FF'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('SKINS', btn.x + btn.w / 2, btn.y + 11);
  ctx.textAlign = 'left';

  if (!skinsPanelOpen) return;

  ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H);

  const pw = 300, ph = 44 + SKIN_DEFS.length * 56 + 16;
  const px = W / 2 - pw / 2, py = H / 2 - ph / 2;
  ctx.fillStyle = '#111'; ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = '#00E5FF'; ctx.lineWidth = 2;
  ctx.strokeRect(px + 1, py + 1, pw - 2, ph - 2);

  ctx.fillStyle = '#00E5FF'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
  ctx.fillText('SKINS', W / 2, py + 22);

  SKIN_DEFS.forEach((skin, i) => {
    const unlocked = badges.has(skin.badge);
    const equipped  = equippedSkin === skin.id;
    const ry = py + 38 + i * 56;
    ctx.fillStyle = equipped ? 'rgba(0,229,255,0.1)' : unlocked ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.2)';
    ctx.fillRect(px + 8, ry, pw - 16, 50);

    // Preview: mini cube with full skin rendering
    ctx.globalAlpha = unlocked ? 1 : 0.3;
    const sz = 22;
    const mpx = px + 22, mpy = ry + 14;
    drawMiniCube(mpx, mpy, sz, P1.mid, P1.dark, P1.light);

    if (unlocked && skin.id === 'tycoon') {
      const crownH = Math.floor(sz * 0.55), crownW = Math.floor(sz * 0.65);
      const crownX = mpx + Math.floor((sz - crownW) / 2);
      ctx.fillStyle = '#FFD700'; ctx.fillRect(crownX, mpy - crownH, crownW, crownH);
      ctx.fillStyle = '#FFE55C'; ctx.fillRect(crownX, mpy - crownH, 1, crownH);
      ctx.fillStyle = '#B8860B'; ctx.fillRect(crownX + crownW - 2, mpy - crownH, 2, crownH);
      ctx.fillStyle = '#B8860B'; ctx.fillRect(crownX, mpy - crownH, crownW, 1);
      ctx.fillStyle = '#7A5C00'; ctx.fillRect(crownX, mpy - Math.floor(sz * 0.14), crownW, 2);
      ctx.fillStyle = '#FFD700'; ctx.fillRect(mpx - 3, mpy - 2, sz + 6, 3);
      ctx.fillStyle = '#B8860B'; ctx.fillRect(mpx - 3, mpy + 1, sz + 6, 1);
      const lapY = Math.round(mpy + sz * 0.42), lapH = Math.round(mpy + sz) - Math.round(mpy + sz * 0.42);
      ctx.fillStyle = '#B8860B'; ctx.fillRect(mpx, lapY, sz, lapH);
      ctx.fillStyle = '#FFD700'; ctx.fillRect(mpx, lapY, sz, 1);
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(mpx, lapY, Math.floor(sz * 0.26), Math.floor(lapH * 0.6));
      ctx.fillRect(mpx + sz - Math.floor(sz * 0.26), lapY, Math.floor(sz * 0.26), Math.floor(lapH * 0.6));
      ctx.fillStyle = '#7A5C00'; ctx.fillRect(mpx + Math.floor(sz * 0.38), lapY, Math.floor(sz * 0.24), lapH);
      ctx.fillStyle = '#FFE55C'; ctx.fillRect(mpx + Math.floor(sz * 0.44), lapY + 1, 1, Math.floor(lapH * 0.65));
      ctx.fillStyle = '#7A5C00'; ctx.fillRect(mpx, mpy + sz - 1, sz, 1);
    }

    if (unlocked && skin.id === 'explorer') {
      const bpW = Math.floor(sz * 0.45), bpH = Math.floor(sz * 0.55);
      const bpX = mpx - bpW + 2, bpY = mpy + Math.floor(sz * 0.18);
      ctx.fillStyle = '#388E3C'; ctx.fillRect(bpX, bpY, bpW, bpH);
      ctx.fillStyle = '#43A047'; ctx.fillRect(bpX, bpY, bpW, 1);
      ctx.fillStyle = '#2E7D32'; ctx.fillRect(bpX + bpW - 1, bpY, 1, bpH);
      ctx.fillStyle = '#1B5E20'; ctx.fillRect(bpX, bpY + bpH - 1, bpW, 1);
      ctx.fillStyle = '#1B5E20'; ctx.fillRect(bpX + Math.floor(bpW*0.35), bpY + Math.floor(bpH*0.35), Math.floor(bpW*0.3), 1);
      const lapY = Math.round(mpy + sz * 0.38), lapH = Math.round(mpy + sz) - Math.round(mpy + sz * 0.38);
      ctx.fillStyle = '#5D4037'; ctx.fillRect(mpx, lapY, sz, lapH);
      ctx.fillStyle = '#6D4C41'; ctx.fillRect(mpx, lapY, sz, 1);
      ctx.fillStyle = '#8D6E63';
      ctx.fillRect(mpx, lapY, Math.floor(sz * 0.28), Math.floor(lapH * 0.55));
      ctx.fillRect(mpx + sz - Math.floor(sz * 0.28), lapY, Math.floor(sz * 0.28), Math.floor(lapH * 0.55));
      ctx.fillStyle = '#EFEBE9'; ctx.fillRect(mpx + Math.floor(sz * 0.38), lapY, Math.floor(sz * 0.24), lapH);
      ctx.fillStyle = '#3E2723'; ctx.fillRect(mpx, mpy + sz - 1, sz, 1);
    }

    // Eyes on top
    if (skin.id !== 'murderer') {
      ctx.fillStyle = '#000';
      ctx.fillRect(mpx + Math.floor(sz*0.52), mpy + Math.floor(sz*0.28), 2, 2);
      ctx.fillRect(mpx + Math.floor(sz*0.73), mpy + Math.floor(sz*0.28), 2, 2);
      ctx.fillStyle = '#FFF';
      ctx.fillRect(mpx + Math.floor(sz*0.52)+1, mpy + Math.floor(sz*0.28)+1, 1, 1);
      ctx.fillRect(mpx + Math.floor(sz*0.73)+1, mpy + Math.floor(sz*0.28)+1, 1, 1);
    }

    if (unlocked && skin.id === 'murderer') {
      // Pitch black cube
      ctx.fillStyle = '#000'; ctx.fillRect(mpx, mpy, sz, sz);
      ctx.fillStyle = '#111'; ctx.fillRect(mpx, mpy, sz, 1);
      // Mini Jason mask
      const mmw = Math.floor(sz * 0.78), mmh = Math.floor(sz * 0.78);
      const mmx = mpx + Math.floor((sz - mmw) / 2), mmy = mpy + Math.floor(sz * 0.08);
      ctx.fillStyle = '#E8E4DC'; ctx.fillRect(mmx, mmy, mmw, mmh);
      ctx.fillStyle = '#C8C4BC'; ctx.fillRect(mmx, mmy, 1, mmh);
      ctx.fillStyle = '#F0EDE8'; ctx.fillRect(mmx + mmw - 1, mmy, 1, mmh);
      // Round eye holes
      const meHsz = Math.max(2, Math.floor(mmw * 0.2));
      ctx.fillStyle = '#111';
      ctx.fillRect(mmx + Math.floor(mmw*0.08), mmy + Math.floor(mmh*0.22), meHsz, meHsz);
      ctx.fillRect(mmx + mmw - Math.floor(mmw*0.08) - meHsz, mmy + Math.floor(mmh*0.22), meHsz, meHsz);
      // Mouth slots
      ctx.fillStyle = '#888';
      for (let s = 0; s < 2; s++)
        ctx.fillRect(mmx + Math.floor(mmw*0.18), mmy + Math.floor(mmh*0.70) + s*2, Math.floor(mmw*0.64), 1);
      // Red chevron marks
      ctx.fillStyle = '#CC1111';
      const mcvW = Math.floor(mmw*0.52), mcvH = Math.floor(mmh*0.26);
      const mcvX = mmx + Math.floor((mmw-mcvW)/2);
      for (let r = 0; r < mcvH; r++) {
        const w = Math.max(1, Math.floor(mcvW*(1-r/mcvH)));
        ctx.fillRect(mcvX + Math.floor((mcvW-w)/2), mmy+1+r, w, 1);
      }
      const mkcW = Math.floor(mmw*0.26), mkcH = Math.floor(mmh*0.16);
      const mlcvX = mmx + Math.floor(mmw*0.04), mlcvY = mmy + Math.floor(mmh*0.44);
      const mrcvX = mmx + mmw - Math.floor(mmw*0.04) - mkcW;
      for (let r = 0; r < mkcH; r++) {
        const w = Math.max(1, Math.floor(mkcW*(1-r/mkcH)));
        ctx.fillRect(mlcvX + Math.floor((mkcW-w)/2), mlcvY+r, w, 1);
        ctx.fillRect(mrcvX + Math.floor((mkcW-w)/2), mlcvY+r, w, 1);
      }
      // Mini knife (right side, pointing up)
      const kx = mpx + sz + 1, ky = mpy + Math.floor(sz * 0.3);
      ctx.fillStyle = '#B0BEC5'; ctx.fillRect(kx, ky - 8, 2, 8);
      ctx.fillStyle = '#607D8B'; ctx.fillRect(kx, ky - 9, 2, 1);
      ctx.fillStyle = '#4E342E'; ctx.fillRect(kx - 1, ky, 4, 5);
      ctx.fillStyle = '#6D4C41'; ctx.fillRect(kx - 1, ky, 4, 1);
    }
    ctx.globalAlpha = 1;

    // Name + desc
    ctx.fillStyle = unlocked ? '#FFF' : '#555';
    ctx.font = 'bold 10px monospace'; ctx.textAlign = 'left';
    ctx.fillText(skin.name, px + 48, ry + 18);
    ctx.fillStyle = unlocked ? '#999' : '#444';
    ctx.font = '8px monospace';
    ctx.fillText(unlocked ? skin.desc : `Locked — earn "${skin.badge}" badge`, px + 48, ry + 30);

    // Equip / Unequip button
    if (unlocked) {
      const bx = px + pw - 66, by = ry + 14, bw = 58, bh = 18;
      ctx.fillStyle = equipped ? '#00796B' : '#1A4A3A';
      ctx.fillRect(bx, by, bw, bh);
      ctx.strokeStyle = '#00E5FF'; ctx.lineWidth = 1;
      ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
      ctx.fillStyle = '#00E5FF'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
      ctx.fillText(equipped ? 'UNEQUIP' : 'EQUIP', bx + bw / 2, by + 12);
      // Store button bounds for click detection (reuse last frame bounds is fine)
      skin._btn = { x: bx, y: by, w: bw, h: bh };
    }
  });

  ctx.textAlign = 'left';
  ctx.fillStyle = '#666'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('click SKINS to close', W / 2, py + ph - 5);
  ctx.textAlign = 'left';
}

// ─── Color Picker ─────────────────────────────────────────────────────────────
const CP_BW = 260, CP_BH = 295;
const CP_RX = 130, CP_RY = 115, CP_OR = 88, CP_IR = 63;
const CP_SVX = 30, CP_SVY = 220, CP_SVW = 200, CP_SVH = 44;

function drawColorPicker() {
  if (!colorPickerOpen) return;
  const bx = W / 2 - CP_BW / 2, by = H / 2 - CP_BH / 2;
  const cx = bx + CP_RX, cy = by + CP_RY;

  ctx.fillStyle = 'rgba(0,0,0,0.82)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#1A1A1A'; ctx.fillRect(bx, by, CP_BW, CP_BH);
  ctx.strokeStyle = '#EA80FC'; ctx.lineWidth = 2;
  ctx.strokeRect(bx + 1, by + 1, CP_BW - 2, CP_BH - 2);
  ctx.fillStyle = '#EA80FC'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
  ctx.fillText('PICK TRAIL COLOR', bx + CP_BW / 2, by + 16);

  // Hue ring
  for (let deg = 0; deg < 360; deg++) {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, CP_OR, (deg - 0.7) * Math.PI / 180, (deg + 0.7) * Math.PI / 180);
    ctx.closePath();
    ctx.fillStyle = `hsl(${deg},100%,50%)`;
    ctx.fill();
  }
  ctx.beginPath(); ctx.arc(cx, cy, CP_IR, 0, Math.PI * 2);
  ctx.fillStyle = '#1A1A1A'; ctx.fill();

  // Hue indicator
  const ha = (_cpHue - 90) * Math.PI / 180;
  const hr = (CP_OR + CP_IR) / 2;
  ctx.beginPath(); ctx.arc(cx + Math.cos(ha) * hr, cy + Math.sin(ha) * hr, 6, 0, Math.PI * 2);
  ctx.fillStyle = `hsl(${_cpHue},100%,50%)`; ctx.fill();
  ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2; ctx.stroke();

  // Color preview (center of ring)
  ctx.fillStyle = hsvToHex(_cpHue, _cpSat, _cpVal);
  ctx.fillRect(cx - 22, cy - 22, 44, 44);
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
  ctx.strokeRect(cx - 22, cy - 22, 44, 44);

  // SV rectangle
  const svX = bx + CP_SVX, svY = by + CP_SVY;
  ctx.fillStyle = `hsl(${_cpHue},100%,50%)`; ctx.fillRect(svX, svY, CP_SVW, CP_SVH);
  const gS = ctx.createLinearGradient(svX, svY, svX + CP_SVW, svY);
  gS.addColorStop(0, '#FFF'); gS.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = gS; ctx.fillRect(svX, svY, CP_SVW, CP_SVH);
  const gV = ctx.createLinearGradient(svX, svY, svX, svY + CP_SVH);
  gV.addColorStop(0, 'rgba(0,0,0,0)'); gV.addColorStop(1, '#000');
  ctx.fillStyle = gV; ctx.fillRect(svX, svY, CP_SVW, CP_SVH);
  ctx.strokeStyle = '#444'; ctx.lineWidth = 1; ctx.strokeRect(svX, svY, CP_SVW, CP_SVH);

  // SV indicator
  ctx.beginPath(); ctx.arc(svX + _cpSat * CP_SVW, svY + (1 - _cpVal) * CP_SVH, 5, 0, Math.PI * 2);
  ctx.fillStyle = hsvToHex(_cpHue, _cpSat, _cpVal); ctx.fill();
  ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2; ctx.stroke();

  // RESET button
  const rb = { x: bx + 16, y: by + CP_BH - 28, w: 90, h: 18 };
  ctx.fillStyle = '#2A1A00'; ctx.fillRect(rb.x, rb.y, rb.w, rb.h);
  ctx.strokeStyle = '#FF8C00'; ctx.lineWidth = 1; ctx.strokeRect(rb.x+.5, rb.y+.5, rb.w-1, rb.h-1);
  ctx.fillStyle = '#FF8C00'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('RESET', rb.x + rb.w / 2, rb.y + 12);

  // DONE button
  const db = { x: bx + CP_BW - 106, y: by + CP_BH - 28, w: 90, h: 18 };
  ctx.fillStyle = '#4A148C'; ctx.fillRect(db.x, db.y, db.w, db.h);
  ctx.strokeStyle = '#EA80FC'; ctx.lineWidth = 1; ctx.strokeRect(db.x+.5, db.y+.5, db.w-1, db.h-1);
  ctx.fillStyle = '#EA80FC'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('DONE', db.x + db.w / 2, db.y + 12);

  ctx._cpResetBtn = rb; ctx._cpDoneBtn = db;
  ctx._cpBx = bx; ctx._cpBy = by; ctx._cpCx = cx; ctx._cpCy = cy;
  ctx.textAlign = 'left';
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, 40);

  function playerHUD(p, label, xOff) {
    if (!p) return;
    drawMiniCube(xOff, 10, 18, p.colors.mid, p.colors.dark, p.colors.light);
    ctx.fillStyle = p.lives > 0 ? '#FFF' : '#666';
    ctx.font = 'bold 13px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`${label} ×${p.lives}`, xOff+22, 23);
    ctx.fillStyle = '#FDD835'; ctx.fillRect(xOff+80, 12, 12, 12);
    ctx.strokeStyle = '#F57F17'; ctx.lineWidth = 1; ctx.strokeRect(xOff+80.5, 12.5, 11, 11);
    ctx.fillStyle = p.lives > 0 ? '#FFF' : '#666';
    ctx.fillText(`×${p.coins}`, xOff+96, 23);
    ctx.fillText(String(p.score).padStart(6,'0'), xOff+148, 23);
    // Powerup badges
    let bx = xOff + 220;
    if (p.powerups.speed > 0) {
      ctx.fillStyle = '#F57F00'; ctx.fillRect(bx, 7, 46, 14);
      ctx.fillStyle = '#000'; ctx.font = 'bold 9px monospace';
      ctx.fillText(`⚡ ${(p.powerups.speed/60).toFixed(1)}s`, bx+2, 18);
      bx += 50;
    }
    if (p.powerups.size > 0) {
      ctx.fillStyle = '#AB47BC'; ctx.fillRect(bx, 7, 46, 14);
      ctx.fillStyle = '#000'; ctx.font = 'bold 9px monospace';
      ctx.fillText(`★ ${(p.powerups.size/60).toFixed(1)}s`, bx+2, 18);
      bx += 50;
    }
    if (p.powerups.nightvision > 0) {
      ctx.fillStyle = '#006064'; ctx.fillRect(bx, 7, 52, 14);
      ctx.fillStyle = '#00E5FF'; ctx.font = 'bold 9px monospace';
      ctx.fillText(`NV ${(p.powerups.nightvision/60).toFixed(1)}s`, bx+2, 18);
    }
  }

  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'center'; ctx.fillText(`LEVEL ${currentLevel+1}`, W/2, 25); ctx.textAlign = 'left';

  if (numPlayers === 1) {
    playerHUD(player1, 'P1', 8);
    const bx=W-215, by=12, bw=200, bh=10;
    ctx.fillStyle='#222'; ctx.fillRect(bx,by,bw,bh);
    const prog = Math.min(1, player1.x/(levelW-100));
    ctx.fillStyle='#29B6F6'; ctx.fillRect(bx,by,bw*prog,bh);
    ctx.fillStyle='#64B5F6'; ctx.fillRect(bx,by,bw*prog,3);
    ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
  } else {
    playerHUD(player1, 'P1', 8);
    playerHUD(player2, 'P2', 410);
    ctx.fillStyle='#444'; ctx.fillRect(W/2-1, 4, 2, 32);
  }
}

// ─── Select Screen ───────────────────────────────────────────────────────────
function drawSelectScreen() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0a1a'); g.addColorStop(1,'#0d1a2e');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  for (let i = 0; i < 60; i++) {
    const blink = Math.sin(tick*.03+i)*.4+.6;
    ctx.globalAlpha = blink; ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillRect((i*137+50)%W, (i*97+30)%(H-80), i%3===0?2:1, i%3===0?2:1);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#29B6F6'; ctx.font = 'bold 42px monospace';
  ctx.shadowColor = '#29B6F6'; ctx.shadowBlur = 20;
  ctx.fillText('★ THE CUBE BROS ★', W/2, 90); ctx.shadowBlur = 0;
  ctx.fillStyle = '#546E7A'; ctx.font = '14px monospace';
  ctx.fillText('SELECT NUMBER OF PLAYERS', W/2, 118);

  const cW=220, cH=200, cY=148, c1X=W/2-cW-20, c2X=W/2+20;
  function card(cx, label, sel, fn) {
    ctx.fillStyle = sel ? 'rgba(41,182,246,0.25)' : 'rgba(255,255,255,0.04)';
    ctx.fillRect(cx,cY,cW,cH);
    ctx.strokeStyle = sel ? '#29B6F6' : '#334'; ctx.lineWidth = sel ? 3 : 1.5;
    ctx.strokeRect(cx,cY,cW,cH);
    if (sel) {
      ctx.strokeStyle = `rgba(41,182,246,${.3+Math.sin(tick*.08)*.2})`;
      ctx.lineWidth = 6; ctx.strokeRect(cx-1,cY-1,cW+2,cH+2);
    }
    fn(cx, cY);
    ctx.fillStyle = sel ? '#FFF' : '#889'; ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center'; ctx.fillText(label, cx+cW/2, cY+cH-22);
    if (sel) { ctx.fillStyle='#29B6F6'; ctx.font='12px monospace'; ctx.fillText('▶ ENTER to start ◀', cx+cW/2, cY+cH-6); }
  }
  card(c1X,'1  PLAYER', menuSel===0, (cx,cy) => {
    const bob=Math.sin(tick*.06)*10, sz=54;
    drawMiniCube(cx+cW/2-sz/2, cy+55+bob, sz, P1.mid,P1.dark,P1.light);
    ctx.fillStyle='#000'; const ex2=cx+cW/2-sz/2;
    ctx.fillRect(ex2+sz*.52,cy+55+bob+sz*.28,sz*.14,sz*.14);
    ctx.fillRect(ex2+sz*.73,cy+55+bob+sz*.28,sz*.14,sz*.14);
  });
  card(c2X,'2  PLAYERS', menuSel===1, (cx,cy) => {
    const b1=Math.sin(tick*.06)*10, b2=Math.sin(tick*.06+1.2)*10, sz=46;
    const lx=cx+cW/2-sz-8, rx=cx+cW/2+8;
    drawMiniCube(lx,cy+60+b1,sz,P1.mid,P1.dark,P1.light);
    ctx.fillStyle='#000'; ctx.fillRect(lx+sz*.52,cy+60+b1+sz*.28,sz*.14,sz*.14); ctx.fillRect(lx+sz*.73,cy+60+b1+sz*.28,sz*.14,sz*.14);
    drawMiniCube(rx,cy+60+b2,sz,P2.mid,P2.dark,P2.light);
    ctx.fillStyle='#000'; ctx.fillRect(rx+sz*.52,cy+60+b2+sz*.28,sz*.14,sz*.14); ctx.fillRect(rx+sz*.73,cy+60+b2+sz*.28,sz*.14,sz*.14);
  });
  ctx.fillStyle=`rgba(41,182,246,${.7+Math.sin(tick*.1)*.3})`;
  ctx.font='bold 22px monospace'; ctx.textAlign='left';
  ctx.fillText('▶', (menuSel===0?c1X:c2X)-24, cY+cH/2+8);
  ctx.fillStyle='#445'; ctx.font='12px monospace'; ctx.textAlign='center';
  ctx.fillText('← → to choose  |  1 / 2 to pick directly', W/2, 390);
  ctx.fillText(menuSel===0 ? 'P1: WASD + Space' : 'P1: WASD + Space    P2: Arrow Keys + Enter', W/2, 410);
  ctx.fillStyle='#334'; ctx.font='11px monospace';
  ctx.fillText('R = return to menu during play', W/2, 432);
  ctx.textAlign='left';
}

// ─── Level Transition Screen ──────────────────────────────────────────────────
function drawTransition() {
  drawBackground(); drawPlatforms();
  ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
  const prog = 1 - transitionTimer/210;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD600'; ctx.font = 'bold 52px monospace';
  ctx.shadowColor='#FFD600'; ctx.shadowBlur=30;
  ctx.fillText('LEVEL COMPLETE!', W/2, H/2-50); ctx.shadowBlur=0;
  const nextLvl = currentLevel + 2;
  ctx.fillStyle = '#FFF'; ctx.font = '22px monospace';
  ctx.fillText(`Get ready for Level ${nextLvl}...`, W/2, H/2+5);
  // +1 UP notice
  const upPulse = 0.7 + Math.sin(tick * 0.15) * 0.3;
  ctx.globalAlpha = upPulse;
  ctx.fillStyle = '#76FF03'; ctx.font = 'bold 20px monospace';
  ctx.fillText('+1 UP! ★', W/2, H/2-18);
  ctx.globalAlpha = 1;
  // Progress bar
  ctx.fillStyle='#333'; ctx.fillRect(W/2-150, H/2+28, 300, 10);
  ctx.fillStyle= nextLvl===4 ? '#B71C1C' : nextLvl===3 ? '#00BCD4' : '#29B6F6';
  ctx.fillRect(W/2-150, H/2+28, 300*prog, 10);
  // Chest previews / hints
  function miniChest(cx, cy, color, label) {
    ctx.fillStyle='#795548'; ctx.fillRect(cx,cy,30,24);
    ctx.fillStyle='#FDD835'; ctx.fillRect(cx,cy+12-2,30,4); ctx.fillRect(cx+11,cy+5,8,8);
    ctx.fillStyle=color; ctx.font='bold 12px monospace';
    ctx.fillText(label, cx+15, cy+40);
  }
  if (nextLvl === 2) {
    ctx.fillStyle='#AAA'; ctx.font='13px monospace';
    ctx.fillText('Collect chests in Level 2 for powerups!', W/2, H/2+62);
    miniChest(W/2-70, H/2+72, '#FFE082', '⚡ Speed');
    miniChest(W/2+20, H/2+72, '#CE93D8', '★ Size');
  } else if (nextLvl === 3) {
    ctx.fillStyle='#AAA'; ctx.font='13px monospace';
    ctx.fillText('Level 3: It\'s midnight! Find night vision!', W/2, H/2+62);
    miniChest(W/2-15, H/2+72, '#00E5FF', 'NV NightVis');
  } else {
    ctx.fillStyle='#EF9A9A'; ctx.font='13px monospace';
    ctx.fillText('Level 4: The Castle! Find the KEY, defeat the KING!', W/2, H/2+62);
    ctx.fillStyle='#FFD700'; ctx.font='bold 13px monospace';
    ctx.fillText('Dodge 3 sword swings — pick up his sword — slash him!', W/2, H/2+82);
  }

}

// ─── Overlays ────────────────────────────────────────────────────────────────
function drawOverlay(title, sub, color) {

  ctx.textAlign='center';
  ctx.fillStyle=color; ctx.font='bold 54px monospace'; ctx.fillText(title, W/2, H/2-30);
  ctx.fillStyle='#EEE'; ctx.font='18px monospace'; ctx.fillText(sub, W/2, H/2+16);
