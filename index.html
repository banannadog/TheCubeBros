<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cubie Bros</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }
    h1 {
      color: #29B6F6;
      font-size: 26px;
      letter-spacing: 5px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(41,182,246,0.7);
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 3px solid #29B6F6;
      box-shadow: 0 0 30px rgba(41,182,246,0.4);
    }
    .controls {
      color: #555;
      font-size: 12px;
      margin-top: 10px;
      letter-spacing: 1px;
    }
    .controls span { color: #29B6F6; }
  </style>
</head>
<body>
  <h1>★ CUBIE BROS ★</h1>
  <canvas id="game" width="800" height="450"></canvas>
  <p class="controls">
    <span>← → / A D</span> Move &nbsp;|&nbsp;
    <span>↑ / W / Space</span> Jump &nbsp;|&nbsp;
    <span>R</span> Restart
  </p>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 450;

// ─── Constants ───────────────────────────────────────────────────────────────
const GRAVITY    = 0.55;
const MAX_FALL   = 14;
const JUMP_FORCE = -13;
const MOVE_SPEED = 4.5;
const LEVEL_W    = 3500;
const GROUND_Y   = 410;

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault && ['Space','ArrowUp','ArrowDown'].includes(e.code) && e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// ─── Level ───────────────────────────────────────────────────────────────────
// [x, y, w, h]
const platforms = [
  // Ground
  [0, GROUND_Y, LEVEL_W, 40],
  // Intro
  [180, 340, 80, 12],
  [320, 300, 96, 12],
  [480, 260, 80, 12],
  [620, 300, 100, 12],
  // Gap section
  [820, 340, 80, 12],
  [970, 295, 96, 12],
  [1120, 255, 80, 12],
  [1260, 295, 88, 12],
  [1400, 340, 96, 12],
  // Staircase up
  [1560, 365, 64, 12],
  [1650, 335, 64, 12],
  [1740, 305, 64, 12],
  [1830, 275, 64, 12],
  [1920, 245, 96, 12],
  // Long run
  [2100, 330, 128, 12],
  [2290, 295, 96, 12],
  [2450, 335, 80, 12],
  [2560, 290, 112, 12],
  // Final challenge
  [2730, 320, 64, 12],
  [2850, 280, 64, 12],
  [2970, 320, 64, 12],
  [3090, 275, 80, 12],
  [3210, 335, 96, 12],
];

// Coins [x, y]
const RAW_COINS = [
  // Intro
  [210,310],[242,310],[274,310],
  [350,270],[382,270],
  [510,228],[542,228],
  [650,268],[682,268],
  // Gap
  [848,308],[880,308],
  [998,263],[1030,263],
  [1148,223],[1180,223],
  [1288,263],[1320,263],
  // Staircase
  [1588,333],[1678,303],[1768,273],[1858,243],
  [1948,213],[1980,213],[2012,213],
  // Long run
  [2130,298],[2162,298],[2194,298],
  [2318,263],[2350,263],
  [2478,303],
  [2590,258],
  // Final
  [2758,288],[2878,248],[2998,288],[3118,243],
];
const coins = RAW_COINS.map(([x,y]) => ({ x, y, collected: false, bob: Math.random()*Math.PI*2 }));

// Enemies: { x, y, w, h, vx, alive, squish, patrolStart, patrolEnd }
function mkEnemy(x, y, patrolStart, patrolEnd, speed = 1.6) {
  return { x, y, w: 26, h: 26, vx: -speed, alive: true, squish: 0, patrolStart, patrolEnd };
}
const ENEMIES_INIT = [
  // Ground
  mkEnemy(350, GROUND_Y-26, 200,  520),
  mkEnemy(720, GROUND_Y-26, 580,  830),
  mkEnemy(1060, GROUND_Y-26, 850, 1150),
  mkEnemy(1480, GROUND_Y-26, 1300,1620),
  mkEnemy(2020, GROUND_Y-26, 1900,2200),
  mkEnemy(2530, GROUND_Y-26, 2380,2660),
  mkEnemy(2910, GROUND_Y-26, 2740,3120),
  mkEnemy(3250, GROUND_Y-26, 3080,3450),
  // Platform enemies
  mkEnemy(510,  260-26, 480, 560, 1.3),
  mkEnemy(1148, 255-26, 1120,1200, 1.2),
  mkEnemy(1960, 245-26, 1920,2016, 1.2),
  mkEnemy(2318, 295-26, 2290,2386, 1.3),
];
let enemies = ENEMIES_INIT.map(e => ({ ...e }));

// ─── Particles ───────────────────────────────────────────────────────────────
const particles = [];
function spawnParticles(x, y, color, n = 8) {
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 / n) * i + Math.random() * 0.6;
    const s = 2 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1.5,
                     life: 1, decay: 0.03 + Math.random()*0.025,
                     size: 4 + Math.random()*5, color });
  }
}

// ─── Player ──────────────────────────────────────────────────────────────────
let player, camX, tick, gameOver, won;

function initGame() {
  player = {
    x: 60, y: GROUND_Y - 28,
    w: 28, h: 28,
    vx: 0, vy: 0,
    onGround: false,
    facingRight: true,
    lives: 3, coins: 0, score: 0,
    invincible: 0,
    coyoteTime: 0,
    wobble: 0,
  };
  camX   = 0;
  tick   = 0;
  gameOver = false;
  won      = false;
  coins.forEach(c => { c.collected = false; c.bob = Math.random()*Math.PI*2; });
  enemies = ENEMIES_INIT.map(e => ({ ...e, alive: true, squish: 0 }));
  particles.length = 0;
}
initGame();

// ─── Collision Helpers ───────────────────────────────────────────────────────
function overlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function resolveX(ent) {
  for (const [px, py, pw, ph] of platforms) {
    if (!overlap(ent.x, ent.y, ent.w, ent.h, px, py, pw, ph)) continue;
    if (ent.vx > 0) ent.x = px - ent.w;
    else             ent.x = px + pw;
    ent.vx = 0;
  }
}

function resolveY(ent, isPlayer = false) {
  for (const [px, py, pw, ph] of platforms) {
    if (!overlap(ent.x, ent.y, ent.w, ent.h, px, py, pw, ph)) continue;
    if (ent.vy >= 0) {
      ent.y = py - ent.h;
      ent.vy = 0;
      if (isPlayer) player.onGround = true;
    } else {
      ent.y = py + ph;
      ent.vy = 0;
    }
  }
}

// ─── Update ──────────────────────────────────────────────────────────────────
function update() {
  if (gameOver || won) return;
  tick++;

  const left  = keys['ArrowLeft']  || keys['KeyA'];
  const right  = keys['ArrowRight'] || keys['KeyD'];
  const jump   = keys['ArrowUp']   || keys['KeyW'] || keys['Space'];

  // Horizontal
  if (left)       { player.vx = -MOVE_SPEED; player.facingRight = false; }
  else if (right) { player.vx =  MOVE_SPEED; player.facingRight = true;  }
  else            { player.vx *= 0.78; if (Math.abs(player.vx) < 0.2) player.vx = 0; }

  // Coyote time
  if (player.onGround) player.coyoteTime = 8;
  else if (player.coyoteTime > 0) player.coyoteTime--;

  // Jump
  if (jump && player.coyoteTime > 0) {
    player.vy = JUMP_FORCE;
    player.coyoteTime = 0;
    player.wobble = 7;
  }

  // Gravity
  player.vy = Math.min(player.vy + GRAVITY, MAX_FALL);
  player.onGround = false;
  if (player.wobble > 0) player.wobble--;

  // Move & resolve
  player.x += player.vx;
  if (player.x < 0) { player.x = 0; player.vx = 0; }
  resolveX(player);

  player.y += player.vy;
  resolveY(player, true);

  // Fall death
  if (player.y > H + 100) {
    player.lives--;
    if (player.lives <= 0) { gameOver = true; return; }
    player.x = Math.max(60, camX + 40);
    player.y = GROUND_Y - player.h - 10;
    player.vx = 0; player.vy = 0;
    player.invincible = 80;
  }

  if (player.invincible > 0) player.invincible--;

  // Coins
  for (const c of coins) {
    if (c.collected) continue;
    c.bob = (c.bob + 0.08) % (Math.PI * 2);
    if (overlap(player.x, player.y, player.w, player.h, c.x, c.y, 16, 16)) {
      c.collected = true;
      player.coins++;
      player.score += 100;
      spawnParticles(c.x + 8, c.y + 8, '#FDD835', 6);
    }
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) { if (e.squish > 0) e.squish -= 0.06; continue; }
    e.x += e.vx;
    if (e.x <= e.patrolStart || e.x + e.w >= e.patrolEnd) {
      e.vx *= -1;
      e.x = Math.max(e.patrolStart, Math.min(e.x, e.patrolEnd - e.w));
    }

    if (player.invincible > 0) continue;
    if (!overlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) continue;

    const stomping = player.vy > 0 && (player.y + player.h) < (e.y + e.h * 0.55 + player.vy + 2);
    if (stomping) {
      e.alive  = false;
      e.squish = 1;
      player.vy = -9;
      player.score += 200;
      spawnParticles(e.x + e.w/2, e.y + e.h/2, '#EF5350', 10);
    } else {
      player.lives--;
      player.invincible = 100;
      player.vy = -7;
      player.vx = player.x < e.x + e.w/2 ? -5 : 5;
      spawnParticles(player.x + player.w/2, player.y + player.h/2, '#FF7043', 8);
      if (player.lives <= 0) { gameOver = true; return; }
    }
  }

  // Win
  if (player.x + player.w >= LEVEL_W - 60) won = true;

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x  += p.vx;  p.y  += p.vy;
    p.vy += 0.22;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Camera — smooth follow
  const targetCam = player.x - W * 0.33;
  camX += (targetCam - camX) * 0.1;
  camX  = Math.max(0, Math.min(camX, LEVEL_W - W));
}

// ─── Drawing Helpers ─────────────────────────────────────────────────────────
function sx(worldX) { return worldX - camX; }   // world → screen X

function drawCube(worldX, worldY, w, h, mid, dark, light) {
  const x = sx(worldX);
  ctx.fillStyle = mid;
  ctx.fillRect(x, worldY, w, h);
  ctx.fillStyle = dark;
  ctx.fillRect(x + w - 4, worldY + 4, 4, h - 4);  // right shadow
  ctx.fillRect(x + 4, worldY + h - 4, w - 4, 4);  // bottom shadow
  ctx.fillStyle = light;
  ctx.fillRect(x + 1, worldY + 1, w - 5, 3);       // top highlight
  ctx.fillRect(x + 1, worldY + 1, 3, h - 5);       // left highlight
}

// ─── Sky & Background ────────────────────────────────────────────────────────
function drawBackground() {
  // Sky gradient
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0D47A1');
  g.addColorStop(0.55, '#1976D2');
  g.addColorStop(1, '#42A5F5');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Far hills (parallax 0.2)
  ctx.fillStyle = '#1565C0';
  const farHills = [[0,380,200],[220,360,260],[540,375,200],[820,355,300],[1180,370,220],[1480,350,280],[1800,365,240],[2100,355,300]];
  for (const [hx, hy, hw] of farHills) {
    const hh = 120;
    const x = ((hx - camX * 0.2) % (LEVEL_W * 0.8 + W) + LEVEL_W + W) % (LEVEL_W * 0.8 + W) - 100;
    ctx.beginPath();
    ctx.ellipse(x + hw/2, hy + hh, hw/2, hh, 0, 0, Math.PI);
    ctx.fill();
  }

  // Near hills (parallax 0.45)
  ctx.fillStyle = '#1B5E20';
  const nearHills = [[0,360,240],[280,375,200],[560,355,270],[880,370,220],[1200,360,260],[1500,375,200]];
  for (const [hx, hy, hw] of nearHills) {
    const hh = 100;
    const x = ((hx - camX * 0.45) % (LEVEL_W * 0.7 + W) + LEVEL_W + W) % (LEVEL_W * 0.7 + W) - 80;
    ctx.beginPath();
    ctx.ellipse(x + hw/2, hy + hh, hw/2, hh, 0, 0, Math.PI);
    ctx.fill();
  }

  // Clouds (parallax 0.18)
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  const cloudDefs = [[80,55,1.2],[360,72,0.9],[680,48,1.3],[1020,65,1.0],[1340,52,1.1],[1680,70,0.95],[2020,55,1.2],[2340,68,1.0],[2680,50,1.3],[3020,72,0.9]];
  for (const [wx, wy, sc] of cloudDefs) {
    const cw = 72 * sc, ch = 28 * sc;
    const x = ((wx - camX * 0.18) % (LEVEL_W * 1.1 + W) + LEVEL_W + W) % (LEVEL_W * 1.1 + W) - 100;
    ctx.fillRect(x, wy, cw, ch);
    ctx.fillRect(x + cw*0.12, wy - ch*0.4, cw*0.6, ch*0.6);
    ctx.fillRect(x + cw*0.35, wy - ch*0.65, cw*0.32, ch*0.5);
  }
}

// ─── Platforms ───────────────────────────────────────────────────────────────
function drawPlatforms() {
  for (const [px, py, pw, ph] of platforms) {
    const x = sx(px);
    if (x + pw < 0 || x > W) continue;

    if (py >= GROUND_Y) {
      // Ground — earthy
      ctx.fillStyle = '#5D4037';
      ctx.fillRect(x, py, pw, ph);
      ctx.fillStyle = '#388E3C';
      ctx.fillRect(x, py, pw, 8);
      ctx.fillStyle = '#4CAF50';
      ctx.fillRect(x, py + 1, pw, 3);
      // Dirt grid
      ctx.fillStyle = '#4A2F20';
      for (let gx = 0; gx < pw; gx += 32) {
        ctx.fillRect(x + gx, py + 10, 2, ph - 10);
      }
      for (let gy = 0; gy < ph - 10; gy += 16) {
        const offset = (Math.floor(gy / 16) % 2) * 16;
        for (let gx = offset; gx < pw; gx += 32) {
          ctx.fillRect(x + gx, py + 10 + gy, 2, 14);
        }
      }
    } else {
      // Brick platform
      ctx.fillStyle = '#D4A017';
      ctx.fillRect(x, py, pw, ph);
      ctx.fillStyle = '#FFD54F';
      ctx.fillRect(x, py, pw, 3);
      ctx.fillStyle = '#A07820';
      ctx.fillRect(x, py + ph - 3, pw, 3);
      ctx.fillStyle = '#A07820';
      ctx.fillRect(x, py + ph/2 - 1, pw, 2);
      for (let bx = 0; bx < pw; bx += 20) {
        ctx.fillRect(x + bx, py, 2, ph/2);
      }
      for (let bx = 10; bx < pw; bx += 20) {
        ctx.fillRect(x + bx, py + ph/2, 2, ph/2);
      }
    }
  }
}

// ─── Coins ───────────────────────────────────────────────────────────────────
function drawCoins() {
  for (const c of coins) {
    if (c.collected) continue;
    const x = sx(c.x);
    if (x < -20 || x > W + 20) continue;
    const bob = Math.sin(c.bob) * 3;
    const y = c.y + bob;
    ctx.fillStyle = '#FDD835';
    ctx.fillRect(x, y, 16, 16);
    ctx.fillStyle = '#FFF9C4';
    ctx.fillRect(x + 2, y + 2, 6, 5);
    ctx.strokeStyle = '#F57F17';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x + 0.75, y + 0.75, 14.5, 14.5);
    ctx.fillStyle = '#E65100';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('$', x + 4, y + 12);
  }
}

// ─── Goal Flag ───────────────────────────────────────────────────────────────
function drawGoalFlag() {
  const gx = sx(LEVEL_W - 90);
  if (gx < -50 || gx > W + 50) return;
  ctx.fillStyle = '#78909C';
  ctx.fillRect(gx + 22, 200, 6, GROUND_Y - 200);
  ctx.fillStyle = '#B0BEC5';
  ctx.fillRect(gx + 22, 200, 3, GROUND_Y - 200);
  ctx.fillStyle = '#F44336';
  ctx.fillRect(gx + 28, 200, 44, 30);
  ctx.fillStyle = '#FFEB3B';
  ctx.fillRect(gx + 28, 200, 44, 11);
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('GOAL!', gx + 31, 224);
  ctx.fillStyle = '#FDD835';
  ctx.fillRect(gx + 18, 194, 14, 14);
  ctx.fillStyle = '#F57F17';
  ctx.fillRect(gx + 20, 196, 10, 10);
}

// ─── Player Cube ─────────────────────────────────────────────────────────────
function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 1) return;

  const p = player;
  // Squash & stretch
  const moving  = Math.abs(p.vx) > 0.5;
  const sqX     = p.onGround && moving ? 2 : 0;
  const stretchY = p.vy < -4 ? -3 : (p.vy > 3 ? 2 : 0);
  const pw = p.w + sqX;
  const ph = p.h - sqX + stretchY;
  const px = p.x - sqX * 0.5;
  const py = p.y + sqX - stretchY;

  drawCube(px, py, pw, ph, '#29B6F6', '#0277BD', '#81D4FA');

  // Pixel eyes
  const ex = sx(px);
  const eyeSize = 5;
  const eyeY = py + Math.floor(ph * 0.28);
  ctx.fillStyle = '#000';
  if (p.facingRight) {
    ctx.fillRect(ex + pw*0.52, eyeY, eyeSize, eyeSize);
    ctx.fillRect(ex + pw*0.73, eyeY, eyeSize, eyeSize);
    ctx.fillStyle = '#FFF';
    ctx.fillRect(ex + pw*0.52 + 1, eyeY + 1, 2, 2);
    ctx.fillRect(ex + pw*0.73 + 1, eyeY + 1, 2, 2);
  } else {
    ctx.fillRect(ex + pw*0.15, eyeY, eyeSize, eyeSize);
    ctx.fillRect(ex + pw*0.36, eyeY, eyeSize, eyeSize);
    ctx.fillStyle = '#FFF';
    ctx.fillRect(ex + pw*0.15 + 1, eyeY + 1, 2, 2);
    ctx.fillRect(ex + pw*0.36 + 1, eyeY + 1, 2, 2);
  }

  // Mouth expression
  ctx.fillStyle = '#000';
  if (p.vy < -5) {
    // Surprised O when jumping
    ctx.fillRect(ex + pw*0.40, py + ph*0.63, 5, 5);
  } else {
    // Smile
    const mx = ex + pw*0.28;
    const my = py + ph*0.64;
    ctx.fillRect(mx,       my,     pw*0.43, 2);
    ctx.fillRect(mx,       my - 2, 2,       3);
    ctx.fillRect(mx + pw*0.43 - 2, my - 2, 2, 3);
  }

  // Running legs (pixel dashes under the cube while moving)
  if (p.onGround && Math.abs(p.vx) > 1) {
    const legPhase = Math.floor(tick / 5) % 2;
    ctx.fillStyle = '#0277BD';
    const lx = ex + (legPhase === 0 ? 4 : pw - 10);
    ctx.fillRect(lx, py + ph, 6, 5);
  }
}

// ─── Enemy Cubes ─────────────────────────────────────────────────────────────
function drawEnemies() {
  for (const e of enemies) {
    if (!e.alive) {
      if (e.squish > 0) {
        const sh = Math.max(4, 10 * e.squish);
        const sy = e.y + e.h - sh;
        drawCube(e.x, sy, e.w, sh, '#E53935', '#B71C1C', '#EF9A9A');
      }
      continue;
    }

    const ex = sx(e.x);
    if (ex + e.w < -10 || ex > W + 10) continue;

    const facingRight = e.vx > 0;
    drawCube(e.x, e.y, e.w, e.h, '#E53935', '#B71C1C', '#EF9A9A');

    // Eyes
    const eyeSize = 4;
    const eyeY = e.y + Math.floor(e.h * 0.30);
    ctx.fillStyle = '#000';
    if (facingRight) {
      ctx.fillRect(ex + e.w*0.52, eyeY, eyeSize, eyeSize);
      ctx.fillRect(ex + e.w*0.73, eyeY, eyeSize, eyeSize);
    } else {
      ctx.fillRect(ex + e.w*0.15, eyeY, eyeSize, eyeSize);
      ctx.fillRect(ex + e.w*0.36, eyeY, eyeSize, eyeSize);
    }

    // Angry eyebrows (slanted toward center)
    ctx.fillStyle = '#7F0000';
    if (facingRight) {
      ctx.fillRect(ex + e.w*0.50, eyeY - 5, e.w*0.20, 2);
      ctx.fillRect(ex + e.w*0.71, eyeY - 4, e.w*0.21, 2);
    } else {
      ctx.fillRect(ex + e.w*0.08, eyeY - 4, e.w*0.21, 2);
      ctx.fillRect(ex + e.w*0.30, eyeY - 5, e.w*0.20, 2);
    }

    // Frown
    ctx.fillStyle = '#7F0000';
    const mbase = e.y + e.h * 0.65;
    if (facingRight) {
      ctx.fillRect(ex + e.w*0.50, mbase,     e.w*0.38, 2);
      ctx.fillRect(ex + e.w*0.50, mbase - 3, 2, 4);
      ctx.fillRect(ex + e.w*0.88 - 2, mbase, 2, 4);
    } else {
      ctx.fillRect(ex + e.w*0.12, mbase,     e.w*0.38, 2);
      ctx.fillRect(ex + e.w*0.12, mbase,     2, 4);
      ctx.fillRect(ex + e.w*0.50 - 2, mbase - 3, 2, 4);
    }
  }
}

// ─── Particles ───────────────────────────────────────────────────────────────
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    const s = p.size * p.life;
    ctx.fillRect(sx(p.x) - s/2, p.y - s/2, s, s);
  }
  ctx.globalAlpha = 1;
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, 40);

  // Mini player icon
  ctx.fillStyle = '#29B6F6';
  ctx.fillRect(12, 10, 18, 18);
  ctx.fillStyle = '#0277BD';
  ctx.fillRect(26, 14, 4, 14); ctx.fillRect(14, 24, 14, 4);
  ctx.fillStyle = '#81D4FA';
  ctx.fillRect(13, 11, 14, 3); ctx.fillRect(13, 11, 3, 14);
  ctx.fillStyle = '#000';
  ctx.fillRect(18, 14, 3, 3); ctx.fillRect(23, 14, 3, 3);

  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 15px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`× ${player.lives}`, 34, 25);

  // Coin icon
  ctx.fillStyle = '#FDD835';
  ctx.fillRect(90, 12, 14, 14);
  ctx.strokeStyle = '#F57F17';
  ctx.lineWidth = 1;
  ctx.strokeRect(90.5, 12.5, 13, 13);
  ctx.fillStyle = '#FFF';
  ctx.fillText(`× ${player.coins}`, 108, 25);

  ctx.fillStyle = '#FFF';
  ctx.fillText(`SCORE: ${String(player.score).padStart(6,'0')}`, 200, 25);

  // Progress bar
  const barX = W - 215, barY = 12, barW = 200, barH = 10;
  ctx.fillStyle = '#222';
  ctx.fillRect(barX, barY, barW, barH);
  const prog = Math.min(1, player.x / (LEVEL_W - 100));
  ctx.fillStyle = '#29B6F6';
  ctx.fillRect(barX, barY, barW * prog, barH);
  ctx.fillStyle = '#64B5F6';
  ctx.fillRect(barX, barY, barW * prog, 3);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('LEVEL PROGRESS', barX, barY + barH + 10);
}

// ─── Overlays ────────────────────────────────────────────────────────────────
function drawOverlay(title, line2, titleColor) {
  ctx.fillStyle = 'rgba(0,0,0,0.68)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = titleColor;
  ctx.font = 'bold 54px monospace';
  ctx.fillText(title, W/2, H/2 - 30);

  ctx.fillStyle = '#EEE';
  ctx.font = '18px monospace';
  ctx.fillText(line2, W/2, H/2 + 16);
  ctx.fillStyle = '#888';
  ctx.font = '14px monospace';
  ctx.fillText('Press  R  to restart', W/2, H/2 + 48);
  ctx.textAlign = 'left';
}

// ─── Draw ────────────────────────────────────────────────────────────────────
function draw() {
  drawBackground();
  drawPlatforms();
  drawCoins();
  drawGoalFlag();
  drawEnemies();
  if (!gameOver) drawPlayer();
  drawParticles();
  drawHUD();

  if (gameOver) drawOverlay('GAME OVER', `Score: ${player.score}`, '#EF5350');
  if (won)      drawOverlay('YOU WIN! ★', `Score: ${player.score}   Coins: ${player.coins}`, '#FFD600');
}

// ─── Restart ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'KeyR') initGame();
});

// ─── Main Loop ───────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
