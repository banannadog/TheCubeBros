const keys = {};

});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Mobile Touch Controls ───────────────────────────────────────────────────
const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
const touch = { left: false, right: false, jump: false, interact: false, menu: false };
const TOUCH_BTNS = {
  left:     { x: 12,  y: 328, w: 62, h: 58, label: '◀' },
  right:    { x: 84,  y: 328, w: 62, h: 58, label: '▶' },
  menu:     { x: 369, y: 350, w: 62, h: 36, label: 'MENU' },
  interact: { x: 650, y: 328, w: 62, h: 58, label: 'USE' },
  jump:     { x: 722, y: 328, w: 62, h: 58, label: '▲' },
};
function updateTouchState(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  touch.left = touch.right = touch.jump = touch.interact = false;
  for (const t of e.touches) {
    const tx = (t.clientX - rect.left) * scaleX;
    const ty = (t.clientY - rect.top)  * scaleY;
    for (const [key, btn] of Object.entries(TOUCH_BTNS)) {
      if (tx >= btn.x && tx <= btn.x + btn.w && ty >= btn.y && ty <= btn.y + btn.h)
        touch[key] = true;
    }
    // Menu card selection on touch
    const cW = 220, cH = 200, cY = 148, c1X = W/2 - cW - 20, c2X = W/2 + 20;
    if (gameState === 'select') {
      if (tx >= c1X && tx <= c1X+cW && ty >= cY && ty <= cY+cH) { playTacoBell(); pendingPlayers=1; gameState='adventure'; menuSel=0; }
      if (tx >= c2X && tx <= c2X+cW && ty >= cY && ty <= cY+cH) { playTacoBell(); pendingPlayers=2; gameState='adventure'; menuSel=0; }
    }
    if (gameState === 'adventure') {
      const ac1X = W/2 - 220 - 20, ac2X = W/2 + 20, acY = 148, acW = 220, acH = 200;
      if (tx >= ac1X && tx <= ac1X+acW && ty >= acY && ty <= acY+acH) { currentAdventure=0; playTacoBell(); gameState='difficulty'; menuSel=0; }
      if (badges.has('adventurer') && tx >= ac2X && tx <= ac2X+acW && ty >= acY && ty <= acY+acH) { currentAdventure=1; playTacoBell(); gameState='difficulty'; menuSel=0; }
    }
    if (gameState === 'difficulty') {
      if (tx >= c1X && tx <= c1X+cW && ty >= cY && ty <= cY+cH) { difficulty='easy'; playTacoBell(); initGame(pendingPlayers); }
      if (tx >= c2X && tx <= c2X+cW && ty >= cY && ty <= cY+cH) { difficulty='hard'; playTacoBell(); initGame(pendingPlayers); }
    }
  }
}
canvas.addEventListener('touchstart', updateTouchState, { passive: false });
canvas.addEventListener('touchmove',  updateTouchState, { passive: false });
canvas.addEventListener('touchend',   updateTouchState, { passive: false });

function drawTouchControls() {
  if (!isMobile) return;
  const showAll = gameState === 'playing' || gameState === 'cutscene' || gameState === 'mfcutscene';
  for (const [key, btn] of Object.entries(TOUCH_BTNS)) {
    // MENU button shows whenever a game is active; movement buttons only during gameplay
    if (key !== 'menu' && !showAll) continue;
    if (key === 'menu' && gameState === 'select') continue;
    const active = touch[key];
    const isMenu = key === 'menu';
    ctx.globalAlpha = active ? 0.85 : 0.4;
    ctx.fillStyle = active ? (isMenu ? '#FF6F00' : '#00E5FF') : (isMenu ? '#3A1800' : '#334');
    ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
    ctx.strokeStyle = isMenu ? '#FF6F00' : '#00E5FF'; ctx.lineWidth = 2;
    ctx.strokeRect(btn.x + 1, btn.y + 1, btn.w - 2, btn.h - 2);
    ctx.globalAlpha = active ? 1 : 0.75;
    ctx.fillStyle = active ? '#000' : (isMenu ? '#FF6F00' : '#00E5FF');
    ctx.font = 'bold ' + (btn.label === 'USE' || btn.label === 'MENU' ? '10' : '18') + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(btn.label, btn.x + btn.w / 2, btn.y + btn.h / 2 + (isMenu ? 4 : 6));
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}

const tacoBell = new Audio('https://www.myinstants.com/media/sounds/taco-bell-bong-sfx.mp3');

function playTacoBell() { tacoBell.currentTime = 0; tacoBell.play().catch(()=>{}); }

function playCoinSound() {
  const play = () => {
    const t = audioCtx.currentTime;
    for (const [freq, start, dur] of [[988, 0, 0.07], [1319, 0.06, 0.28]]) {
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, t + start);
      gain.gain.setValueAtTime(0.4, t + start);
      gain.gain.exponentialRampToValueAtTime(0.001, t + start + dur);
      osc.start(t + start); osc.stop(t + start + dur + 0.01);
    }
  };
  if (audioCtx.state === 'suspended') audioCtx.resume().then(play); else play();
}

function playPowerupSound() {
  const play = () => {
    const t = audioCtx.currentTime;
    for (const [freq, start] of [[523,0],[659,0.08],[784,0.16],[1047,0.24]]) {
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + start);
      gain.gain.setValueAtTime(0.35, t + start);
      gain.gain.exponentialRampToValueAtTime(0.001, t + start + 0.18);
      osc.start(t + start); osc.stop(t + start + 0.2);
    }
  };
  if (audioCtx.state === 'suspended') audioCtx.resume().then(play); else play();
}

const particles = [];
function spawnParticles(x, y, color, n = 8) {
  for (let i = 0; i < n; i++) {
    const a = (Math.PI*2/n)*i + Math.random()*0.6, s = 2 + Math.random()*4;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s-1.5,
                     life: 1, decay: 0.03+Math.random()*0.025, size: 4+Math.random()*5, color });
  }
}

const moneyTrail = [];
const heartTrail = [];
const basicTrail = [];
function updateMoneyTrail() {
  // Spawn — money trail via equipped trail OR tycoon+speed legacy
  const wantMoney  = equippedTrail === 'money';
  const wantHearts = equippedTrail === 'hearts';
  const wantBasic  = equippedTrail === 'basic';
  const active = [player1, player2].filter(p => p && p.lives > 0);
  for (const p of active) {
    const tycoonBoost = equippedSkin === 'tycoon' && p.powerups.speed > 0;
    if (wantBasic && tick % 2 === 0) {
      basicTrail.push({
        x: p.x + p.w * 0.5 + (Math.random() - 0.5) * p.w * 0.4,
        y: p.y + p.h * 0.5 + (Math.random() - 0.5) * p.h * 0.4,
        size: 3 + Math.random() * 3,
        life: 1,
        decay: 0.04 + Math.random() * 0.02,
      });
    }
    if (tick % 3 !== 0) continue;
    if (wantMoney || tycoonBoost) {
      moneyTrail.push({
        x: p.x + p.w * 0.5 + (p.facingRight ? -p.w * 0.7 : p.w * 0.7),
        y: p.y + p.h * 0.2 + Math.random() * p.h * 0.5,
        vx: (p.facingRight ? -1 : 1) * (0.8 + Math.random() * 1.5),
        vy: -1.2 - Math.random() * 1.5,
        life: 1,
        decay: 0.022 + Math.random() * 0.014,
        size: 9 + Math.random() * 5,
      });
    }
    if (wantHearts) {
      heartTrail.push({
        x: p.x + p.w * 0.5 + (Math.random() - 0.5) * p.w,
        y: p.y + p.h * 0.3 + Math.random() * p.h * 0.4,
        vx: (Math.random() - 0.5) * 1.5,
        vy: -1.5 - Math.random() * 1.5,
        life: 1,
        decay: 0.018 + Math.random() * 0.012,
        size: 8 + Math.random() * 6,
      });
    }
  }
  // Update money
  for (let i = moneyTrail.length - 1; i >= 0; i--) {
    const m = moneyTrail[i];
    m.x += m.vx; m.y += m.vy; m.vy += 0.08;
    m.life -= m.decay;
    if (m.life <= 0) moneyTrail.splice(i, 1);
  }
  // Update hearts
  for (let i = heartTrail.length - 1; i >= 0; i--) {
    const h = heartTrail[i];
    h.x += h.vx; h.y += h.vy; h.vy += 0.04;
    h.life -= h.decay;
    if (h.life <= 0) heartTrail.splice(i, 1);
  }
  // Update basic
  for (let i = basicTrail.length - 1; i >= 0; i--) {
    const b = basicTrail[i];
    b.life -= b.decay;
    if (b.life <= 0) basicTrail.splice(i, 1);
  }
}

// ─── Collision ───────────────────────────────────────────────────────────────
function overlap(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function resolveX(ent) {
  for (const [px,py,pw,ph] of platforms) {
    if (!overlap(ent.x,ent.y,ent.w,ent.h,px,py,pw,ph)) continue;
    if (ent.vx > 0) ent.x = px - ent.w; else ent.x = px + pw;
    ent.vx = 0;
  }
}
function resolveY(ent) {
  for (const [px,py,pw,ph] of platforms) {
    if (!overlap(ent.x,ent.y,ent.w,ent.h,px,py,pw,ph)) continue;
    if (ent.vy >= 0) { ent.y = py - ent.h; ent.vy = 0; ent.onGround = true; }
    else             { ent.y = py + ph;     ent.vy = 0; }
  }
}

// ─── Player Update ───────────────────────────────────────────────────────────
function updatePlayer(p) {
  if (!p || p.lives <= 0) return;
  const wasBig = p.powerups.size > 0;
  const wasSpeed = p.powerups.speed > 0;
  if (p.powerups.speed      > 0) p.powerups.speed--;
  if (wasSpeed && p.powerups.speed === 0 && equippedSkin === 'murderer') jasonFlash = 25;
  if (p.powerups.size       > 0) p.powerups.size--;
  if (p.powerups.nightvision > 0) p.powerups.nightvision--;
  if (p.knifeSwing          > 0) p.knifeSwing--;
  if (wasBig && p.powerups.size === 0) {
    p.w = p.baseW; p.h = p.baseH;
    if (p.onGround) p.y += 14;
  }
  const spd = MOVE_SPEED * (p.powerups.speed > 0 ? 2.0 : 1.0);
  const cutsceneLock = currentAdventure === 1 && currentLevel === 3 && !mfBossCutsceneDone;
  if (!cutsceneLock) {
    if (p.ctrl.left())       { p.vx = -spd; p.facingRight = false; }
    else if (p.ctrl.right()) { p.vx =  spd; p.facingRight = true;  }
    else                     { p.vx *= 0.78; if (Math.abs(p.vx) < 0.2) p.vx = 0; }
  } else { p.vx *= 0.8; if (Math.abs(p.vx) < 0.2) p.vx = 0; }
  if (p.onGround) p.coyoteTime = 8;
  else if (p.coyoteTime > 0) p.coyoteTime--;
  if (!cutsceneLock && p.ctrl.jump() && p.coyoteTime > 0) { p.vy = JUMP_FORCE; p.coyoteTime = 0; p.wobble = 7; }
  p.vy = Math.min(p.vy + (p.vy > 0 ? GRAVITY * 0.65 : GRAVITY), MAX_FALL);
  p.onGround = false;
  if (p.wobble > 0) p.wobble--;
  p.x += p.vx;
  if (p.x < 0) { p.x = 0; p.vx = 0; }
  resolveX(p);
  // Door collision for MF generators
  for (const gen of generators) {
    const doorH = GROUND_Y * (1 - gen.doorAnim);
    if (doorH <= 2) continue;
    if (p.x + p.w > gen.doorX && p.x < gen.doorX + 24 && p.y < doorH) {
      if (p.x + p.w / 2 <= gen.doorX + 12) { p.x = gen.doorX - p.w; } else { p.x = gen.doorX + 24; }
      p.vx = 0;
    }
  }
  p.y += p.vy;
  resolveY(p);
  if (p.y > H + 100) {
    p.lives--; tookDamage = true; checkMistakesBadge(); checkNyctophobiaBadge(p);
    if (p.lives <= 0) return;
    p.x = Math.max(60, camX + 40);
    p.y = GROUND_Y - p.h - 10;
    p.vx = 0; p.vy = 0; p.invincible = 80;
  }
  if (p.invincible > 0) p.invincible--;
  // Attack edge detection (one-shot per press)
  const atk = p.ctrl.attack && p.ctrl.attack();
  p.justAttacked = atk && !p.attackPressed;
  p.attackPressed = atk;
}

// ─── Boss Update ─────────────────────────────────────────────────────────────
function updateBoss(active) {
  if (!boss || boss.lives <= 0 || !boss.active || active.length === 0) return;
  boss.stateTimer++;
  if (boss.invincible > 0) boss.invincible--;
  if (bossHitCooldown > 0) bossHitCooldown--;

  // Boss gravity
  boss.vy = Math.min(boss.vy + GRAVITY, MAX_FALL);
  boss.onGround = false;
  boss.y += boss.vy;
  resolveY(boss);
  boss.x += boss.vx;
  boss.x = Math.max(4575, Math.min(boss.x, 5400 - boss.w - 10));

  const nearest = active.reduce((a,b) => Math.abs(b.x-boss.x)<Math.abs(a.x-boss.x)?b:a, active[0]);

  if (boss.state === 'idle') {
    const dir = nearest.x > boss.x ? 1 : -1;
    boss.vx = dir * 1.4;
    boss.facingRight = dir > 0;
    if (boss.stateTimer >= 90) {
      boss.state = 'swinging'; boss.stateTimer = 0; boss.vx = 0;
    }
  } else if (boss.state === 'swinging') {
    boss.vx = 0;
    const swingFrame = boss.stateTimer % 40;
    boss.facingRight = nearest.x > boss.x;
    // Active hitbox: frames 8-28 of each 40-frame swing
    if (swingFrame >= 8 && swingFrame <= 28) {
      const swordX = boss.facingRight ? boss.x + boss.w : boss.x - 38;
      for (const p of active) {
        if (p.invincible > 0) continue;
        if (overlap(swordX, boss.y+18, 38, 14, p.x, p.y, p.w, p.h)) {
          if (difficulty === 'hard') p.lives = 0; else p.lives--;
          tookDamage = true; checkMistakesBadge(); checkNyctophobiaBadge(p); p.invincible = 100; p.vy = -7;
          p.vx = p.x < boss.x + boss.w/2 ? -5 : 5;
          spawnParticles(p.x+p.w/2, p.y+p.h/2, '#FF4444', 10);
        }
      }
    }
    if (boss.stateTimer >= 120) {
      boss.state = 'tired'; boss.stateTimer = 0;
      const sx2 = boss.facingRight ? boss.x + boss.w + 6 : boss.x - 38;
      boss.droppedSword = { x: sx2, y: GROUND_Y - 14, w: 34, h: 10, pickedUp: false };
    }
  } else if (boss.state === 'tired') {
    boss.vx = 0;
    // Sword pickup
    if (boss.droppedSword && !boss.droppedSword.pickedUp) {
      for (const p of active) {
        if (overlap(p.x,p.y,p.w,p.h, boss.droppedSword.x,boss.droppedSword.y,boss.droppedSword.w,boss.droppedSword.h)) {
          boss.droppedSword.pickedUp = true;
          playerHasSword = true;
          playPowerupSound();
        }
      }
    }
    // Player sword attack (press F when close)
    if (playerHasSword && bossHitCooldown <= 0) {
      for (const p of active) {
        if (!p.justAttacked) continue;
        const dist = Math.abs((p.x+p.w/2) - (boss.x+boss.w/2));
        if (dist <= 60) {
          boss.lives--;
          bossHitCooldown = 50;
          playerHasSword = false;
          spawnParticles(boss.x+boss.w/2, boss.y+boss.h/2, '#FFD700', 18);
          if (boss.lives <= 0) {
            victoryDoor = { x: boss.x - 60, y: GROUND_Y - 50, w: 28, h: 50 };
            if (!badges.has('swordfighter')) {
              badges.add('swordfighter');
              localStorage.setItem('cb_badges', JSON.stringify([...badges]));
              badgeNotif = { name: 'Swordfighter', timer: 240 };
            }
            return;
          }
          boss.state = 'idle'; boss.stateTimer = 0; boss.droppedSword = null;
        }
      }
    }
    if (boss.stateTimer >= BOSS_TIRED_FRAMES) {
      boss.state = 'idle'; boss.stateTimer = 0; boss.droppedSword = null;
      playerHasSword = false;
    }
  }
}

// ─── MF Boss Cutscene / Update ────────────────────────────────────────────────
function updateMFBoss() {
  if (!mfBoss) return;
  mfBossCutsceneTimer++;
  const t = mfBossCutsceneTimer;
  if (mfBossScreenFlash > 0) mfBossScreenFlash -= 0.08;

  // Auto-move player during cutscene
  if (!mfBossCutsceneDone) {
    for (const p of [player1, player2]) {
      if (!p) continue;
      if (mfBossCutscenePhase === 'walk') {
        if (p.x < 240) { p.x += 2.2; p.facingRight = true; }
        p.vx = 0;
      } else {
        p.vx = 0; // hold still
      }
    }
  }

  if (mfBossCutscenePhase === 'walk') {
    if (t >= 130) { mfBossCutscenePhase = 'pause'; mfBossCutsceneTimer = 0; }

  } else if (mfBossCutscenePhase === 'pause') {
    if (t >= 50) { mfBossCutscenePhase = 'appear'; mfBossCutsceneTimer = 0; }

  } else if (mfBossCutscenePhase === 'appear') {
    // Boss falls from ceiling
    mfBoss.vy += 1.4;
    mfBoss.y += mfBoss.vy;
    if (mfBoss.y >= GROUND_Y - mfBoss.h) {
      mfBoss.y = GROUND_Y - mfBoss.h;
      mfBoss.vy = 0;
      mfBossScreenFlash = 1.0;
      spawnParticles(mfBoss.x + mfBoss.w/2, mfBoss.y + mfBoss.h, '#546E7A', 28);
      spawnParticles(mfBoss.x + mfBoss.w/2, mfBoss.y + mfBoss.h, '#FF6F00', 14);
      mfBossCutscenePhase = 'impact'; mfBossCutsceneTimer = 0;
    }

  } else if (mfBossCutscenePhase === 'impact') {
    if (t >= 35) { mfBossCutscenePhase = 'rise'; mfBossCutsceneTimer = 0; }

  } else if (mfBossCutscenePhase === 'rise') {
    // Boss rises into air
    mfBoss.y -= 1.8;
    if (mfBoss.y <= mfBoss.targetY) {
      mfBoss.y = mfBoss.targetY;
      mfBossCutscenePhase = 'text'; mfBossCutsceneTimer = 0;
    }

  } else if (mfBossCutscenePhase === 'text') {
    if (t >= 140) {
      mfBossCutscenePhase = 'done';
      mfBossCutsceneDone = true;
      mfBoss.phase = 'idle'; mfBoss.phaseTimer = 0;
    }
  }

  // ── Battle phase ──────────────────────────────────────────────────────────
  if (!mfBossCutsceneDone || !mfBoss) return;
  const b = mfBoss;
  if (b.invincible > 0) b.invincible--;
  b.phaseTimer++;

  // Update boss lasers
  for (let i = bossLasers.length - 1; i >= 0; i--) {
    const bl = bossLasers[i];
    bl.x += bl.vx; bl.y += bl.vy;
    if (bl.x < -60 || bl.x > levelW + 60 || bl.y > GROUND_Y + 60) { bossLasers.splice(i, 1); continue; }
    for (const p of [player1, player2]) {
      if (!p || p.invincible > 0) continue;
      if (Math.hypot(p.x + p.w/2 - bl.x, p.y + p.h/2 - bl.y) < bl.r + 13) {
        p.lives -= difficulty === 'hard' ? 2 : 1; tookDamage = true;
        checkMistakesBadge(); p.invincible = 100; p.vy = -7;
        p.vx = p.x < bl.x ? -5 : 5;
        spawnParticles(bl.x, bl.y, '#FF1744', 10);
        bossLasers.splice(i, 1); break;
      }
    }
  }

  if (b.phase === 'idle') {
    b.y = b.targetY + Math.sin(tick * 0.05) * 8;
    if (b.phaseTimer >= 55) { b.phase = 'shooting'; b.phaseTimer = 0; b.shootRound = 0; b.ballsFired = 0; b.shootTimer = 20; }

  } else if (b.phase === 'shooting') {
    b.y = b.targetY + Math.sin(tick * 0.05) * 8;
    b.shootTimer--;
    if (b.shootTimer <= 0 && b.ballsFired < 3) {
      // Fire one ball aimed at player
      const p = player1 && player1.lives > 0 ? player1 : player2;
      if (p) {
        const a = Math.atan2((p.y+p.h/2)-(b.y+b.h/2), (p.x+p.w/2)-(b.x+b.w/2));
        bossLasers.push({ x: b.x+b.w/2, y: b.y+b.h/2, vx: Math.cos(a)*5, vy: Math.sin(a)*5, r: 9 });
        spawnParticles(b.x+b.w/2, b.y+b.h/2, '#FF6F00', 5);
      }
      b.ballsFired++;
      b.shootTimer = 30; // 30 frames between each ball
    }
    if (b.ballsFired >= 3 && b.shootTimer <= 0) {
      if (b.shootRound === 0) {
        // First round done — pause then second round
        b.phase = 'waiting'; b.phaseTimer = 0;
      } else {
        // Second round done — fall
        b.phase = 'falling'; b.phaseTimer = 0; b.vy = 0;
      }
    }

  } else if (b.phase === 'waiting') {
    b.y = b.targetY + Math.sin(tick * 0.05) * 8;
    if (b.phaseTimer >= 50) { b.phase = 'shooting'; b.phaseTimer = 0; b.shootRound = 1; b.ballsFired = 0; b.shootTimer = 20; }

  } else if (b.phase === 'falling') {
    b.vy += 0.9;
    b.y += b.vy;
    if (b.y >= GROUND_Y - b.h) {
      b.y = GROUND_Y - b.h; b.vy = 0;
      b.phase = 'grounded'; b.phaseTimer = 0;
      bossLasers.length = 0;
      spawnParticles(b.x + b.w/2, b.y + b.h, '#546E7A', 24);
      mfBossScreenFlash = 0.5;
    }

  } else if (b.phase === 'grounded') {
    // Auto-rise after 10 seconds even if not stomped
    if (b.phaseTimer >= 600) { b.phase = 'rising'; b.phaseTimer = 0; }
    if (b.invincible > 0) return;
    for (const p of [player1, player2]) {
      if (!p || p.invincible > 0 || p.lives <= 0) continue;
      if (p.vy > 0 && (p.y + p.h) < (b.y + b.h * 0.45 + p.vy + 4) &&
          overlap(p.x, p.y, p.w, p.h, b.x - 4, b.y, b.w + 8, b.h)) {
        b.hp--;
        p.vy = -11; b.invincible = 60;
        spawnParticles(b.x + b.w/2, b.y + b.h * 0.25, '#FF6F00', 20);
        mfBossScreenFlash = 0.7;
        if (b.hp <= 0) {
          b.phase = 'dead';
          spawnParticles(b.x + b.w/2, b.y + b.h/2, '#FF1744', 40);
          spawnParticles(b.x + b.w/2, b.y + b.h/2, '#FF6F00', 30);
        } else {
          b.phase = 'hit'; b.phaseTimer = 0;
        }
        break;
      }
    }

  } else if (b.phase === 'hit') {
    // Brief flash stagger before rising
    if (b.phaseTimer >= 45) { b.phase = 'rising'; b.phaseTimer = 0; }

  } else if (b.phase === 'rising') {
    b.y -= 2.5;
    if (b.y <= b.targetY) {
      b.y = b.targetY; b.phase = 'idle'; b.phaseTimer = 0;
    }
  }
}

function drawBossLasers() {
  for (const bl of bossLasers) {
    const bx = sx(bl.x);
    const pulse = 0.7 + Math.sin(tick * 0.3 + bl.x) * 0.3;
    ctx.shadowColor = '#FF6F00'; ctx.shadowBlur = 14 * pulse;
    ctx.fillStyle = '#FF6F00';
    ctx.beginPath(); ctx.arc(bx, bl.y, bl.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFCC80';
    ctx.beginPath(); ctx.arc(bx - 2, bl.y - 2, bl.r * 0.45, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawMFBossIntroOverlay() {
  if (mfBossCutsceneDone) return;
  const t = mfBossCutsceneTimer;

  // Letterbox bars
  ctx.fillStyle = '#000';

  if (mfBossCutscenePhase === 'text') {

    ctx.fillStyle = '#FF1744'; ctx.font = 'bold 10px monospace';

  }

  // Impact screen flash
