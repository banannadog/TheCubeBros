    }
    const ex = sx(e.x); if (ex+e.w < -10 || ex > W+10) continue;
    if (darkMode) continue; // body hidden in darkness — drawn by drawEnemyGlowEyes instead
    const fr = e.vx > 0;

    if (currentAdventure === 2 && e.type === 'jellyfish') {
      // ── Retro jellyfish ──
      const ew = e.w, eh = e.h;
      const pulse = 0.6 + Math.sin(tick * 0.09 + e.bobPhase) * 0.4;
      ctx.shadowColor = '#7C4DFF'; ctx.shadowBlur = 14 * pulse;
      // Bell dome (pixelated rows)
      ctx.fillStyle = '#EDE7F6'; ctx.fillRect(ex+8, e.y,    12, 2); // top highlight
      ctx.fillStyle = '#CE93D8'; ctx.fillRect(ex+5, e.y+2,  18, 2);
      ctx.fillStyle = '#AB47BC'; ctx.fillRect(ex+3, e.y+4,  22, 3);
      ctx.fillStyle = '#9C27B0'; ctx.fillRect(ex+1, e.y+7,  26, 4);
      ctx.fillStyle = '#7B1FA2'; ctx.fillRect(ex+3, e.y+11, 22, 3); // bottom rim
      // Inner glow
      ctx.globalAlpha = 0.45 * pulse;
      ctx.fillStyle = '#F3E5F5'; ctx.fillRect(ex+9, e.y+3, 10, 6);
      ctx.globalAlpha = 1;
      // Angry eyes (red glowing)
      ctx.fillStyle = '#FF1744';
      ctx.shadowColor = '#FF1744'; ctx.shadowBlur = 7 * pulse;
      ctx.fillRect(ex+6,  e.y+6, 5, 4);
      ctx.fillRect(ex+17, e.y+6, 5, 4);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#000';
      ctx.fillRect(ex+7,  e.y+7, 3, 3);
      ctx.fillRect(ex+18, e.y+7, 3, 3);
      ctx.fillStyle = '#FFF';
      ctx.fillRect(ex+7,  e.y+7, 1, 1);
      ctx.fillRect(ex+18, e.y+7, 1, 1);
      // Angry eyebrows (angled inward toward center)
      ctx.fillStyle = '#4A148C';
      ctx.fillRect(ex+4,  e.y+3, 4, 2); ctx.fillRect(ex+6,  e.y+4, 4, 2); // left brow
      ctx.fillRect(ex+18, e.y+4, 4, 2); ctx.fillRect(ex+20, e.y+3, 4, 2); // right brow
      // Wavy tentacles (pixel segments)
      const tentXs = [ex+5, ex+11, ex+17, ex+23];
      for (let t = 0; t < 4; t++) {
        const phase = tick * 0.06 + t * 1.1 + e.bobPhase;
        ctx.fillStyle = t % 2 === 0 ? '#CE93D8' : '#AB47BC';
        for (let seg = 0; seg < 6; seg++) {

      ctx.fillStyle = bodyDark;  ctx.fillRect(ex + (fr ? 5 : 0), e.y + fh - 6, fw - 5, 3);

      if (fr) { ctx.fillRect(ex, e.y + 1, 6, fh - 2); ctx.fillRect(ex, e.y + fh/2 - 2, 8, 4); }

      // Top fin
      ctx.fillStyle = bodyDark;
      ctx.fillRect(ex + (fr ? fw*0.35 : fw*0.25), e.y - 7, fw*0.3, 7);
      ctx.fillRect(ex + (fr ? fw*0.45 : fw*0.30), e.y - 10, fw*0.15, 4);
      // Scales (3 arcs)
      ctx.fillStyle = '#156B44';
      for (let si = 0; si < 3; si++) {
        const scx = ex + (fr ? fw*0.25 + si*8 : fw*0.15 + si*8);
        ctx.beginPath(); ctx.arc(scx, e.y + fh*0.55, 4, Math.PI, 0); ctx.fill();
      }
      // Angry eye (glowing red, bigger)
      const eyeX = fr ? ex + fw*0.60 : ex + fw*0.16;
      const eyeGlow = 0.7 + Math.sin(tick*0.15 + e.x*0.01)*0.3;

        ctx.fillStyle = '#E65100';

        ctx.fillStyle = '#FF1744';
        if (fr) { ctx.fillRect(ex+e.w*0.50, eyeY, 7, 5); ctx.fillRect(ex+e.w*0.72, eyeY, 7, 5); }
        else    { ctx.fillRect(ex+e.w*0.12, eyeY, 7, 5); ctx.fillRect(ex+e.w*0.34, eyeY, 7, 5); }

        // Grille / mouth (denser)
        ctx.fillStyle = '#0D1F26';
        const grY = e.y + e.h*0.58;
        if (fr) { for (let i=0; i<5; i++) ctx.fillRect(ex+e.w*.48+i*4, grY, 3, 5); }
        else    { for (let i=0; i<5; i++) ctx.fillRect(ex+e.w*.08+i*4, grY, 3, 5); }

      } else {
        // ── Standard robot cube body ──
        drawCube(e.x, e.y, e.w, e.h, '#546E7A', '#37474F', '#78909C');
        // Panel seam lines
        ctx.fillStyle = '#37474F';
        ctx.fillRect(ex, e.y + e.h*0.5, e.w, 2);
        ctx.fillRect(ex + e.w*0.5, e.y, 2, e.h);
        // Corner rivets
        ctx.fillStyle = '#90A4AE';
        for (const [rx,ry] of [[ex+3,e.y+3],[ex+e.w-6,e.y+3],[ex+3,e.y+e.h-6],[ex+e.w-6,e.y+e.h-6]]) {
          ctx.beginPath(); ctx.arc(rx, ry, 2, 0, Math.PI*2); ctx.fill();
        }
        // Antenna
        ctx.fillStyle = '#607D8B';
        ctx.fillRect(ex + e.w*0.5 - 1, e.y - 6, 2, 6);
        ctx.fillStyle = '#FF1744';
        ctx.beginPath(); ctx.arc(ex + e.w*0.5, e.y - 7, 2.5, 0, Math.PI*2); ctx.fill();
        // Eyes
        const eyeY = e.y + e.h * 0.28;
        ctx.fillStyle = '#FF1744';
        if (fr) { ctx.fillRect(ex+e.w*0.52, eyeY, 5, 4); ctx.fillRect(ex+e.w*0.73, eyeY, 5, 4); }
        else    { ctx.fillRect(ex+e.w*0.15, eyeY, 5, 4); ctx.fillRect(ex+e.w*0.36, eyeY, 5, 4); }
        // Grille
        ctx.fillStyle = '#263238';
        const grY = e.y + e.h*0.58;
        if (fr) { for (let i=0; i<4; i++) ctx.fillRect(ex+e.w*.52+i*5, grY, 3, 5); }
        else    { for (let i=0; i<4; i++) ctx.fillRect(ex+e.w*.12+i*5, grY, 3, 5); }
      }
    } else {
      drawCube(e.x, e.y, e.w, e.h, '#E53935','#B71C1C','#EF9A9A');
      const eyeY = e.y + Math.floor(e.h*0.30);
      ctx.fillStyle = '#000';
      if (fr) { ctx.fillRect(ex+e.w*0.52, eyeY, 4, 4); ctx.fillRect(ex+e.w*0.73, eyeY, 4, 4); }
      else    { ctx.fillRect(ex+e.w*0.15, eyeY, 4, 4); ctx.fillRect(ex+e.w*0.36, eyeY, 4, 4); }
      ctx.fillStyle = '#7F0000';
      if (fr) { ctx.fillRect(ex+e.w*.50, eyeY-5, e.w*.20, 2); ctx.fillRect(ex+e.w*.71, eyeY-4, e.w*.21, 2); }
      else    { ctx.fillRect(ex+e.w*.08, eyeY-4, e.w*.21, 2); ctx.fillRect(ex+e.w*.30, eyeY-5, e.w*.20, 2); }
      const mb = e.y+e.h*0.65;
      if (fr) { ctx.fillRect(ex+e.w*.50,mb,e.w*.38,2); ctx.fillRect(ex+e.w*.50,mb-3,2,4); ctx.fillRect(ex+e.w*.88-2,mb,2,4); }
      else    { ctx.fillRect(ex+e.w*.12,mb,e.w*.38,2); ctx.fillRect(ex+e.w*.12,mb,2,4);   ctx.fillRect(ex+e.w*.50-2,mb-3,2,4); }
    }
  }
}

function drawEnemyGlowEyes() {
  const robotMode = currentAdventure === 1;
  for (const e of enemies) {
    if (!e.alive) continue;
    const ex = sx(e.x); if (ex+e.w < -10 || ex > W+10) continue;
    const fr = e.vx > 0;
    const armored = robotMode && currentLevel === 2;
    const eyeY = e.y + Math.floor(robotMode ? (armored ? e.h*0.26 : e.h*0.28) : e.h*0.30);
    const pulse = 0.8 + Math.sin(tick*0.12 + e.x*0.01) * 0.2;
    ctx.shadowColor = '#FF1744';
    ctx.shadowBlur  = (armored ? 26 : robotMode ? 18 : 14) * pulse;
    ctx.fillStyle   = `rgba(255,${Math.floor(robotMode?23:30)*pulse|0},${Math.floor(robotMode?23:30)*pulse|0},1)`;
    if (fr) {
      ctx.fillRect(ex+e.w*(armored?0.50:0.52), eyeY, armored?7:5, armored?5:4);
      ctx.fillRect(ex+e.w*(armored?0.72:0.73), eyeY, armored?7:5, armored?5:4);
    } else {
      ctx.fillRect(ex+e.w*(armored?0.12:0.15), eyeY, armored?7:5, armored?5:4);
      ctx.fillRect(ex+e.w*(armored?0.34:0.36), eyeY, armored?7:5, armored?5:4);
    }
    if (robotMode) {
      // Antenna tip glow
      ctx.shadowColor = '#FF1744'; ctx.shadowBlur = (armored ? 14 : 10) * pulse;
      ctx.fillStyle = '#FF1744';
      if (armored) {
        ctx.beginPath(); ctx.arc(ex + e.w*0.3, e.y - 10, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex + e.w*0.7, e.y - 10, 3, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.beginPath(); ctx.arc(ex + e.w*0.5, e.y - 7, 2.5, 0, Math.PI*2); ctx.fill();
      }
    }
    ctx.shadowBlur = 0;
  }
}

// ─── Particles ───────────────────────────────────────────────────────────────
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    const s = p.size * p.life;
    ctx.fillStyle = p.color; ctx.fillRect(sx(p.x)-s/2, p.y-s/2, s, s);
  }
  // Money trail
  for (const m of moneyTrail) {
    ctx.globalAlpha = Math.max(0, m.life);
    ctx.fillStyle = trailColor || '#FFD700';
    ctx.font = `bold ${Math.max(6, Math.floor(m.size * m.life + 4))}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('$', sx(m.x), m.y);
  }
  // Hearts trail
  for (const h of heartTrail) {
    ctx.globalAlpha = Math.max(0, h.life);
    ctx.fillStyle = trailColor || '#FF4081';
    ctx.font = `bold ${Math.max(6, Math.floor(h.size * h.life + 4))}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('♥', sx(h.x), h.y);
  }
  // Basic trail
  for (const b of basicTrail) {
    ctx.globalAlpha = Math.max(0, b.life * 0.8);
    const sz = b.size * b.life;
    ctx.fillStyle = trailColor || '#FFFFFF';
    ctx.fillRect(sx(b.x) - sz / 2, b.y - sz / 2, sz, sz);
  }
  // Bubble trail
  for (const b of bubbleTrail) {
    ctx.globalAlpha = Math.max(0, b.life * 0.75);
    ctx.strokeStyle = trailColor || '#80DEEA'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(sx(b.x), b.y, b.r * b.life + 1, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = 'rgba(0,188,212,0.15)';
    ctx.beginPath(); ctx.arc(sx(b.x), b.y, b.r * b.life + 1, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
// Badges button bounds (used for click detection too)
const BADGE_BTN  = { x: 5,  y: H - 22, w: 68, h: 16 };
const CODES_BTN  = { x: 78, y: H - 22, w: 54, h: 16 };
let codesPanelOpen = false;
let codeInput = '';
let codeMsg = '';

function drawBadgesPanel() {
  // Badge earned popup above BADGES button
  if (badgeNotif) {
    const t = badgeNotif.timer;
    // Slide up during first 20 frames (t 240→220), stay, fade out last 40 frames
    const slideY = (t > 220 && t <= 240) ? (t - 220) * 2 : 0;
    const alpha  = t < 40 ? t / 40 : 1;
    const bx = BADGE_BTN.x, by = BADGE_BTN.y - 28 + slideY;
    ctx.globalAlpha = alpha;
    const longName = badgeNotif.name.length > 18;
    const boxH = longName ? 34 : 22;
    const boxW = 160;
    ctx.fillStyle = '#222';
    ctx.fillRect(bx - 2, by, boxW, boxH);
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1;
    ctx.strokeRect(bx - 1.5, by + 0.5, boxW, boxH - 1);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'left';
    if (longName) {
      ctx.fillText('🏅 Badge:', bx + 4, by + 11);
      ctx.fillText(badgeNotif.name, bx + 4, by + 26);
    } else {
      ctx.fillText('🏅 Badge: ' + badgeNotif.name, bx + 4, by + 14);
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  // Always draw the BADGES button in bottom-left
  const btn = BADGE_BTN;
  ctx.fillStyle = badgesPanelOpen ? '#7B5C00' : 'rgba(0,0,0,0.7)';
  ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1;
  ctx.strokeRect(btn.x + 0.5, btn.y + 0.5, btn.w - 1, btn.h - 1);
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('BADGES', btn.x + btn.w / 2, btn.y + 11);
  ctx.textAlign = 'left';

  // CODES button
  const cb = CODES_BTN;
  ctx.fillStyle = codesPanelOpen ? '#1A237E' : 'rgba(0,0,0,0.7)';
  ctx.fillRect(cb.x, cb.y, cb.w, cb.h);
  ctx.strokeStyle = '#7C4DFF'; ctx.lineWidth = 1;
  ctx.strokeRect(cb.x + 0.5, cb.y + 0.5, cb.w - 1, cb.h - 1);
  ctx.fillStyle = '#7C4DFF'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('CODES', cb.x + cb.w / 2, cb.y + 11);
  ctx.textAlign = 'left';

  // Codes input panel
  if (codesPanelOpen) {
    const cpw = 240, cph = 80, cpx = 5, cpy = H - 22 - cph - 4;
    ctx.fillStyle = 'rgba(10,10,30,0.95)'; ctx.fillRect(cpx, cpy, cpw, cph);
    ctx.strokeStyle = '#7C4DFF'; ctx.lineWidth = 1; ctx.strokeRect(cpx+0.5, cpy+0.5, cpw-1, cph-1);
    ctx.fillStyle = '#7C4DFF'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'left';
    ctx.fillText('Enter code:', cpx+8, cpy+18);
    // Input box
    ctx.fillStyle = '#111'; ctx.fillRect(cpx+8, cpy+24, cpw-16, 18);
    ctx.strokeStyle = '#7C4DFF'; ctx.strokeRect(cpx+8.5, cpy+24.5, cpw-17, 17);
    ctx.fillStyle = '#FFF'; ctx.font = '9px monospace';
    ctx.fillText('*'.repeat(codeInput.length) + (Math.floor(tick/20)%2===0?'|':''), cpx+12, cpy+37);
    // Message
    if (codeMsg) {
      ctx.fillStyle = codeMsg.startsWith('✅') ? '#76FF03' : '#FF5252';
      ctx.font = 'bold 8px monospace';
      ctx.fillText(codeMsg, cpx+8, cpy+56);
    }
    ctx.fillStyle = '#555'; ctx.font = '7px monospace';
    ctx.fillText('ENTER to submit  •  ESC to close', cpx+8, cpy+70);
  }

  if (!badgesPanelOpen) return;

  // Dim the game behind the panel
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);

  // Fixed-height scrollable panel
  const pw = 290, ph = 310;
  const px = W / 2 - pw / 2, py = H / 2 - ph / 2;
  const headerH = 38, footerH = 18;
  const contentH = ph - headerH - footerH;
  const rowH = 48, totalRows = BADGE_DEFS.length;
  const totalContentH = totalRows * rowH;
  const maxScroll = Math.max(0, totalContentH - contentH);
  badgeScrollY = Math.max(0, Math.min(badgeScrollY, maxScroll));

  ctx.fillStyle = '#111'; ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
  ctx.strokeRect(px + 1, py + 1, pw - 2, ph - 2);

  // Title
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
  ctx.fillText('BADGES', W / 2, py + 22);

  // Separator line under title
  ctx.fillStyle = '#333'; ctx.fillRect(px + 8, py + headerH - 2, pw - 16, 1);

  // Clip to content area and draw rows
  ctx.save();
  ctx.beginPath(); ctx.rect(px, py + headerH, pw - 10, contentH); ctx.clip();

  BADGE_DEFS.forEach((b, i) => {
    const earned = badges.has(b.id);
    const ry = py + headerH + i * rowH - badgeScrollY;
    if (ry + rowH < py + headerH || ry > py + headerH + contentH) return;
    ctx.fillStyle = earned ? 'rgba(255,215,0,0.08)' : 'rgba(255,255,255,0.04)';
    ctx.fillRect(px + 8, ry + 2, pw - 26, rowH - 6);
    ctx.globalAlpha = earned ? 1 : 0.35;
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(px + 26, ry + rowH / 2, 13, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
    ctx.fillText(b.icon, px + 26, ry + rowH / 2 + 4);
    ctx.globalAlpha = 1;
    ctx.fillStyle = earned ? '#FFD700' : '#666';
    ctx.font = 'bold 10px monospace'; ctx.textAlign = 'left';
    ctx.fillText(b.name, px + 46, ry + 18);
    ctx.fillStyle = earned ? '#CCC' : '#444';
    ctx.font = (b.id === 'engineer' || b.id === 'invincible') ? '6px monospace' : '8px monospace';
    ctx.fillText(b.desc, px + 46, ry + 30);
    if (earned) {
      ctx.fillStyle = '#4CAF50'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'right';
      ctx.fillText('EARNED', px + pw - 18, ry + 18);
    }
  });

  ctx.restore();

  // Separator above footer
  ctx.fillStyle = '#333'; ctx.fillRect(px + 8, py + headerH + contentH, pw - 16, 1);

  // Scrollbar track
  if (maxScroll > 0) {
    const sbX = px + pw - 9, sbY = py + headerH, sbH = contentH;
    ctx.fillStyle = '#222'; ctx.fillRect(sbX, sbY, 6, sbH);
    const thumbH = Math.max(20, sbH * (contentH / totalContentH));
    const thumbY = sbY + (badgeScrollY / maxScroll) * (sbH - thumbH);
    ctx.fillStyle = '#FFD700'; ctx.fillRect(sbX + 1, thumbY, 4, thumbH);
    // Scroll hint arrows
    ctx.fillStyle = '#666'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    if (badgeScrollY > 0)        ctx.fillText('▲', px + pw - 6, py + headerH + 10);
    if (badgeScrollY < maxScroll) ctx.fillText('▼', px + pw - 6, py + headerH + contentH - 2);
  }

  ctx.textAlign = 'left';
  ctx.fillStyle = '#666'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('click BADGES to close' + (maxScroll > 0 ? '  •  scroll to see all' : ''), W / 2, py + ph - 5);
  ctx.textAlign = 'left';
}


const SKINS_BTN  = { x: W - 73,  y: H - 22, w: 68, h: 16 };
const TRAILS_BTN = { x: W - 148, y: H - 22, w: 70, h: 16 };

function drawSkinsPanel() {
  // Always draw SKINS button in bottom-right
  const btn = SKINS_BTN;
  ctx.fillStyle = skinsPanelOpen ? '#004D40' : 'rgba(0,0,0,0.7)';
  ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
  ctx.strokeStyle = '#00E5FF'; ctx.lineWidth = 1;
  ctx.strokeRect(btn.x + 0.5, btn.y + 0.5, btn.w - 1, btn.h - 1);
  ctx.fillStyle = '#00E5FF'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('SKINS', btn.x + btn.w / 2, btn.y + 11);
  ctx.textAlign = 'left';

  if (!skinsPanelOpen) return;

  ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H);

  const pw = 300, ph = 44 + SKIN_DEFS.length * 56 + 16;
  const px = W / 2 - pw / 2, py = H / 2 - ph / 2;
  ctx.fillStyle = '#111'; ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = '#00E5FF'; ctx.lineWidth = 2;
  ctx.strokeRect(px + 1, py + 1, pw - 2, ph - 2);

  ctx.fillStyle = '#00E5FF'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
  ctx.fillText('SKINS', W / 2, py + 22);

  SKIN_DEFS.forEach((skin, i) => {
    const unlocked = skin.secret ? localStorage.getItem(skin.secretKey) === '1' : badges.has(skin.badge);
    const equipped  = equippedSkin === skin.id;
    const ry = py + 38 + i * 56;
    ctx.fillStyle = equipped ? 'rgba(0,229,255,0.1)' : unlocked ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.2)';
    ctx.fillRect(px + 8, ry, pw - 16, 50);

    // Preview: mini cube with full skin rendering
    ctx.globalAlpha = unlocked ? 1 : 0.3;
    const sz = 22;
    const mpx = px + 22, mpy = ry + 14;
    drawMiniCube(mpx, mpy, sz, P1.mid, P1.dark, P1.light);

    if (unlocked && skin.id === 'tycoon') {
      const crownH = Math.floor(sz * 0.55), crownW = Math.floor(sz * 0.65);
      const crownX = mpx + Math.floor((sz - crownW) / 2);
      ctx.fillStyle = '#FFD700'; ctx.fillRect(crownX, mpy - crownH, crownW, crownH);
      ctx.fillStyle = '#FFE55C'; ctx.fillRect(crownX, mpy - crownH, 1, crownH);
      ctx.fillStyle = '#B8860B'; ctx.fillRect(crownX + crownW - 2, mpy - crownH, 2, crownH);
      ctx.fillStyle = '#B8860B'; ctx.fillRect(crownX, mpy - crownH, crownW, 1);
      ctx.fillStyle = '#7A5C00'; ctx.fillRect(crownX, mpy - Math.floor(sz * 0.14), crownW, 2);
      ctx.fillStyle = '#FFD700'; ctx.fillRect(mpx - 3, mpy - 2, sz + 6, 3);
      ctx.fillStyle = '#B8860B'; ctx.fillRect(mpx - 3, mpy + 1, sz + 6, 1);
      const lapY = Math.round(mpy + sz * 0.42), lapH = Math.round(mpy + sz) - Math.round(mpy + sz * 0.42);
      ctx.fillStyle = '#B8860B'; ctx.fillRect(mpx, lapY, sz, lapH);
      ctx.fillStyle = '#FFD700'; ctx.fillRect(mpx, lapY, sz, 1);
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(mpx, lapY, Math.floor(sz * 0.26), Math.floor(lapH * 0.6));
      ctx.fillRect(mpx + sz - Math.floor(sz * 0.26), lapY, Math.floor(sz * 0.26), Math.floor(lapH * 0.6));
      ctx.fillStyle = '#7A5C00'; ctx.fillRect(mpx + Math.floor(sz * 0.38), lapY, Math.floor(sz * 0.24), lapH);
      ctx.fillStyle = '#FFE55C'; ctx.fillRect(mpx + Math.floor(sz * 0.44), lapY + 1, 1, Math.floor(lapH * 0.65));
      ctx.fillStyle = '#7A5C00'; ctx.fillRect(mpx, mpy + sz - 1, sz, 1);
    }

    if (unlocked && skin.id === 'explorer') {
      const bpW = Math.floor(sz * 0.45), bpH = Math.floor(sz * 0.55);
      const bpX = mpx - bpW + 2, bpY = mpy + Math.floor(sz * 0.18);
      ctx.fillStyle = '#388E3C'; ctx.fillRect(bpX, bpY, bpW, bpH);
      ctx.fillStyle = '#43A047'; ctx.fillRect(bpX, bpY, bpW, 1);
      ctx.fillStyle = '#2E7D32'; ctx.fillRect(bpX + bpW - 1, bpY, 1, bpH);
      ctx.fillStyle = '#1B5E20'; ctx.fillRect(bpX, bpY + bpH - 1, bpW, 1);
      ctx.fillStyle = '#1B5E20'; ctx.fillRect(bpX + Math.floor(bpW*0.35), bpY + Math.floor(bpH*0.35), Math.floor(bpW*0.3), 1);
      const lapY = Math.round(mpy + sz * 0.38), lapH = Math.round(mpy + sz) - Math.round(mpy + sz * 0.38);
      ctx.fillStyle = '#5D4037'; ctx.fillRect(mpx, lapY, sz, lapH);
      ctx.fillStyle = '#6D4C41'; ctx.fillRect(mpx, lapY, sz, 1);
      ctx.fillStyle = '#8D6E63';
      ctx.fillRect(mpx, lapY, Math.floor(sz * 0.28), Math.floor(lapH * 0.55));
      ctx.fillRect(mpx + sz - Math.floor(sz * 0.28), lapY, Math.floor(sz * 0.28), Math.floor(lapH * 0.55));
      ctx.fillStyle = '#EFEBE9'; ctx.fillRect(mpx + Math.floor(sz * 0.38), lapY, Math.floor(sz * 0.24), lapH);
      ctx.fillStyle = '#3E2723'; ctx.fillRect(mpx, mpy + sz - 1, sz, 1);
    }

    // Eyes on top
    if (skin.id !== 'murderer') {
      ctx.fillStyle = '#000';
      ctx.fillRect(mpx + Math.floor(sz*0.52), mpy + Math.floor(sz*0.28), 2, 2);
      ctx.fillRect(mpx + Math.floor(sz*0.73), mpy + Math.floor(sz*0.28), 2, 2);
      ctx.fillStyle = '#FFF';
      ctx.fillRect(mpx + Math.floor(sz*0.52)+1, mpy + Math.floor(sz*0.28)+1, 1, 1);
      ctx.fillRect(mpx + Math.floor(sz*0.73)+1, mpy + Math.floor(sz*0.28)+1, 1, 1);
    }

    if (unlocked && skin.id === 'murderer') {
      // Pitch black cube
      ctx.fillStyle = '#000'; ctx.fillRect(mpx, mpy, sz, sz);
      ctx.fillStyle = '#111'; ctx.fillRect(mpx, mpy, sz, 1);
      // Mini Jason mask
      const mmw = Math.floor(sz * 0.78), mmh = Math.floor(sz * 0.78);
      const mmx = mpx + Math.floor((sz - mmw) / 2), mmy = mpy + Math.floor(sz * 0.08);
      ctx.fillStyle = '#E8E4DC'; ctx.fillRect(mmx, mmy, mmw, mmh);
      ctx.fillStyle = '#C8C4BC'; ctx.fillRect(mmx, mmy, 1, mmh);
      ctx.fillStyle = '#F0EDE8'; ctx.fillRect(mmx + mmw - 1, mmy, 1, mmh);
      // Round eye holes
      const meHsz = Math.max(2, Math.floor(mmw * 0.2));
      ctx.fillStyle = '#111';
      ctx.fillRect(mmx + Math.floor(mmw*0.08), mmy + Math.floor(mmh*0.22), meHsz, meHsz);
      ctx.fillRect(mmx + mmw - Math.floor(mmw*0.08) - meHsz, mmy + Math.floor(mmh*0.22), meHsz, meHsz);
      // Mouth slots
      ctx.fillStyle = '#888';
      for (let s = 0; s < 2; s++)
        ctx.fillRect(mmx + Math.floor(mmw*0.18), mmy + Math.floor(mmh*0.70) + s*2, Math.floor(mmw*0.64), 1);
      // Red chevron marks
      ctx.fillStyle = '#CC1111';
      const mcvW = Math.floor(mmw*0.52), mcvH = Math.floor(mmh*0.26);
      const mcvX = mmx + Math.floor((mmw-mcvW)/2);
      for (let r = 0; r < mcvH; r++) {
        const w = Math.max(1, Math.floor(mcvW*(1-r/mcvH)));
        ctx.fillRect(mcvX + Math.floor((mcvW-w)/2), mmy+1+r, w, 1);
      }
      const mkcW = Math.floor(mmw*0.26), mkcH = Math.floor(mmh*0.16);
      const mlcvX = mmx + Math.floor(mmw*0.04), mlcvY = mmy + Math.floor(mmh*0.44);
      const mrcvX = mmx + mmw - Math.floor(mmw*0.04) - mkcW;
      for (let r = 0; r < mkcH; r++) {
        const w = Math.max(1, Math.floor(mkcW*(1-r/mkcH)));
        ctx.fillRect(mlcvX + Math.floor((mkcW-w)/2), mlcvY+r, w, 1);
        ctx.fillRect(mrcvX + Math.floor((mkcW-w)/2), mlcvY+r, w, 1);
      }
      // Mini knife (right side, pointing up)
      const kx = mpx + sz + 1, ky = mpy + Math.floor(sz * 0.3);
      ctx.fillStyle = '#B0BEC5'; ctx.fillRect(kx, ky - 8, 2, 8);
      ctx.fillStyle = '#607D8B'; ctx.fillRect(kx, ky - 9, 2, 1);
      ctx.fillStyle = '#4E342E'; ctx.fillRect(kx - 1, ky, 4, 5);
      ctx.fillStyle = '#6D4C41'; ctx.fillRect(kx - 1, ky, 4, 1);
    }

    if (unlocked && skin.id === 'robot') {
      const armored = robotSkinVariant === 1;
      // Override cube color
      ctx.fillStyle = armored ? '#37474F' : '#546E7A'; ctx.fillRect(mpx, mpy, sz, sz);
      ctx.fillStyle = armored ? '#1C313A' : '#37474F';
      ctx.fillRect(mpx+sz-2, mpy+2, 2, sz-2); ctx.fillRect(mpx+2, mpy+sz-2, sz-2, 2);
      ctx.fillStyle = armored ? '#546E7A' : '#78909C';
      ctx.fillRect(mpx+1, mpy+1, sz-3, 2); ctx.fillRect(mpx+1, mpy+1, 2, sz-3);
      // Panel seam
      ctx.fillStyle = armored ? '#1C313A' : '#37474F';
      ctx.fillRect(mpx, mpy+sz*0.5, sz, 1); ctx.fillRect(mpx+sz*0.5, mpy, 1, sz);
      if (armored) {
        // Hazard stripe
        ctx.save(); ctx.beginPath(); ctx.rect(mpx, mpy, sz, sz); ctx.clip();
        ctx.fillStyle = '#E65100';
        for (let s = -sz; s < sz*2; s += 6) ctx.fillRect(mpx+s, mpy+sz*0.43, 3, sz*0.14);
        ctx.restore();
        // Energy core
        const p2 = 0.6 + Math.sin(tick*0.15)*0.4;
        ctx.globalAlpha = p2; ctx.fillStyle = '#FF6F00';
        ctx.fillRect(mpx+sz*0.5-3, mpy+sz*0.38, 6, 6);
        ctx.globalAlpha = 1;
        // Dual antennas
        ctx.fillStyle = '#546E7A';
        ctx.fillRect(mpx+sz*0.3-1, mpy-5, 1, 5); ctx.fillRect(mpx+sz*0.7-1, mpy-5, 1, 5);
        ctx.fillStyle = '#FF1744';
        ctx.beginPath(); ctx.arc(mpx+sz*0.3, mpy-6, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(mpx+sz*0.7, mpy-6, 2, 0, Math.PI*2); ctx.fill();
        // Eyes
        ctx.fillStyle = '#FF1744';
        ctx.fillRect(mpx+sz*0.50, mpy+sz*0.26, 4, 3); ctx.fillRect(mpx+sz*0.72, mpy+sz*0.26, 4, 3);
      } else {
        // Single antenna
        ctx.fillStyle = '#607D8B'; ctx.fillRect(mpx+sz*0.5-1, mpy-5, 1, 5);
        ctx.fillStyle = '#FF1744';
        ctx.beginPath(); ctx.arc(mpx+sz*0.5, mpy-6, 2, 0, Math.PI*2); ctx.fill();
        // Eyes
        ctx.fillStyle = '#FF1744';
        ctx.fillRect(mpx+sz*0.52, mpy+sz*0.28, 3, 2); ctx.fillRect(mpx+sz*0.73, mpy+sz*0.28, 3, 2);
      }
      // Variant label under preview
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = armored ? '#FF6F00' : '#78909C'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
      ctx.fillText(armored ? 'ARMORED' : 'STANDARD', mpx + sz/2, mpy + sz + 9);
      ctx.globalAlpha = 1;
    }

    if (unlocked && skin.id === 'mechanic') {
      // Mini brim
      ctx.fillStyle = '#1A1A1A'; ctx.fillRect(mpx - 3, mpy - 2, sz + 6, 2);
      // Side lugs
      ctx.fillStyle = '#E65100';
      ctx.fillRect(mpx - 2, mpy - 5, 3, 3);
      ctx.fillRect(mpx + sz - 1, mpy - 5, 3, 3);
      ctx.fillStyle = '#BF360C';
      ctx.fillRect(mpx - 2, mpy - 3, 3, 1);
      ctx.fillRect(mpx + sz - 1, mpy - 3, 3, 1);
      // Dome
      const mdW = Math.floor(sz * 0.76), mdH = Math.floor(sz * 0.55);
      const mdX = mpx + Math.floor((sz - mdW) / 2), mdY = mpy - 2 - mdH;
      ctx.fillStyle = '#E65100'; ctx.fillRect(mdX, mdY, mdW, mdH);
      ctx.fillStyle = '#FF8F00'; ctx.fillRect(mdX + 1, mdY, mdW - 2, 1); ctx.fillRect(mdX, mdY + 1, 1, mdH - 2);
      ctx.fillStyle = '#BF360C'; ctx.fillRect(mdX + mdW - 2, mdY + 1, 2, mdH - 1); ctx.fillRect(mdX + 1, mdY + mdH - 2, mdW - 3, 2);
      // Black vent
      ctx.fillStyle = '#1A1A1A'; ctx.fillRect(mdX + Math.floor(mdW * 0.36), mdY, Math.floor(mdW * 0.28), Math.floor(mdH * 0.5));
      // Mini cosmetic hammer (right side)
      const mhX = mpx + sz + 2, mhY = mpy + Math.floor(sz * 0.2);
      ctx.fillStyle = '#8D6E63'; ctx.fillRect(mhX + 2, mhY + 4, 2, Math.floor(sz * 0.6));
      ctx.fillStyle = '#6D4C41'; ctx.fillRect(mhX + 3, mhY + 4, 1, Math.floor(sz * 0.6));
      ctx.fillStyle = '#546E7A'; ctx.fillRect(mhX, mhY, 6, 4);
      ctx.fillStyle = '#78909C'; ctx.fillRect(mhX, mhY, 6, 1);
      ctx.fillStyle = '#37474F'; ctx.fillRect(mhX, mhY + 3, 6, 1);
    }
    ctx.globalAlpha = 1;

    // Name + desc
    ctx.fillStyle = unlocked ? '#FFF' : '#555';
    ctx.font = 'bold 10px monospace'; ctx.textAlign = 'left';
    ctx.fillText(skin.name, px + 48, ry + 18);
    ctx.fillStyle = unlocked ? '#999' : '#444';
    ctx.font = '8px monospace';
    ctx.fillText(unlocked ? skin.desc : skin.secret ? 'Secret skin' : `Locked — earn "${skin.badge}" badge`, px + 48, ry + 30);

    // Equip / Unequip button
    if (unlocked) {
      const bx = px + pw - 66, by = ry + 14, bw = 58, bh = 18;
      ctx.fillStyle = equipped ? '#00796B' : '#1A4A3A';
      ctx.fillRect(bx, by, bw, bh);
      ctx.strokeStyle = '#00E5FF'; ctx.lineWidth = 1;
      ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
      ctx.fillStyle = '#00E5FF'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
      ctx.fillText(equipped ? 'UNEQUIP' : 'EQUIP', bx + bw / 2, by + 12);
      skin._btn = { x: bx, y: by, w: bw, h: bh };
      // Variant button for robot skin
      if (skin.hasVariant) {
        const vx = bx - 72, vw = 68;
        const isArmored = robotSkinVariant === 1;
        ctx.fillStyle = isArmored ? '#37474F' : '#1A2A30';
        ctx.fillRect(vx, by, vw, bh);
        ctx.strokeStyle = isArmored ? '#FF6F00' : '#546E7A'; ctx.lineWidth = 1;
        ctx.strokeRect(vx + 0.5, by + 0.5, vw - 1, bh - 1);
        ctx.fillStyle = isArmored ? '#FF6F00' : '#90A4AE'; ctx.font = 'bold 7px monospace';
        ctx.fillText(isArmored ? '⚙ ARMORED' : '⚙ STANDARD', vx + vw / 2, by + 12);
        skin._varBtn = { x: vx, y: by, w: vw, h: bh };
      }
    }
  });

  ctx.textAlign = 'left';
  ctx.fillStyle = '#666'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('click SKINS to close', W / 2, py + ph - 5);
  ctx.textAlign = 'left';
}

function drawTrailsPanel() {
  // Only show TRAILS button if trillionaire badge earned
  if (!badges.has('trillionaire')) return;
  const btn = TRAILS_BTN;
  ctx.fillStyle = trailsPanelOpen ? '#4A148C' : 'rgba(0,0,0,0.7)';
  ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
  ctx.strokeStyle = '#EA80FC'; ctx.lineWidth = 1;
  ctx.strokeRect(btn.x + 0.5, btn.y + 0.5, btn.w - 1, btn.h - 1);
  ctx.fillStyle = '#EA80FC'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('TRAILS', btn.x + btn.w / 2, btn.y + 11);
  ctx.textAlign = 'left';

  if (!trailsPanelOpen) return;

  ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H);

  const pw = 300, ph = 44 + TRAIL_DEFS.length * 56 + 44;
  const px = W / 2 - pw / 2, py = H / 2 - ph / 2;
  ctx.fillStyle = '#111'; ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = '#EA80FC'; ctx.lineWidth = 2;
  ctx.strokeRect(px + 1, py + 1, pw - 2, ph - 2);

  ctx.fillStyle = '#EA80FC'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
  ctx.fillText('TRAILS', W / 2, py + 22);

  TRAIL_DEFS.forEach((trail, i) => {
    const unlocked = trail.badge === null || badges.has(trail.badge);
    const equipped  = equippedTrail === trail.id;
    const ry = py + 38 + i * 56;
    ctx.fillStyle = equipped ? 'rgba(234,128,252,0.12)' : unlocked ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.2)';
    ctx.fillRect(px + 8, ry, pw - 16, 50);

    // Icon preview
    ctx.globalAlpha = unlocked ? 1 : 0.3;
    ctx.fillStyle = trail.color;
    ctx.font = `bold 20px monospace`; ctx.textAlign = 'center';
    ctx.fillText(trail.icon, px + 28, ry + 30);
    ctx.globalAlpha = 1;

    ctx.fillStyle = unlocked ? '#FFF' : '#555';
    ctx.font = 'bold 10px monospace'; ctx.textAlign = 'left';
    ctx.fillText(trail.name, px + 48, ry + 18);
    ctx.fillStyle = unlocked ? '#999' : '#444';
    ctx.font = '8px monospace';
    ctx.fillText(unlocked ? trail.desc : `Locked — earn "${trail.badge}" badge`, px + 48, ry + 30);

    if (unlocked) {
      const bx = px + pw - 66, by = ry + 14, bw = 58, bh = 18;
      ctx.fillStyle = equipped ? '#6A1B9A' : '#2A0050';
      ctx.fillRect(bx, by, bw, bh);
      ctx.strokeStyle = '#EA80FC'; ctx.lineWidth = 1;
      ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
      ctx.fillStyle = '#EA80FC'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
      ctx.fillText(equipped ? 'UNEQUIP' : 'EQUIP', bx + bw / 2, by + 12);
      trail._btn = { x: bx, y: by, w: bw, h: bh };
    }
  });

  // Color picker button row
  const cpRowY = py + 38 + TRAIL_DEFS.length * 56 + 6;
  const swatchC = trailColor || '#FFFFFF';
  ctx.fillStyle = swatchC;
  ctx.fillRect(px + 12, cpRowY, 18, 18);
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
  ctx.strokeRect(px + 12, cpRowY, 18, 18);
  const cpBtn = { x: px + 36, y: cpRowY, w: 100, h: 18 };
  ctx.fillStyle = '#2A0050';
  ctx.fillRect(cpBtn.x, cpBtn.y, cpBtn.w, cpBtn.h);
  ctx.strokeStyle = '#EA80FC'; ctx.lineWidth = 1;
  ctx.strokeRect(cpBtn.x + 0.5, cpBtn.y + 0.5, cpBtn.w - 1, cpBtn.h - 1);
  ctx.fillStyle = '#EA80FC'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('PICK COLOR', cpBtn.x + cpBtn.w / 2, cpBtn.y + 12);
  if (trailColor) {
    const rb = { x: px + 144, y: cpRowY, w: 60, h: 18 };
    ctx.fillStyle = '#1A0A00';
    ctx.fillRect(rb.x, rb.y, rb.w, rb.h);
    ctx.strokeStyle = '#FF8C00'; ctx.lineWidth = 1;
    ctx.strokeRect(rb.x + 0.5, rb.y + 0.5, rb.w - 1, rb.h - 1);
    ctx.fillStyle = '#FF8C00'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
    ctx.fillText('RESET', rb.x + rb.w / 2, rb.y + 12);
    ctx._trailResetBtn = rb;
  } else {
    ctx._trailResetBtn = null;
  }
  ctx._trailColorBtn = cpBtn;

  ctx.textAlign = 'left';
  ctx.fillStyle = '#666'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('click TRAILS to close', W / 2, py + ph - 5);
  ctx.textAlign = 'left';
}

// ─── Color Picker ─────────────────────────────────────────────────────────────
const CP_BW = 260, CP_BH = 295;
const CP_RX = 130, CP_RY = 115, CP_OR = 88, CP_IR = 63;
const CP_SVX = 30, CP_SVY = 220, CP_SVW = 200, CP_SVH = 44;

function drawColorPicker() {
  if (!colorPickerOpen) return;
  const bx = W / 2 - CP_BW / 2, by = H / 2 - CP_BH / 2;
  const cx = bx + CP_RX, cy = by + CP_RY;

  ctx.fillStyle = 'rgba(0,0,0,0.82)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#1A1A1A'; ctx.fillRect(bx, by, CP_BW, CP_BH);
  ctx.strokeStyle = '#EA80FC'; ctx.lineWidth = 2;
  ctx.strokeRect(bx + 1, by + 1, CP_BW - 2, CP_BH - 2);
  ctx.fillStyle = '#EA80FC'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
  ctx.fillText('PICK TRAIL COLOR', bx + CP_BW / 2, by + 16);

  // Hue ring
  for (let deg = 0; deg < 360; deg++) {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, CP_OR, (deg - 0.7) * Math.PI / 180, (deg + 0.7) * Math.PI / 180);
    ctx.closePath();
    ctx.fillStyle = `hsl(${deg},100%,50%)`;
    ctx.fill();
  }
  ctx.beginPath(); ctx.arc(cx, cy, CP_IR, 0, Math.PI * 2);
  ctx.fillStyle = '#1A1A1A'; ctx.fill();

  // Hue indicator
  const ha = (_cpHue - 90) * Math.PI / 180;
  const hr = (CP_OR + CP_IR) / 2;
  ctx.beginPath(); ctx.arc(cx + Math.cos(ha) * hr, cy + Math.sin(ha) * hr, 6, 0, Math.PI * 2);
  ctx.fillStyle = `hsl(${_cpHue},100%,50%)`; ctx.fill();
  ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2; ctx.stroke();

  // Color preview (center of ring)
  ctx.fillStyle = hsvToHex(_cpHue, _cpSat, _cpVal);
  ctx.fillRect(cx - 22, cy - 22, 44, 44);
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
  ctx.strokeRect(cx - 22, cy - 22, 44, 44);

  // SV rectangle
  const svX = bx + CP_SVX, svY = by + CP_SVY;
  ctx.fillStyle = `hsl(${_cpHue},100%,50%)`; ctx.fillRect(svX, svY, CP_SVW, CP_SVH);
  const gS = ctx.createLinearGradient(svX, svY, svX + CP_SVW, svY);
  gS.addColorStop(0, '#FFF'); gS.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = gS; ctx.fillRect(svX, svY, CP_SVW, CP_SVH);
  const gV = ctx.createLinearGradient(svX, svY, svX, svY + CP_SVH);
  gV.addColorStop(0, 'rgba(0,0,0,0)'); gV.addColorStop(1, '#000');
  ctx.fillStyle = gV; ctx.fillRect(svX, svY, CP_SVW, CP_SVH);
  ctx.strokeStyle = '#444'; ctx.lineWidth = 1; ctx.strokeRect(svX, svY, CP_SVW, CP_SVH);

  // SV indicator
  ctx.beginPath(); ctx.arc(svX + _cpSat * CP_SVW, svY + (1 - _cpVal) * CP_SVH, 5, 0, Math.PI * 2);
  ctx.fillStyle = hsvToHex(_cpHue, _cpSat, _cpVal); ctx.fill();
  ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2; ctx.stroke();

  // RESET button
  const rb = { x: bx + 16, y: by + CP_BH - 28, w: 90, h: 18 };
  ctx.fillStyle = '#2A1A00'; ctx.fillRect(rb.x, rb.y, rb.w, rb.h);
  ctx.strokeStyle = '#FF8C00'; ctx.lineWidth = 1; ctx.strokeRect(rb.x+.5, rb.y+.5, rb.w-1, rb.h-1);
  ctx.fillStyle = '#FF8C00'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('RESET', rb.x + rb.w / 2, rb.y + 12);

  // DONE button
  const db = { x: bx + CP_BW - 106, y: by + CP_BH - 28, w: 90, h: 18 };
  ctx.fillStyle = '#4A148C'; ctx.fillRect(db.x, db.y, db.w, db.h);
  ctx.strokeStyle = '#EA80FC'; ctx.lineWidth = 1; ctx.strokeRect(db.x+.5, db.y+.5, db.w-1, db.h-1);
  ctx.fillStyle = '#EA80FC'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('DONE', db.x + db.w / 2, db.y + 12);

  ctx._cpResetBtn = rb; ctx._cpDoneBtn = db;
  ctx._cpBx = bx; ctx._cpBy = by; ctx._cpCx = cx; ctx._cpCy = cy;
  ctx.textAlign = 'left';
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, 40);

  function playerHUD(p, label, xOff) {
    if (!p) return;
    drawMiniCube(xOff, 10, 18, p.colors.mid, p.colors.dark, p.colors.light);
    ctx.fillStyle = p.lives > 0 ? '#FFF' : '#666';
    ctx.font = 'bold 13px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`${label} ×${p.lives}`, xOff+22, 23);
    ctx.fillStyle = '#FDD835'; ctx.fillRect(xOff+80, 12, 12, 12);
    ctx.strokeStyle = '#F57F17'; ctx.lineWidth = 1; ctx.strokeRect(xOff+80.5, 12.5, 11, 11);
    ctx.fillStyle = p.lives > 0 ? '#FFF' : '#666';
    ctx.fillText(`×${p.coins}`, xOff+96, 23);
    ctx.fillText(String(p.score).padStart(6,'0'), xOff+148, 23);
    // Powerup badges
    let bx = xOff + 220;
    if (p.powerups.speed > 0) {
      ctx.fillStyle = '#F57F00'; ctx.fillRect(bx, 7, 46, 14);
      ctx.fillStyle = '#000'; ctx.font = 'bold 9px monospace';
      ctx.fillText(`⚡ ${(p.powerups.speed/60).toFixed(1)}s`, bx+2, 18);
      bx += 50;
    }
    if (p.powerups.size > 0) {
      ctx.fillStyle = '#AB47BC'; ctx.fillRect(bx, 7, 46, 14);
      ctx.fillStyle = '#000'; ctx.font = 'bold 9px monospace';
      ctx.fillText(`★ ${(p.powerups.size/60).toFixed(1)}s`, bx+2, 18);
      bx += 50;
    }
    if (p.powerups.nightvision > 0) {
      ctx.fillStyle = '#006064'; ctx.fillRect(bx, 7, 52, 14);
      ctx.fillStyle = '#00E5FF'; ctx.font = 'bold 9px monospace';
      ctx.fillText(`NV ${(p.powerups.nightvision/60).toFixed(1)}s`, bx+2, 18);
      bx += 56;
    }
    if (p.hasHammer) {
      ctx.fillStyle = '#BF360C'; ctx.fillRect(bx, 7, 38, 14);
      ctx.fillStyle = '#FFF'; ctx.font = 'bold 9px monospace';
      ctx.fillText('🔨 ON', bx+2, 18);
    }
  }

  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'center'; ctx.fillText(`LEVEL ${currentLevel+1}`, W/2, 25); ctx.textAlign = 'left';

  if (numPlayers === 1) {
    playerHUD(player1, 'P1', 8);
    if (currentAdventure === 1 && currentLevel === 1) {
      // Countdown timer for laser run
      const remaining = Math.max(0, 3600 - mfRunTimer);
      const secs = (remaining / 60).toFixed(1);
      const timerColor = remaining <= 300 ? '#FF1744' : remaining <= 600 ? '#FF9800' : '#FF5252';
      ctx.fillStyle = timerColor; ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center';
      if (remaining > 0) {
        ctx.fillText(`⚡ DODGE: ${secs}s`, W - 107, 20);
      } else {
        const gp = 0.6 + Math.sin(tick * 0.18) * 0.4;
        ctx.globalAlpha = gp;
        ctx.fillText('▶ RUN TO STOP!', W - 107, 20);
        ctx.globalAlpha = 1;
      }
      ctx.textAlign = 'left';
    } else if (currentAdventure === 2) {
      // Fish swarm warning
      if (currentLevel === 1 && uwFishActive && uwFishSwarm.length > 0) {
        const gp = 0.6 + Math.sin(tick * 0.2) * 0.4;
        ctx.globalAlpha = gp;
        ctx.fillStyle = '#FF1744'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
        ctx.fillText('⚠ FISH INCOMING!', W - 107, 20);
        ctx.globalAlpha = 1; ctx.textAlign = 'left';
      }
      // Oxygen bar
      const bx=W-215, by=5, bw=140, bh=10;
      const oxPct = Math.max(0, oxygenLevel / MAX_OXYGEN);
      const oxColor = oxPct > 0.5 ? '#00BCD4' : oxPct > 0.25 ? '#FF9800' : '#FF1744';
      ctx.fillStyle='#111'; ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle=oxColor; ctx.fillRect(bx, by, bw*oxPct, bh);
      ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(bx, by, bw*oxPct, 3);
      ctx.strokeStyle='#444'; ctx.lineWidth=1; ctx.strokeRect(bx, by, bw, bh);
      ctx.fillStyle='#80DEEA'; ctx.font='bold 8px monospace'; ctx.textAlign='left';
      ctx.fillText('O2', bx-16, by+9);
      // Progress bar
      const pbx=bx+bw+10, pby=12, pbw=60, pbh=10;
      ctx.fillStyle='#222'; ctx.fillRect(pbx,pby,pbw,pbh);
      const prog = Math.min(1, player1.x/(levelW-100));
      ctx.fillStyle='#29B6F6'; ctx.fillRect(pbx,pby,pbw*prog,pbh);
      ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(pbx,pby,pbw,pbh);
      ctx.textAlign='left';
    } else {
      const bx=W-215, by=12, bw=200, bh=10;
      ctx.fillStyle='#222'; ctx.fillRect(bx,by,bw,bh);
      const prog = Math.min(1, player1.x/(levelW-100));

function drawTransition() {
  drawBackground(); drawPlatforms();
  ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
  const prog = 1 - transitionTimer/210;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD600'; ctx.font = 'bold 52px monospace';
  ctx.shadowColor='#FFD600'; ctx.shadowBlur=30;
  ctx.fillText('LEVEL COMPLETE!', W/2, H/2-50); ctx.shadowBlur=0;
  const nextLvl = currentLevel + 2;
  ctx.fillStyle = '#FFF'; ctx.font = '22px monospace';
  ctx.fillText(`Get ready for Level ${nextLvl}...`, W/2, H/2+5);
  // +1 UP notice
  const upPulse = 0.7 + Math.sin(tick * 0.15) * 0.3;
  ctx.globalAlpha = upPulse;
  ctx.fillStyle = '#76FF03'; ctx.font = 'bold 20px monospace';
  ctx.fillText('+1 UP! ★', W/2, H/2-18);
  ctx.globalAlpha = 1;
  // Progress bar
  ctx.fillStyle='#333'; ctx.fillRect(W/2-150, H/2+28, 300, 10);
  ctx.fillStyle= nextLvl===4 ? '#B71C1C' : nextLvl===3 ? '#00BCD4' : '#29B6F6';
  ctx.fillRect(W/2-150, H/2+28, 300*prog, 10);
  // Chest previews / hints
  function miniChest(cx, cy, color, label) {
    ctx.fillStyle='#795548'; ctx.fillRect(cx,cy,30,24);
    ctx.fillStyle='#FDD835'; ctx.fillRect(cx,cy+12-2,30,4); ctx.fillRect(cx+11,cy+5,8,8);
    ctx.fillStyle=color; ctx.font='bold 12px monospace';
    ctx.fillText(label, cx+15, cy+40);
  }
  if (currentAdventure === 1) {
    // Mechanical Factory hints
    if (nextLvl === 2) {
      ctx.fillStyle='#AAA'; ctx.font='13px monospace';
      ctx.fillText('Level 2: Dodge laser balls and hit the stop button!', W/2, H/2+62);
    } else if (nextLvl === 3) {
      ctx.fillStyle='#FF8F00'; ctx.font='13px monospace';
      ctx.fillText('Level 3: Armored robots ahead! Find the HAMMER!', W/2, H/2+62);
      miniChest(W/2-15, H/2+72, '#FF6F00', '🔨 Hammer');
    } else {
      ctx.fillStyle='#EF9A9A'; ctx.font='13px monospace';
      ctx.fillText('Level 4: Defeat the Factory Commander!', W/2, H/2+62);
      ctx.fillStyle='#FFD700'; ctx.font='bold 13px monospace';
      ctx.fillText('Stomp on it to damage it', W/2, H/2+82);

// ─── UW Shark Boss ────────────────────────────────────────────────────────────
function updateUWShark() {
  if (!uwShark) return;
  const s = uwShark;

  // Intro — shark swims in from the right, then title card holds
  if (uwSharkIntroTimer > 0) {
    uwSharkIntroTimer--;
    // First 80 frames: swim toward center
    if (uwSharkIntroTimer > 120) {
      s.x += s.vx; // swim left at -4
      if (s.x < 420) s.x = 420; // stop in the middle
      s.facingLeft = true;
    }
    return;
  }

  if (!s.alive) {
    s.sinkOff += 1.8;
    if (s.sinkOff > 50 && !uwVictoryDoor) {
      uwVictoryDoor = { x: 900/2 - 14, y: GROUND_Y - 50, w: 28, h: 50 };
      spawnParticles(900/2, GROUND_Y - 50, '#00BCD4', 20);
    }
    return;
  }

  if (s.invincible > 0) s.invincible--;
  s.phaseTimer++;
  s.y = GROUND_Y - s.h; // always stay on ground

  const patrolSpd  = 1.8;
  const dashSpd    = 7;

  // Get nearest player X for targeting
  const active = [player1, player2].filter(p => p && p.lives > 0);
  const target = active.reduce((best, p) => {
    if (!best) return p;
    return Math.abs(p.x - s.x) < Math.abs(best.x - s.x) ? p : best;
  }, null);

  if (s.phase === 'intro') {
    if (s.phaseTimer > 20) { s.phase = 'patrol'; s.phaseTimer = 0; s.vx = -patrolSpd; }

  } else if (s.phase === 'patrol') {
    s.x += s.vx;
    if (s.x <= 20)         { s.x = 20;        s.vx =  patrolSpd; s.facingLeft = false; }
    if (s.x + s.w >= 878)  { s.x = 878 - s.w; s.vx = -patrolSpd; s.facingLeft = true;  }
    if (s.phaseTimer >= 130) {
      s.phase = 'windup'; s.phaseTimer = 0;
      // face the player
      if (target) s.facingLeft = target.x < s.x + s.w/2;
    }

  } else if (s.phase === 'windup') {
    // pause briefly, facing target
    if (target) s.facingLeft = target.x < s.x + s.w/2;
    if (s.phaseTimer >= 35) {
      s.phase = 'dash'; s.phaseTimer = 0;
      s.vx = s.facingLeft ? -dashSpd : dashSpd;
    }

  } else if (s.phase === 'dash') {
    s.x += s.vx;
    if (s.x <= 20)        { s.x = 20;        s.vx = dashSpd;  s.facingLeft = false; }
    if (s.x + s.w >= 878) { s.x = 878 - s.w; s.vx = -dashSpd; s.facingLeft = true;  }
    if (s.phaseTimer >= 70) {
      s.dashCount++;
      if (s.dashCount < 2) {
        // brief pause then dash again
        s.phase = 'dashpause'; s.phaseTimer = 0;
      } else {
        // 2 dashes done — retreat
        s.dashCount = 0;
        s.phase = 'retreat'; s.phaseTimer = 0;
        s.vx = s.x < 450 ? patrolSpd : -patrolSpd;
        s.facingLeft = s.vx < 0;
      }
    }

  } else if (s.phase === 'dashpause') {
    // brief pause between the two dashes
    if (s.phaseTimer >= 25) {
      s.phase = 'windup'; s.phaseTimer = 0;
      if (target) s.facingLeft = target.x < s.x + s.w/2;
    }

  } else if (s.phase === 'retreat') {
    s.x += s.vx > 0 ? patrolSpd * 1.5 : -patrolSpd * 1.5;
    if (s.x <= 20)        { s.x = 20;        s.vx =  patrolSpd; s.facingLeft = false; }
    if (s.x + s.w >= 878) { s.x = 878 - s.w; s.vx = -patrolSpd; s.facingLeft = true;  }
    if (s.phaseTimer >= 90) {
      s.phase = 'patrol'; s.phaseTimer = 0;
    }
  }

  // Player collisions
  for (const p of active) {
    if (p.invincible > 0) continue;
    if (!overlap(p.x, p.y, p.w, p.h, s.x, s.y, s.w, s.h)) continue;
    // Stomp on back (top 45% of shark) — damages shark
    if (s.invincible === 0 && p.vy > 0 && (p.y + p.h) < (s.y + s.h * 0.45 + p.vy + 2)) {
      s.hp--;
      s.invincible = 90;
      p.vy = -10;
      spawnParticles(s.x + s.w/2, s.y + 4, '#90A4AE', 12);
      spawnParticles(s.x + s.w/2, s.y + 4, '#EF5350', 8);
      if (s.hp <= 0) {
        s.alive = false; s.sinkOff = 0;
        spawnParticles(s.x + s.w/2, s.y + s.h/2, '#90A4AE', 30);
        spawnParticles(s.x + s.w/2, s.y + s.h/2, '#FF1744', 20);
      }
    } else if (s.phase === 'dash') {
      // Only take damage during a dash
      p.lives -= difficulty === 'hard' ? 2 : 1;
      tookDamage = true; checkMistakesBadge(p);
      p.invincible = 100; p.vy = -7;
      p.vx = p.x < s.x + s.w/2 ? -5 : 5;
      spawnParticles(p.x+p.w/2, p.y+p.h/2, '#FF7043', 8);
    }
  }
}

function drawUWShark() {
  if (!uwShark) return;
  const s = uwShark;
  if (!s.alive && s.sinkOff > 85) return;
  if (s.invincible > 0 && Math.floor(s.invincible/4)%2===1) return;

  const bx = sx(s.x);
  const by = s.y + (s.alive ? 0 : s.sinkOff);
  const fr = s.vx <= 0; // facing left by default (swimming toward player spawn)

  const hurt = s.hp === 1;
  const bc  = hurt ? '#C62828' : '#607D8B';
  const bd  = hurt ? '#8B0000' : '#455A64';
  const bl  = hurt ? '#FFCDD2' : '#90A4AE';

  ctx.save();
  // Flip horizontally when facing right
  if (!fr) { ctx.translate(bx + s.w, 0); ctx.scale(-1, 1); }
  const dx = fr ? bx : 0;

  // Tail fins
  ctx.fillStyle = bd;
  ctx.fillRect(dx, by+2, 12, 13);
  ctx.fillRect(dx, by+25, 12, 13);
  ctx.fillStyle = bc;
  ctx.fillRect(dx+2, by+4, 7, 9);
  ctx.fillRect(dx+2, by+27, 7, 9);

  // Main body
  ctx.fillStyle = bc; ctx.fillRect(dx+10, by+7, 52, 26);
  ctx.fillStyle = bl; ctx.fillRect(dx+10, by+7, 52, 4);  // top shine
  ctx.fillStyle = bd; ctx.fillRect(dx+10, by+29, 52, 4); // bottom shadow
  // Belly
  ctx.fillStyle = '#ECEFF1'; ctx.fillRect(dx+12, by+21, 48, 11);

  // Head/snout
  ctx.fillStyle = bc; ctx.fillRect(dx+60, by+10, 10, 20);
  ctx.fillStyle = bd; ctx.fillRect(dx+68, by+13, 2, 10); // snout tip

  // Dorsal fin
  ctx.fillStyle = bd;
  ctx.fillRect(dx+26, by+1, 24, 7);
  ctx.fillRect(dx+30, by-5, 16, 6);
  ctx.fillRect(dx+35, by-9, 8, 5);
  ctx.fillStyle = bc; ctx.fillRect(dx+27, by+1, 6, 4); // shine on fin

  // Pectoral fin (lower)
  ctx.fillStyle = bd;
  ctx.fillRect(dx+28, by+33, 22, 6);
  ctx.fillRect(dx+32, by+38, 12, 4);

  // Eye
  ctx.fillStyle = '#1A237E'; ctx.fillRect(dx+54, by+11, 7, 7);
  ctx.fillStyle = '#FFF'; ctx.fillRect(dx+55, by+12, 2, 2);
  // Angry eyebrow
  ctx.fillStyle = '#000';
  ctx.fillRect(dx+51, by+8, 4, 2);
  ctx.fillRect(dx+55, by+7, 4, 2);
  ctx.fillRect(dx+59, by+6, 3, 2);

  // Open mouth + teeth
  ctx.fillStyle = '#1A237E'; ctx.fillRect(dx+59, by+25, 11, 9);
  ctx.fillStyle = '#FFF';
  for (let i=0; i<3; i++) ctx.fillRect(dx+60+i*3, by+25, 2, 4);
  ctx.fillRect(dx+60, by+30, 2, 3);
  ctx.fillRect(dx+63, by+30, 2, 3);
  ctx.fillRect(dx+66, by+30, 2, 3);

  ctx.restore();

  // HP bar (above shark)
  if (s.alive) {
    const hbW = 90, hbX = sx(s.x + s.w/2) - 45, hbY = s.y - 20;
    ctx.fillStyle = '#333'; ctx.fillRect(hbX, hbY, hbW, 7);
    ctx.fillStyle = s.hp===3?'#4CAF50':s.hp===2?'#FF9800':'#F44336';
    ctx.fillRect(hbX, hbY, hbW*(s.hp/s.maxHp), 7);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.strokeRect(hbX, hbY, hbW, 7);
    ctx.fillStyle = '#00BCD4'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
    ctx.fillText('GREAT SHARK', sx(s.x + s.w/2), hbY - 3);
    ctx.textAlign = 'left';

    // Stomp hint (only before first hit)
    if (s.hp === s.maxHp && s.invincible === 0 && uwSharkIntroTimer === 0) {
      const hp = 0.5 + Math.sin(tick*0.08)*0.5;
      ctx.globalAlpha = hp;
      ctx.fillStyle = '#FFF'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
      ctx.fillText('▼  Stomp its back!', sx(s.x + s.w/2), hbY - 14);
      ctx.globalAlpha = 1; ctx.textAlign = 'left';
    }
  }

  // Boss intro title card — show only once shark has swum in (last 120 frames)
  if (uwSharkIntroTimer > 0 && uwSharkIntroTimer <= 120) {
    const alpha = Math.min(1, (120 - uwSharkIntroTimer) / 20);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, H/2 - 50, W, 100);
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, 44); ctx.fillRect(0, H-44, W, 44);
    ctx.fillStyle = '#00BCD4'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
    ctx.fillText('B O S S', W/2, H/2 - 24);
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 22px monospace';
    ctx.fillText('SHARK', W/2, H/2 + 8);
    ctx.fillStyle = '#FF6F00'; ctx.font = 'bold 9px monospace';
    ctx.fillText('Dodge the attacks — stomp on it to damage it', W/2, H/2 + 30);
    ctx.globalAlpha = 1; ctx.textAlign = 'left';
  }
}

function drawBossKey() {

  ctx.fillRect(kx + 2, ky + 10, 3, 4); ctx.fillRect(kx + 6, ky + 10, 3, 5);

function drawBoss() {
  if (!boss || boss.lives <= 0) return;
  const bx = sx(boss.x); if (bx+boss.w < -80 || bx > W+80) return;
  const by = boss.y;
  const fr = boss.facingRight;
  // Flash when invincible
  if (boss.invincible > 0 && Math.floor(boss.invincible/5)%2 === 1) return;

  // Cape (behind body)
  ctx.fillStyle = '#B71C1C';
  ctx.fillRect(bx+(fr?-14:boss.w), by+8, 16, boss.h-8);
  ctx.fillStyle = '#C62828';
  ctx.fillRect(bx+(fr?-13:boss.w+1), by+8, 4, boss.h-8);

  // Robe (lower body)
  ctx.fillStyle = '#4A148C'; ctx.fillRect(bx, by+24, boss.w, boss.h-24);
  ctx.fillStyle = '#6A1B9A'; ctx.fillRect(bx, by+24, boss.w, 4);
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(bx+4, by+24, boss.w-8, 3); // gold belt
  ctx.fillStyle = '#38006B'; ctx.fillRect(bx+boss.w-4, by+24, 4, boss.h-24);

  // Shirt (upper body)
  ctx.fillStyle = '#1565C0'; ctx.fillRect(bx+4, by+14, boss.w-8, 14);
  ctx.fillStyle = '#1976D2'; ctx.fillRect(bx+4, by+14, 4, 14);
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(bx+boss.w/2-2, by+14, 4, 14); // shirt center stripe

  // Head
  ctx.fillStyle = '#FFCC80'; ctx.fillRect(bx+8, by+2, boss.w-16, 14);
  ctx.fillStyle = '#FFB74D'; ctx.fillRect(bx+8+boss.w-24, by+2, 4, 14);

  // Crown
  ctx.fillStyle = '#FFD700'; ctx.fillRect(bx+6, by-6, boss.w-12, 10);
  for (let i=0;i<3;i++) { ctx.fillRect(bx+8+i*10, by-13, 6, 9); }
  ctx.fillStyle='#E53935'; ctx.fillRect(bx+9,by-10,4,4);
  ctx.fillStyle='#1565C0'; ctx.fillRect(bx+19,by-10,4,4);
  ctx.fillStyle='#2E7D32'; ctx.fillRect(bx+29,by-10,4,4);

  // Eyes
  ctx.fillStyle = '#1A1A1A';
  const eY = by + 6;
  if (fr) { ctx.fillRect(bx+boss.w-16,eY,4,4); ctx.fillRect(bx+boss.w-9,eY,4,4); }
  else    { ctx.fillRect(bx+9,eY,4,4); ctx.fillRect(bx+16,eY,4,4); }

  // Sword during attack swing
  if (boss.state === 'swinging') {
    const sf = boss.stateTimer % 40;
    const angle = ((sf / 40) - 0.5) * Math.PI * 1.4;
    ctx.save();
    ctx.translate(bx + (fr ? boss.w : 2), by + 20);
    ctx.rotate(angle * (fr ? 1 : -1));
    ctx.fillStyle = '#B0BEC5'; ctx.fillRect(fr ? 0 : -34, -3, 34, 7);
    ctx.fillStyle = '#CFD8DC'; ctx.fillRect(fr ? 0 : -34, -1, 34, 2);
    ctx.fillStyle = '#8D6E63'; ctx.fillRect(fr ? -8 : 0, -5, 8, 11); // hilt
    ctx.fillStyle = '#FFD700'; ctx.fillRect(fr ? -6 : -1, -7, 12, 4); // crossguard
    ctx.restore();
  }

  // Dropped sword on floor
  if (boss.droppedSword && !boss.droppedSword.pickedUp) {
    const dsx = sx(boss.droppedSword.x);
    ctx.fillStyle = '#8D6E63'; ctx.fillRect(dsx-8, boss.droppedSword.y, 8, 10);
    ctx.fillStyle = '#FFD700'; ctx.fillRect(dsx-4, boss.droppedSword.y-5, 16, 4);
    ctx.fillStyle = '#B0BEC5'; ctx.fillRect(dsx, boss.droppedSword.y, boss.droppedSword.w, boss.droppedSword.h);
    ctx.fillStyle = '#CFD8DC'; ctx.fillRect(dsx, boss.droppedSword.y+1, boss.droppedSword.w, 3);
    const pg = 0.35 + Math.sin(tick*0.14)*0.25;
    ctx.globalAlpha = pg;
    ctx.fillStyle = '#E0F7FA';
    ctx.fillRect(dsx-2, boss.droppedSword.y-2, boss.droppedSword.w+4, boss.droppedSword.h+4);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#80DEEA'; ctx.font = 'bold 9px monospace'; ctx.textAlign='center';
    ctx.fillText('PICK UP [F]', dsx+boss.droppedSword.w/2, boss.droppedSword.y-8);
    ctx.textAlign='left';
  }

  // Health bar
  const hbW=120, hbX=bx+boss.w/2-60, hbY=by-28;
  ctx.fillStyle='#333'; ctx.fillRect(hbX,hbY,hbW,8);
  ctx.fillStyle = boss.lives===3?'#4CAF50':boss.lives===2?'#FF9800':'#F44336';
  ctx.fillRect(hbX,hbY,hbW*(boss.lives/3),8);
  ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(hbX,hbY,hbW,8);
  ctx.fillStyle='#FFD700'; ctx.font='bold 9px monospace'; ctx.textAlign='center';
  ctx.fillText('KING', bx+boss.w/2, hbY-3); ctx.textAlign='left';

  // Tired label
  if (boss.state === 'tired') {
    const tp = 0.6+Math.sin(tick*0.09)*0.4;
    ctx.globalAlpha=tp; ctx.fillStyle='#FFD700'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
    ctx.fillText('TIRED! Press F near him!', bx+boss.w/2, hbY-16);
    ctx.globalAlpha=1; ctx.textAlign='left';
  }
}

function drawPlayerSword() {
  if (!playerHasSword) return;
  const holder = [player1,player2].find(p=>p&&p.lives>0&&p.hasSword===undefined); // any active player
  // Draw sword on whichever player collected it (just on player1/2 whoever has it)
  for (const p of [player1,player2]) {
    if (!p || p.lives <= 0) continue;
    const px = sx(p.x);
    const dir = p.facingRight ? 1 : -1;
    const swx = px + (p.facingRight ? p.w+2 : -28);
    ctx.fillStyle='#8D6E63'; ctx.fillRect(px+(p.facingRight?p.w-3:0), p.y+8, 6, 10);
    ctx.fillStyle='#FFD700'; ctx.fillRect(px+(p.facingRight?p.w-5:-4), p.y+5, 12, 4);
    ctx.fillStyle='#B0BEC5'; ctx.fillRect(swx, p.y+12, 26*dir, 6);
    break; // only draw on first active player as proxy
  }
}

// ─── Main Draw ───────────────────────────────────────────────────────────────
function draw() {
  if (gameState === 'select')     { drawSelectScreen();     return; }
  if (gameState === 'adventure')  { drawAdventureScreen();  return; }
  if (gameState === 'difficulty') { drawDifficultyScreen(); return; }
  if (gameState === 'transition') { drawTransition();       return; }
  if (gameState === 'cutscene')   { drawCutscene();       return; }
  if (gameState === 'mfcutscene') { drawMFVictoryCutscene(); return; }
  const darkMode = currentLevel === 2 && currentAdventure === 0 && !hasNightVision();
  drawBackground(); drawPlatforms(); drawCoins(); drawChests();
  if (currentAdventure === 2) { drawOxygenBubbles(); drawUWVictoryDoor(); drawUWFishSwarm(); drawUWShark(); }
  if (currentAdventure === 1) drawGenerators();
  if (currentLevel < 3 && currentAdventure !== 2) drawGoalFlag();
  if (currentAdventure === 2 && currentLevel < 3) drawGoalFlag();
  if (currentAdventure === 1 && currentLevel === 1) { drawLaserBalls(); drawMFStopButton(); }
  drawEnemies();
  if (currentAdventure === 0 && currentLevel === 3) { drawCastleDoors(); drawBossKey(); drawBoss(); drawVictoryDoor(); drawCKBossCutscene(); }
  if (currentAdventure === 1 && currentLevel === 3) {
    // Arena walls
    const wallW = 18;
    const lx = sx(0), rx = sx(levelW - wallW);
    ctx.fillStyle = '#37474F'; ctx.fillRect(lx, 0, wallW, GROUND_Y);
    ctx.fillStyle = '#546E7A'; ctx.fillRect(lx + wallW - 3, 0, 3, GROUND_Y);
    ctx.fillStyle = '#37474F'; ctx.fillRect(rx, 0, wallW, GROUND_Y);
    ctx.fillStyle = '#546E7A'; ctx.fillRect(rx, 0, 3, GROUND_Y);
    // Rivet details
    ctx.fillStyle = '#607D8B';
    for (let ry = 30; ry < GROUND_Y; ry += 60) {
      ctx.beginPath(); ctx.arc(lx + 9, ry, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(rx + 9, ry, 3, 0, Math.PI*2); ctx.fill();
    }
    drawBossLasers(); drawMFBoss(); drawMFVictoryDoor(); drawMFBossIntroOverlay();
  }
  drawPlayerCube(player1); drawPlayerCube(player2);
  if (currentLevel === 3) drawPlayerSword();
  drawParticles();
  if (darkMode) {
    // Midnight darkness — almost everything invisible
    ctx.fillStyle = 'rgba(0,0,6,0.92)';
    ctx.fillRect(0, 0, W, H);
    // Redraw player on top so they can navigate
    drawPlayerCube(player1); drawPlayerCube(player2);
    // Only glowing red eyes visible for enemies
    drawEnemyGlowEyes();
  } else if (currentAdventure === 1) {
    // Robot eye glow always visible in Mechanical Factory
    drawEnemyGlowEyes();
  }
  // Night vision green tint (Cube Kingdom only)
  if (currentLevel === 2 && currentAdventure === 0 && hasNightVision()) {
    ctx.fillStyle = 'rgba(0,255,80,0.13)';
    ctx.fillRect(0, 0, W, H);
  }
  drawHUD();
  // "Need Hammer!" hint when stomping MF robots unarmed
  if (hammerHintTimer > 0) {
    const alpha = hammerHintTimer > 80 ? 1 : hammerHintTimer / 80;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#FF6F00'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
    ctx.fillText('🔨 Need Hammer!', W/2, H/2 - 60);
    ctx.globalAlpha = 1; ctx.textAlign = 'left';
  }
  if (generatorOpen) drawGeneratorMinigame();
  drawTouchControls();
  // Fire Jason banner — visible while speed boost active, fades out after
  const _jasonSpeedOn = equippedSkin === 'murderer' && ((player1 && player1.powerups.speed > 0) || (player2 && player2.powerups.speed > 0));
  if (_jasonSpeedOn || jasonFlash > 0) {
    const alpha = _jasonSpeedOn ? 1 : jasonFlash / 25;
    const scale = (jasonFlash <= 60 && jasonFlash > 50) ? 1 + (60 - jasonFlash) * 0.04 : 1;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(W / 2, 28);
    ctx.scale(scale, scale);
    ctx.fillStyle = '#B71C1C';
    ctx.fillRect(-120, -16, 240, 28);
    ctx.strokeStyle = '#FF1744'; ctx.lineWidth = 2;
    ctx.strokeRect(-119, -15, 238, 26);
    ctx.fillStyle = '#FF1744'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
    ctx.fillText('MAKE THEM REMEMBER', 0, 7);
    ctx.restore();
    ctx.globalAlpha = 1; ctx.textAlign = 'left';
  }
  drawBadgesPanel();
  drawSkinsPanel();
  drawTrailsPanel();
  drawColorPicker();
  if (gameOver) {
    const s = numPlayers===2 ? `P1: ${player1.score}  P2: ${player2.score}` : `Score: ${player1.score}`;
    drawOverlay('GAME OVER', s, '#EF5350');
  }
  if (won) {
    const s = numPlayers===2
      ? `P1: ${player1.score} (${player1.coins}$)  P2: ${player2.score} (${player2.coins}$)`
      : `Score: ${player1.score}   Coins: ${player1.coins}`;
    drawOverlay('YOU WIN! ★', s, '#FFD600');
  }
}

// ─── Input ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  // Codes panel input — intercept all typing when open
  if (codesPanelOpen) {
    if (e.key === 'Escape') { codesPanelOpen = false; codeInput = ''; codeMsg = ''; return; }
    if (e.key === 'Enter') {
      const code = codeInput.trim().toLowerCase();
      const codeMap = {
        'geometry': { key: 'cb_geometry', msg: '🟧 Geometry skin unlocked!', notif: '🟧 Geometry skin unlocked!' },
      };
      if (codeMap[code]) {
        const entry = codeMap[code];
        if (localStorage.getItem(entry.key) === '1') {
          codeMsg = '✅ Already unlocked!';
        } else {
          localStorage.setItem(entry.key, '1');
          codeMsg = '✅ ' + entry.msg;
          badgeNotif = { name: entry.notif, timer: 300 };
        }
      } else {
        codeMsg = '❌ Invalid code';
      }
      codeInput = '';
      return;
    }
    if (e.key === 'Backspace') { codeInput = codeInput.slice(0,-1); return; }
    if (e.key.length === 1 && codeInput.length < 24) { codeInput += e.key; return; }
    return; // swallow all other keys while panel open
  }

  // Secret owner code — type "owner" anywhere
  if (e.key && e.key.length === 1) {
    ownerKeyBuf = (ownerKeyBuf + e.key.toLowerCase()).slice(-5);
    if (ownerKeyBuf === 'owner') {
      localStorage.setItem('cb_owner', '1');
      badgeNotif = { name: '😎 Owner skin unlocked!', timer: 300 };
    }
  }
  if (gameState === 'select') {
    if (e.code==='Digit1')                               { menuSel=0; playTacoBell(); pendingPlayers=1; gameState='adventure'; menuSel=0; }
    else if (e.code==='Digit2')                          { menuSel=0; playTacoBell(); pendingPlayers=2; gameState='adventure'; menuSel=0; }
    else if (e.code==='ArrowLeft'  || e.code==='KeyA')   menuSel=0;
    else if (e.code==='ArrowRight' || e.code==='KeyD')   menuSel=1;
    else if (e.code==='Enter' || e.code==='Space')       { playTacoBell(); pendingPlayers=menuSel+1; gameState='adventure'; menuSel=0; }
  } else if (gameState === 'adventure') {
    if (e.code==='ArrowLeft' || e.code==='KeyA') menuSel = Math.max(0, menuSel-1);
    else if (e.code==='ArrowRight' || e.code==='KeyD') {
      if (menuSel===0 && badges.has('adventurer')) menuSel=1;
      else if (menuSel===1 && badges.has('engineer')) menuSel=2;
    }
    else if (e.code==='Enter' || e.code==='Space') {
      if (menuSel===0) { currentAdventure=0; playTacoBell(); gameState='difficulty'; menuSel=0; }
      else if (menuSel===1 && badges.has('adventurer')) { currentAdventure=1; playTacoBell(); gameState='difficulty'; menuSel=0; }
      else if (menuSel===2 && badges.has('engineer')) { currentAdventure=2; playTacoBell(); gameState='difficulty'; menuSel=0; }
    }
    else if (e.code==='KeyR') { gameState='select'; menuSel=0; }
  } else if (gameState === 'difficulty') {
    if (e.code==='ArrowLeft'  || e.code==='KeyA')   menuSel=0;
    else if (e.code==='ArrowRight' || e.code==='KeyD')   menuSel=1;
    else if (e.code==='Enter' || e.code==='Space') {
      difficulty = menuSel===0 ? 'easy' : 'hard';
      playTacoBell(); initGame(pendingPlayers);
    } else if (e.code==='KeyR') { gameState='select'; menuSel=0; }
  } else {
    if (e.code==='KeyR') {
      if (gameState === 'mfcutscene' && mfVictoryCutscene && mfVictoryCutscene.phase !== 'freeze') return;
      gameState='select';
    }
    if (e.code==='KeyF' && gameState==='playing') {
      if (generatorOpen) { generatorOpen=false; return; }
      for (let i=0; i<generators.length; i++) {
        const gen=generators[i];
        if (!gen.solved) {
          const p=player1||player2;
          if (p && Math.abs((p.x+p.w/2)-(gen.x+gen.w/2))<80) { openGenerator(i); return; }
        }
      }
    }
    if (e.code==='Escape' && generatorOpen) { generatorOpen=false; }
  }
});

// Toggle badges panel on canvas click over the BADGES button
canvas.addEventListener('click', e => {
  const rect2 = canvas.getBoundingClientRect();
  const mx2 = (e.clientX - rect2.left) * (W / rect2.width);
  const my2 = (e.clientY - rect2.top)  * (H / rect2.height);
  // Generator minigame click handling
  if (generatorOpen) {
    if (genTransition) return;
    const PX=W/2-200, PY=H/2-160, PW=400, PH=320;
    if (genStage===0) {
      const LC=PX+72,RC=PX+PW-72,CY0=PY+75,CYS=40;
      for (let i=0;i<5;i++) {
        if (Math.hypot(mx2-LC,my2-(CY0+i*CYS))<13&&wireMatches[i]===undefined){wireSelected=i;return;}
        if (Math.hypot(mx2-RC,my2-(CY0+i*CYS))<13){
          if (wireSelected!==null&&!Object.values(wireMatches).includes(i)){
            if(wireLeftOrder[wireSelected]===wireRightOrder[i]){wireMatches[wireSelected]=i;wireSelected=null;checkWireSolved();}
            else{wireErrorTimer=35;wireErrorPos=i;wireSelected=null;}
          } return;
        }
      }
    } else if (genStage===1) {
      if (seqPhase!=='input') return;
      const btns=[{x:PX+90,y:PY+70,w:90,h:65},{x:PX+220,y:PY+70,w:90,h:65},{x:PX+90,y:PY+155,w:90,h:65},{x:PX+220,y:PY+155,w:90,h:65}];
      for (let i=0;i<4;i++){
        const b=btns[i];
        if(mx2>=b.x&&mx2<=b.x+b.w&&my2>=b.y&&my2<=b.y+b.h){
          seqPressedBtn = i; seqPressedTimer = 18;
          if(i===seqPattern[seqPlayerIdx]){seqPlayerIdx++;if(seqPlayerIdx>=seqPattern.length)advanceGenStage();}
          else{seqPhase='showing';seqTick=0;seqPlayerIdx=0;}
          return;
        }
      }
    } else if (genStage===2) {
      const gCX=[PX+80,PX+200,PX+320],gCY=PY+155;
      for (let i=0;i<3;i++){
        const gx=gCX[i];
        if(mx2>=gx-26&&mx2<=gx-4&&my2>=gCY+44&&my2<=gCY+60){gaugeValues[i]=Math.max(0,gaugeValues[i]-1);}
        if(mx2>=gx+4&&mx2<=gx+26&&my2>=gCY+44&&my2<=gCY+60){gaugeValues[i]=Math.min(9,gaugeValues[i]+1);}
      }
      if(gaugeTargets.every((t,i)=>gaugeValues[i]===t))advanceGenStage();
    } else if (genStage===3) {
      if(patternPhase!=='input')return;
      const gX=PX+PW/2-66,gY=PY+68,cell=42;
      for(let i=0;i<9;i++){
        const r=Math.floor(i/3),c=i%3,cx=gX+c*(cell+2),cy=gY+r*(cell+2);
        if(mx2>=cx&&mx2<=cx+cell&&my2>=cy&&my2<=cy+cell){
          patternPlayer[i]=!patternPlayer[i];
          if(patternPlayer.every((v,i)=>v===patternTarget[i]))advanceGenStage();
          return;
        }
      }
    } else if (genStage===4) {
      const gX=PX+PW/2-66,gY=PY+68,cell=42;
      for(let i=0;i<9;i++){
        const r=Math.floor(i/3),c=i%3,cx=gX+c*(cell+2),cy=gY+r*(cell+2);
        if(mx2>=cx&&mx2<=cx+cell&&my2>=cy&&my2<=cy+cell){
          toggleLightsOut(i);
          if(!lightsGrid.some(v=>v))advanceGenStage();
          return;
        }
      }
    }
    return;
  }
  const cW = 220, cH = 200, cY = 148, c1X = W/2 - cW - 20, c2X = W/2 + 20;
  if (gameState === 'select') {
    if (mx2 >= c1X && mx2 <= c1X+cW && my2 >= cY && my2 <= cY+cH) { playTacoBell(); pendingPlayers=1; gameState='adventure'; menuSel=0; return; }
    if (mx2 >= c2X && mx2 <= c2X+cW && my2 >= cY && my2 <= cY+cH) { playTacoBell(); pendingPlayers=2; gameState='adventure'; menuSel=0; return; }
  }
  if (gameState === 'adventure') {
    const acW = 170, acH = 205, acY = 140;
    const ac1X = W/2-acW*1.5-15, ac2X = W/2-acW/2, ac3X = W/2+acW/2+15;
    if (mx2 >= ac1X && mx2 <= ac1X+acW && my2 >= acY && my2 <= acY+acH) { currentAdventure=0; playTacoBell(); gameState='difficulty'; menuSel=0; return; }
    if (badges.has('adventurer') && mx2 >= ac2X && mx2 <= ac2X+acW && my2 >= acY && my2 <= acY+acH) { currentAdventure=1; playTacoBell(); gameState='difficulty'; menuSel=0; return; }
    if (badges.has('engineer') && mx2 >= ac3X && mx2 <= ac3X+acW && my2 >= acY && my2 <= acY+acH) { currentAdventure=2; playTacoBell(); gameState='difficulty'; menuSel=0; return; }
  }
  if (gameState === 'difficulty') {
    if (mx2 >= c1X && mx2 <= c1X+cW && my2 >= cY && my2 <= cY+cH) { difficulty='easy'; playTacoBell(); initGame(pendingPlayers); return; }
    if (mx2 >= c2X && mx2 <= c2X+cW && my2 >= cY && my2 <= cY+cH) { difficulty='hard'; playTacoBell(); initGame(pendingPlayers); return; }
  }
  if (gameState !== 'playing' && gameState !== 'cutscene') return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top)  * scaleY;

  const inBtn = (btn) => mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h;

  // BADGES button
  if (inBtn(BADGE_BTN)) { badgesPanelOpen = !badgesPanelOpen; if (!badgesPanelOpen) badgeScrollY = 0; skinsPanelOpen = false; trailsPanelOpen = false; codesPanelOpen = false; return; }
  // CODES button
  if (inBtn(CODES_BTN)) { codesPanelOpen = !codesPanelOpen; codeInput = ''; codeMsg = ''; badgesPanelOpen = false; skinsPanelOpen = false; trailsPanelOpen = false; return; }
  // SKINS button
  if (inBtn(SKINS_BTN)) { skinsPanelOpen = !skinsPanelOpen; badgesPanelOpen = false; trailsPanelOpen = false; return; }
  // TRAILS button
  if (badges.has('trillionaire') && inBtn(TRAILS_BTN)) { trailsPanelOpen = !trailsPanelOpen; badgesPanelOpen = false; skinsPanelOpen = false; return; }
  // Skin equip/unequip buttons (only when panel open)
  if (skinsPanelOpen) {
    for (const skin of SKIN_DEFS) {
      if (skin._varBtn && inBtn(skin._varBtn)) {
        robotSkinVariant = robotSkinVariant === 0 ? 1 : 0;
        localStorage.setItem('cb_robot_variant', robotSkinVariant);
        return;
      }
      if (skin._btn && inBtn(skin._btn)) {
        equippedSkin = equippedSkin === skin.id ? null : skin.id;
        if (equippedSkin) localStorage.setItem('cb_skin', equippedSkin);
        else localStorage.removeItem('cb_skin');
        return;
      }
    }
  }
  // Trail equip/unequip buttons (only when panel open)
  if (trailsPanelOpen) {
    for (const trail of TRAIL_DEFS) {
      if (trail._btn && inBtn(trail._btn)) {
        equippedTrail = equippedTrail === trail.id ? null : trail.id;
        if (equippedTrail) localStorage.setItem('cb_trail', equippedTrail);
        else localStorage.removeItem('cb_trail');
        return;
      }
    }
    if (ctx._trailColorBtn && inBtn(ctx._trailColorBtn)) { colorPickerOpen = true; return; }
    if (ctx._trailResetBtn && inBtn(ctx._trailResetBtn)) {
      trailColor = null; localStorage.removeItem('cb_trail_color'); return;
    }
  }
  // Color picker interaction
  if (colorPickerOpen) {
    if (ctx._cpDoneBtn && inBtn(ctx._cpDoneBtn)) {
      trailColor = hsvToHex(_cpHue, _cpSat, _cpVal);
      localStorage.setItem('cb_trail_color', trailColor);
      colorPickerOpen = false; return;
    }
    if (ctx._cpResetBtn && inBtn(ctx._cpResetBtn)) {
      trailColor = null; localStorage.removeItem('cb_trail_color');
      colorPickerOpen = false; return;
    }
    return; // block clicks falling through
  }
});

// Color picker drag support
(function() {

    return [(e.clientX - rect.left) * (W / rect.width), (e.clientY - rect.top) * (H / rect.height)];
  }
  function applyDrag(mx, my) {
    if (!colorPickerOpen) return;
    const cx = ctx._cpCx, cy = ctx._cpCy;
    const svX = ctx._cpBx + CP_SVX, svY = ctx._cpBy + CP_SVY;
    if (_cpDragging === 'ring' || (_cpDragging === null && (() => {
      const dx = mx-cx, dy = my-cy, d = Math.sqrt(dx*dx+dy*dy);
      return d >= CP_IR && d <= CP_OR;
    })())) {
      _cpDragging = 'ring';
      _cpHue = (Math.atan2(my - cy, mx - cx) * 180 / Math.PI + 90 + 360) % 360;
    } else if (_cpDragging === 'sv' || (_cpDragging === null &&
      mx >= svX && mx <= svX + CP_SVW && my >= svY && my <= svY + CP_SVH)) {
      _cpDragging = 'sv';
      _cpSat = Math.max(0, Math.min(1, (mx - svX) / CP_SVW));
      _cpVal = Math.max(0, Math.min(1, 1 - (my - svY) / CP_SVH));
    }
  }
  canvas.addEventListener('mousedown', e => { if (colorPickerOpen) { const [mx,my]=cpCoords(e); applyDrag(mx,my); } });
  canvas.addEventListener('mousemove', e => { if (_cpDragging) { const [mx,my]=cpCoords(e); applyDrag(mx,my); } });
  canvas.addEventListener('mouseup',   () => { _cpDragging = null; });
})();

// Badges panel scroll via mouse wheel
canvas.addEventListener('wheel', e => {
  if (badgesPanelOpen) { badgeScrollY += e.deltaY * 0.5; e.preventDefault(); }
}, { passive: false });

// ─── Loop ────────────────────────────────────────────────────────────────────
TOTAL_COINS_IN_GAME = LEVEL_DATA.reduce((s, d) => s + d.rawCoins.length, 0);

function loop() { tick++; update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
